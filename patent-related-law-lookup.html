, upon request of the defendant, to provide the defendant appropriate compensation for\nany injury caused by these measures.\n8. To the extent that any provisional measure can be ordered as a result of administrative procedures,\nsuch procedures shall conform to principles equivalent in substance to those set forth in this Section.", "51": "Suspension of Release by Customs Authorities\nMembers shall, in conformity with the provisions set out below, adopt procedures13 to enable\na right holder, who has valid grounds for suspecting that the importation of counterfeit trademark or\npirated copyright goods14 may take place, to lodge an application in writing with competent authorities,\nadministrative or judicial, for the suspension by the customs authorities of the release into free circulation\nof such goods. Members may enable such an application to be made in respect of goods which involve\nother infringements of intellectual property rights, provided that the requirements of this Section are\n12Where a Member has dismantled substantially all controls over movement of goods across its border with another Member\nwith which it forms part of a customs union, it shall not be required to apply the provisions of this Section at that border.\n13It is understood that there shall be no obligation to apply such procedures to imports of goods put on the market in another\ncountry by or with the consent of the right holder, or to goods in transit.\n14For the purposes of this Agreement:\n(a) \"counterfeit trademark goods\" shall mean any goods, including packaging, bearing without authorization\na trademark which is identical to the trademark validly registered in respect of such goods, or which cannot\nbe distinguished in its essential aspects from such a trademark, and which thereby infringes the rights\nof the owner of the trademark in question under the law of the country of importation;\n(b) \"pirated copyright goods\" shall mean any goods which are copies made without the consent of the right\nholder or person duly authorized by the right holder in the country of production and which are made\ndirectly or indirectly from an article where the making of that copy would have constituted an infringement\nof a copyright or a related right under the law of the country of importation.\nmet. Members may also provide for corresponding procedures concerning the suspension by the customs\nauthorities of the release of infringing goods destined for exportation from their territories.", "52": "Application\nAny right holder initiating the procedures under Article 51 shall be required to provide adequate\nevidence to satisfy the competent authorities that, under the laws of the country of importation, there\nis prima facie an infringement of the right holder’s intellectual property right and to supply a sufficiently\ndetailed description of the goods to make them readily recognizable by the customs authorities. The\ncompetent authorities shall inform the applicant within a reasonable period whether they have accepted\nthe application and, where determined by the competent authorities, the period for which the customs\nauthorities will take action.", "53": "Security or Equivalent Assurance\n1. The competent authorities shall have the authority to require an applicant to provide a security\nor equivalent assurance sufficient to protect the defendant and the competent authorities and to prevent\nabuse. Such security or equivalent assurance shall not unreasonably deter recourse to these procedures.\n2. Where pursuant to an application under this Section the release of goods involving industrial\ndesigns, patents, layout-designs or undisclosed information into free circulation has been suspended\nby customs authorities on the basis of a decision other than by a judicial or other independent authority,\nand the period provided for in Article 55 has expired without the granting of provisional relief by the\nduly empowered authority, and provided that all other conditions for importation have been complied\nwith, the owner, importer, or consignee of such goods shall be entitled to their release on the posting\nof a security in an amount sufficient to protect the right holder for any infringement. Payment of such\nsecurity shall not prejudice any other remedy available to the right holder, it being understood that the\nsecurity shall be released if the right holder fails to pursue the right of action within a reasonable period\nof time.", "54": "Notice of Suspension\nThe importer and the applicant shall be promptly notified of the suspension of the release of\ngoods according to Article 51.", "55": "Duration of Suspension\nIf, within a period not exceeding 10 working days after the applicant has been served notice\nof the suspension, the customs authorities have not been informed that proceedings leading to a decision\non the merits of the case have been initiated by a party other than the defendant, or that the duly\nempowered authority has taken provisional measures prolonging the suspension of the release of the\ngoods, the goods shall be released, provided that all other conditions for importation or exportation\nhave been complied with; in appropriate cases, this time-limit may be extended by another 10 working\ndays. If proceedings leading to a decision on the merits of the case have been initiated, a review,\nincluding a right to be heard, shall take place upon request of the defendant with a view to deciding,\nwithin a reasonable period, whether these measures shall be modified, revoked or confirmed.\nNotwithstanding the above, where the suspension of the release of goods is carried out or continued\nin accordance with a provisional judicial measure, the provisions of paragraph 6 of Article 50 shall\napply.", "56": "Indemnification of the Importer\nand of the Owner of the Goods\nRelevant authorities shall have the authority to order the applicant to pay the importer, the\nconsignee and the owner of the goods appropriate compensation for any injury caused to them through\nthe wrongful detention of goods or through the detention of goods released pursuant to Article 55.", "57": "Right of Inspection and Information\nWithout prejudice to the protection of confidential information, Members shall provide the\ncompetent authorities the authority to give the right holder sufficient opportunity to have any goods\ndetained by the customs authorities inspected in order to substantiate the right holder’s claims. The\ncompetent authorities shall also have authority to give the importer an equivalent opportunity to have\nany such goods inspected. Where a positive determination has been made on the merits of a case,\nMembers may provide the competent authorities the authority to inform the right holder of the names\nand addresses of the consignor, the importer and the consignee and of the quantity of the goods in\nquestion.", "58": "Ex Officio Action\nWhere Members require competent authorities to act upon their own initiative and to suspend\nthe release of goods in respect of which they have acquired prima facie evidence that an intellectual\nproperty right is being infringed:\n(a) the competent authorities may at any time seek from the right holder any information\nthat may assist them to exercise these powers;\n(b) the importer and the right holder shall be promptly notified of the suspension. Where\nthe importer has lodged an appeal against the suspension with the competent authorities,\nthe suspension shall be subject to the conditions, mutatis mutandis, set out at Article 55;\n(c) Members shall only exempt both public authorities and officials from liability to\nappropriate remedial measures where actions are taken or intended in good faith.", "59": "Remedies\nWithout prejudice to other rights of action open to the right holder and subject to the right of\nthe defendant to seek review by a judicial authority, competent authorities shall have the authority to\norder the destruction or disposal of infringing goods in accordance with the principles set out in Article\n46. In regard to counterfeit trademark goods, the authorities shall not allow the re-exportation of the\ninfringing goods in an unaltered state or subject them to a different customs procedure, other than in\nexceptional circumstances.", "60": "De Minimis Imports\nMembers may exclude from the application of the above provisions small quantities of goods\nof a non-commercial nature contained in travellers' personal luggage or sent in small consignments.", "61": "Members shall provide for criminal procedures and penalties to be applied at least in cases\nof wilful trademark counterfeiting or copyright piracy on a commercial scale. Remedies available shall\ninclude imprisonment and/or monetary fines sufficient to provide a deterrent, consistently with the level\nof penalties applied for crimes of a corresponding gravity. In appropriate cases, remedies available\nshall also include the seizure, forfeiture and destruction of the infringing goods and of any materials\nand implements the predominant use of which has been in the commission of the offence. Members\nmay provide for criminal procedures and penalties to be applied in other cases of infringement of\nintellectual property rights, in particular where they are committed wilfully and on a commercial scale.\nACQUISITION AND MAINTENANCE OF INTELLECTUAL PROPERTY\nRIGHTS AND RELATED INTER-PARTES PROCEDURES", "62": "1. Members may require, as a condition of the acquisition or maintenance of the intellectual property\nrights provided for under Sections 2 through 6 of Part II, compliance with reasonable procedures and\nformalities. Such procedures and formalities shall be consistent with the provisions of this Agreement.\n2. Where the acquisition of an intellectual property right is subject to the right being granted or\nregistered, Members shall ensure that the procedures for grant or registration, subject to compliance\nwith the substantive conditions for acquisition of the right, permit the granting or registration of the\nright within a reasonable period of time so as to avoid unwarranted curtailment of the period of protection.\n3. Article 4 of the Paris Convention (1967) shall apply mutatis mutandis to service marks.\n4. Procedures concerning the acquisition or maintenance of intellectual property rights and, where\na Member's law provides for such procedures, administrative revocation and inter partes procedures\nsuch as opposition, revocation and cancellation, shall be governed by the general principles set out\nin paragraphs 2 and 3 of Article 41.\n5. Final administrative decisions in any of the procedures referred to under paragraph 4 shall be\nsubject to review by a judicial or quasi-judicial authority. However, there shall be no obligation to\nprovide an opportunity for such review of decisions in cases of unsuccessful opposition or administrative\nrevocation, provided that the grounds for such procedures can be the subject of invalidation procedures.\nDISPUTE PREVENTION AND SETTLEMENT", "63": "Transparency\n1. Laws and regulations, and final judicial decisions and administrative rulings of general application,\nmade effective by a Member pertaining to the subject matter of this Agreement (the availability, scope,\nacquisition, enforcement and prevention of the abuse of intellectual property rights) shall be published,\nor where such publication is not practicable made publicly available, in a national language, in such\na manner as to enable governments and right holders to become acquainted with them. Agreements\nconcerning the subject matter of this Agreement which are in force between the government or a\ngovernmental agency of a Member and the government or a governmental agency of another Member\nshall also be published.\n2. Members shall notify the laws and regulations referred to in paragraph 1 to the Council for\nTRIPS in order to assist that Council in its review of the operation of this Agreement. The Council\nshall attempt to minimize the burden on Members in carrying out this obligation and may decide to\nwaive the obligation to notify such laws and regulations directly to the Council if consultations with\nWIPO on the establishment of a common register containing these laws and regulations are successful.\nThe Council shall also consider in this connection any action required regarding notifications pursuant\nto the obligations under this Agreement stemming from the provisions of Article 6ter of the Paris\nConvention (1967).\n3. Each Member shall be prepared to supply, in response to a written request from another Member,\ninformation of the sort referred to in paragraph 1. A Member, having reason to believe that a specific\njudicial decision or administrative ruling or bilateral agreement in the area of intellectual property rights\naffects its rights under this Agreement, may also request in writing to be given access to or be informed\nin sufficient detail of such specific judicial decisions or administrative rulings or bilateral agreements.\n4. Nothing in paragraphs 1, 2 and 3 shall require Members to disclose confidential information\nwhich would impede law enforcement or otherwise be contrary to the public interest or would prejudice\nthe legitimate commercial interests of particular enterprises, public or private.", "64": "Dispute Settlement\n1. The provisions of Articles XXII and XXIII of GATT 1994 as elaborated and applied by the\nDispute Settlement Understanding shall apply to consultations and the settlement of disputes under\nthis Agreement except as otherwise specifically provided herein.\n2. Subparagraphs 1(b) and 1(c) of Article XXIII of GATT 1994 shall not apply to the settlement\nof disputes under this Agreement for a period of five years from the date of entry into force of the\nWTO Agreement.\n3. During the time period referred to in paragraph 2, the Council for TRIPS shall examine the\nscope and modalities for complaints of the type provided for under subparagraphs 1(b) and 1(c) of Article\nXXIII of GATT 1994 made pursuant to this Agreement, and submit its recommendations to the Ministerial\nConference for approval. Any decision of the Ministerial Conference to approve such recommendations\nor to extend the period in paragraph 2 shall be made only by consensus, and approved recommendations\nshall be effective for all Members without further formal acceptance process.\nTRANSITIONAL ARRANGEMENTS", "65": "Transitional Arrangements\n1. Subject to the provisions of paragraphs 2, 3 and 4, no Member shall be obliged to apply the\nprovisions of this Agreement before the expiry of a general period of one year following the date of\nentry into force of the WTO Agreement.\n2. A developing country Member is entitled to delay for a further period of four years the date\nof application, as defined in paragraph 1, of the provisions of this Agreement other than Articles 3,\n4 and 5.\n3. Any other Member which is in the process of transformation from a centrally-planned into a\nmarket, free-enterprise economy and which is undertaking structural reform of its intellectual property\nsystem and facing special problems in the preparation and implementation of intellectual property laws\nand regulations, may also benefit from a period of delay as foreseen in paragraph 2.\n4. To the extent that a developing country Member is obliged by this Agreement to extend product\npatent protection to areas of technology not so protectable in its territory on the general date of application\nof this Agreement for that Member, as defined in paragraph 2, it may delay the application of the\nprovisions on product patents of Section 5 of Part II to such areas of technology for an additional period\nof five years.\n5. A Member availing itself of a transitional period under paragraphs 1, 2, 3 or 4 shall ensure\nthat any changes in its laws, regulations and practice made during that period do not result in a lesser\ndegree of consistency with the provisions of this Agreement.", "66": "Least-Developed Country Members\n1. In view of the special needs and requirements of least-developed country Members, their\neconomic, financial and administrative constraints, and their need for flexibility to create a viable\ntechnological base, such Members shall not be required to apply the provisions of this Agreement, other\nthan Articles 3, 4 and 5, for a period of 10 years from the date of application as defined under paragraph\n1 of Article 65. The Council for TRIPS shall, upon duly motivated request by a least-developed country\nMember, accord extensions of this period.\n2. Developed country Members shall provide incentives to enterprises and institutions in their\nterritories for the purpose of promoting and encouraging technology transfer to least-developed country\nMembers in order to enable them to create a sound and viable technological base.", "67": "Technical Cooperation\nIn order to facilitate the implementation of this Agreement, developed country Members shall\nprovide, on request and on mutually agreed terms and conditions, technical and financial cooperation\nin favour of developing and least-developed country Members. Such cooperation shall include assistance\nin the preparation of laws and regulations on the protection and enforcement of intellectual property\nrights as well as on the prevention of their abuse, and shall include support regarding the establishment\nor reinforcement of domestic offices and agencies relevant to these matters, including the training of\npersonnel.\nINSTITUTIONAL ARRANGEMENTS; FINAL PROVISIONS", "68": "Council for Trade-Related Aspects of\nIntellectual Property Rights\nThe Council for TRIPS shall monitor the operation of this Agreement and, in particular, Members'\ncompliance with their obligations hereunder, and shall afford Members the opportunity of consulting\non matters relating to the trade-related aspects of intellectual property rights. It shall carry out such\nother responsibilities as assigned to it by the Members, and it shall, in particular, provide any assistance\nrequested by them in the context of dispute settlement procedures. In carrying out its functions, the\nCouncil for TRIPS may consult with and seek information from any source it deems appropriate. In\nconsultation with WIPO, the Council shall seek to establish, within one year of its first meeting,\nappropriate arrangements for cooperation with bodies of that Organization.", "69": "International Cooperation\nMembers agree to cooperate with each other with a view to eliminating international trade in\ngoods infringing intellectual property rights. For this purpose, they shall establish and notify contact\npoints in their administrations and be ready to exchange information on trade in infringing goods. They\nshall, in particular, promote the exchange of information and cooperation between customs authorities\nwith regard to trade in counterfeit trademark goods and pirated copyright goods.", "70": "Protection of Existing Subject Matter\n1. This Agreement does not give rise to obligations in respect of acts which occurred before the\ndate of application of the Agreement for the Member in question.\n2. Except as otherwise provided for in this Agreement, this Agreement gives rise to obligations\nin respect of all subject matter existing at the date of application of this Agreement for the Member\nin question, and which is protected in that Member on the said date, or which meets or comes\nsubsequently to meet the criteria for protection under the terms of this Agreement. In respect of this\nparagraph and paragraphs 3 and 4, copyright obligations with respect to existing works shall be solely\ndetermined under Article 18 of the Berne Convention (1971), and obligations with respect to the rights\nof producers of phonograms and performers in existing phonograms shall be determined solely under\nArticle 18 of the Berne Convention (1971) as made applicable under paragraph 6 of Article 14 of this\nAgreement.\n3. There shall be no obligation to restore protection to subject matter which on the date of\napplication of this Agreement for the Member in question has fallen into the public domain.\n4. In respect of any acts in respect of specific objects embodying protected subject matter which\nbecome infringing under the terms of legislation in conformity with this Agreement, and which were\ncommenced, or in respect of which a significant investment was made, before the date of acceptance\nof the WTO Agreement by that Member, any Member may provide for a limitation of the remedies\navailable to the right holder as to the continued performance of such acts after the date of application\nof this Agreement for that Member. In such cases the Member shall, however, at least provide for\nthe payment of equitable remuneration.\n5. A Member is not obliged to apply the provisions of Article 11 and of paragraph 4 of Article 14\nwith respect to originals or copies purchased prior to the date of application of this Agreement for that\nMember.\n6. Members shall not be required to apply Article 31, or the requirement in paragraph 1 of Article 27\nthat patent rights shall be enjoyable without discrimination as to the field of technology, to use without\nthe authorization of the right holder where authorization for such use was granted by the government\nbefore the date this Agreement became known.\n7. In the case of intellectual property rights for which protection is conditional upon registration,\napplications for protection which are pending on the date of application of this Agreement for the Member\nin question shall be permitted to be amended to claim any enhanced protection provided under the\nprovisions of this Agreement. Such amendments shall not include new matter.\n8. Where a Member does not make available as of the date of entry into force of the WTO\nAgreement patent protection for pharmaceutical and agricultural chemical products commensurate with\nits obligations under Article 27, that Member shall:\n(a) notwithstanding the provisions of Part VI, provide as from the date of entry into force\nof the WTO Agreement a means by which applications for patents for such inventions\ncan be filed;\n(b) apply to these applications, as of the date of application of this Agreement, the criteria\nfor patentability as laid down in this Agreement as if those criteria were being applied\non the date of filing in that Member or, where priority is available and claimed, the\npriority date of the application; and\n(c) provide patent protection in accordance with this Agreement as from the grant of the\npatent and for the remainder of the patent term, counted from the filing date in\naccordance with Article 33 of this Agreement, for those of these applications that meet\nthe criteria for protection referred to in subparagraph (b).\n9. Where a product is the subject of a patent application in a Member in accordance with\nparagraph 8(a), exclusive marketing rights shall be granted, notwithstanding the provisions of Part VI,\nfor a period of five years after obtaining marketing approval in that Member or until a product patent\nis granted or rejected in that Member, whichever period is shorter, provided that, subsequent to the\nentry into force of the WTO Agreement, a patent application has been filed and a patent granted for\nthat product in another Member and marketing approval obtained in such other Member.", "71": "Review and Amendment\n1. The Council for TRIPS shall review the implementation of this Agreement after the expiration\nof the transitional period referred to in paragraph 2 of Article 65. The Council shall, having regard\nto the experience gained in its implementation, review it two years after that date, and at identical intervals\nthereafter. The Council may also undertake reviews in the light of any relevant new developments\nwhich might warrant modification or amendment of this Agreement.\n2. Amendments merely serving the purpose of adjusting to higher levels of protection of intellectual\nproperty rights achieved, and in force, in other multilateral agreements and accepted under those\nagreements by all Members of the WTO may be referred to the Ministerial Conference for action in\naccordance with paragraph 6 of Article X of the WTO Agreement on the basis of a consensus proposal\nfrom the Council for TRIPS.", "72": "Reservations\nReservations may not be entered in respect of any of the provisions of this Agreement without\nthe consent of the other Members.", "73": "Security Exceptions\nNothing in this Agreement shall be construed:\n(a) to require a Member to furnish any information the disclosure of which it considers\ncontrary to its essential security interests; or\n(b) to prevent a Member from taking any action which it considers necessary for the\nprotection of its essential security interests;\n(i) relating to fissionable materials or the materials from which they are derived;\n(ii) relating to the traffic in arms, ammunition and implements of war and to such\ntraffic in other goods and materials as is carried on directly or indirectly for\nthe purpose of supplying a military establishment;\n(iii) taken in time of war or other emergency in international relations; or\n(c) to prevent a Member from taking any action in pursuance of its obligations under the\nUnited Nations Charter for the maintenance of international peace and security."};

const ZH_IP_ADJ = {"1": "為建構專業、妥適及迅速審理智慧財產案件之訴訟制度，保障智慧財產及其相關權益，特制定本法。", "2": "智慧財產案件之審理，依本法之規定；本法未規定者，分別依民事訴訟、刑事訴訟或行政訴訟程序應適用之法律。", "3": "本法所稱智慧財產法院，指智慧財產及商業法院；所稱智慧財產法庭、商業法庭，指智慧財產法院之智慧財產法庭、商業法庭。\n本法所稱智慧財產案件，指下列各款案件：\n一、智慧財產民事事件。\n二、智慧財產刑事案件。\n三、智慧財產行政事件。\n四、其他依法律規定或司法院指定由智慧財產法院管轄之案件。", "4": "本法所稱營業秘密，係指營業秘密法第二條所定之營業秘密。", "5": "當事人、代表人、管理人、代理人、辯護人、輔佐人、參加人、證人、專家證人、鑑定人、查證人、特約通譯、專家或其他訴訟關係人所在處所與法院間，有聲音及影像相互傳送之科技設備，而得直接審理者，法院認為適當時，得依聲請或依職權以該設備為之。\n前項情形，法院應先徵詢當事人之意見。\n第一項之聲請被駁回者，不得聲明不服。\n第一項情形，其期日通知書或傳票記載之應到處所，為該設備所在處所。\n依第一項進行程序之筆錄或其他文書須簽名者，由法院傳送至遠距端，經確認內容並簽名後，再以科技設備傳回法院，其效力與經簽名之筆錄或其他文書同。\n第一項之審理及前項之文書傳送作業辦法，由司法院定之。", "6": "法院於必要時，得命技術審查官執行下列職務：\n一、為使訴訟關係明確，就事實上及法律上之事項，基於專業知識對當事人為說明或發問。\n二、對證人、專家證人或鑑定人為直接發問。\n三、就本案向法官為意見之陳述。\n四、於證據保全時協助調查證據。\n五、於保全程序或強制執行程序提供協助。\n六、於查證人實施查證時提供協助。\n法院得命技術審查官就其執行職務之成果，製作報告書。但案件繁雜而有必要時，得命分別作成中間報告書及總結報告書。\n技術審查官製作之報告書，法院認有必要時，得公開全部或一部之內容。\n法院因技術審查官提供而獲知之特殊專業知識，應予當事人辯論之機會，始得採為裁判之基礎。", "7": "技術審查官之迴避，依其所參與之程序，準用各該程序關於法官迴避之規定。", "8": "民事訴訟法第二編第三章、第四章規定，於智慧財產民事事件程序不適用之。", "9": "智慧財產及商業法院組織法第三條第一款、第四款所定之第一審民事事件，專屬智慧財產法院管轄，且不因訴之追加或其他變更而受影響。但有民事訴訟法第二十四條、第二十五條所定情形時，該法院亦有管轄權。\n前項民事事件之全部或一部，涉及勞動事件法第二條第一項規定之勞動事件者，應由智慧財產法院管轄。\n智慧財產法庭審理前項民事事件，依本法之規定；本法未規定者，適用勞動事件法之規定。但勞動事件法第四條第一項及第二章規定，不適用之。\n第一項民事事件之全部或一部，涉及商業事件審理法第二條第二項規定之商業訴訟事件者，智慧財產法庭應依聲請或依職權以裁定移送於商業法庭審理。", "10": "智慧財產民事事件，有下列各款情形之一者，當事人應委任律師為訴訟代理人。但當事人或其法定代理人具有法官、檢察官、律師資格者，不在此限：\n一、第一審民事訴訟事件，其訴訟標的金額或價額，逾民事訴訟法第四百六十六條所定得上訴第三審之數額。\n二、因專利權、電腦程式著作權、營業秘密涉訟之第一審民事訴訟事件。\n三、第二審民事訴訟事件。\n四、起訴前聲請證據保全、保全程序及前三款訴訟事件所生其他事件之聲請或抗告。\n五、前四款之再審事件。\n六、第三審法院之事件。\n七、其他司法院所定應委任律師為訴訟代理人之事件。", "11": "前條第一項本文事件，當事人無資力委任訴訟代理人者，得依訴訟救助之規定，聲請法院選任律師為其訴訟代理人。\n當事人提起上訴或抗告依前項規定聲請者，原審法院應將訴訟卷宗送交上級審法院。\n第一項選任律師為訴訟代理人辦法，由司法院參酌法務部及全國律師聯合會等意見定之。", "12": "第十條第一項事件，除別有規定外，應由訴訟代理人為訴訟行為，始生效力。\n起訴、上訴、聲請或抗告，未依第十條第一項、第五項規定委任訴訟代理人，或雖依第五項規定委任，法院認為不適當者，審判長應定期間先命其補正；逾期未補正亦未依前條第一項為聲請者，法院應以裁定駁回之。\n被告、被上訴人、相對人未依第十條第一項、第五項規定委任訴訟代理人，或雖依第五項規定委任，法院認為不適當者，審判長應先定期間命其補正。\n當事人依前二項規定補正者，其訴訟行為經訴訟代理人追認，溯及於行為時發生效力；逾期補正者，自追認時起發生效力。", "13": "第十條第一項本文事件，訴訟代理人得偕同當事人於期日到場，經審判長許可後，當事人得以言詞為陳述。\n前項之許可，審判長得隨時以裁定撤銷之。\n當事人應委任訴訟代理人而未委任，或委任之訴訟代理人未到場者，視同不到場。\n第一項情形，當事人得自為下列訴訟行為：\n一、自認。\n二、成立和解或調解。\n三、撤回起訴或聲請。\n四、撤回上訴或抗告。", "14": "訴訟代理人所為或對其所為之訴訟行為，直接對當事人本人發生效力。但訴訟代理人所為自認或事實上之陳述，經到場之當事人本人即時撤銷或更正者，不在此限。\n訴訟代理人關於訴訟行為有故意或過失時，當事人本人應與自己之故意或過失負同一責任。", "15": "第十條第一項本文及第十一條第一項之律師酬金，為訴訟或程序費用之一部，並應限定其最高額。其支給標準，由司法院參酌法務部及全國律師聯合會等意見定之。", "16": "第十條第一項第二款至第七款之專利權涉訟事件，經審判長許可者，當事人亦得合併委任專利師為訴訟代理人。\n前項之許可，審判長得隨時以裁定撤銷之，並應送達於為訴訟委任之人。\n第一項情形，專利師應與律師共同到庭為訴訟行為。但經審判長許可者，不在此限。\n專利師之訴訟行為與律師之訴訟行為牴觸者，不生效力。\n專利師之酬金，不計入訴訟或程序費用。", "17": "第十條、第十二條至第十四條及第十六條規定，於參加人準用之。\n參加人律師及專利師之酬金，不計入訴訟或程序費用。", "18": "法院審理第十條第一項第一款至第三款、第五款事件，或其他事件因案情繁雜或有必要時，應與當事人商定審理計畫。", "19": "專利權侵害事件，法院為判斷應證事實之真偽，得依當事人之聲請選任查證人，對他造或第三人持有或管理之文書或裝置設備實施查證。但與實施查證所需時間、費用或受查證人之負擔顯不相當者，不在此限。\n前項查證之聲請，應以書狀明確記載下列事項：\n一、專利權有受侵害或受侵害之虞之相當理由。\n二、聲請人不能自行或以其他方法蒐集證據之理由。\n三、有命技術審查官協助查證人實施查證之必要。\n四、受查證標的物與所在地。\n五、應證事實與依查證所得證據之關聯性。\n六、實施查證之事項、方法及其必要性。", "20": "與當事人或第三人有民事訴訟法第三十二條各款情形之一者，不得為查證人。", "21": "第十九條第五項裁定，如有下列情形之一者，法院得依職權撤銷之：\n一、發生第十九條第一項但書所定情事。\n二、違反前條第一項規定。\n三、違反前條第二項揭露規定，而有影響查證人之客觀性或公正性之虞。\n四、因前條第二項第二款至第四款所定之利害關係，而有影響查證人之客觀性或公正性之虞。", "22": "查證人應於查證前具結，於結文內記載必為公正、誠實之查證，如有虛偽查證，願受偽證之處罰等語。\n查證人實施查證時，除得進入受查證標的物之所在地，對文書或裝置設備為經法院許可之查證方法外，亦得對受查證人發問或要求其提示必要之文書。\n受查證之當事人無正當理由拒絕或妨礙實施查證者，法院得審酌情形認聲請人關於依該查證之應證事實為真實。", "23": "查證人實施查證後，應製作查證報告書提出於法院。\n法院收受查證報告書後，應以影本或電子檔案送達於受查證人。\n查證報告書涉及營業秘密者，受查證人應於查證報告書影本或電子檔案送達後十四日內，聲請法院裁定禁止向當事人開示查證報告書之全部或一部。", "24": "前條第三項情形，受查證人逾期未聲請，或未經法院裁定禁止開示查證報告書者，當事人得向法院書記官聲請閱覽、抄錄、攝影或以其他方式重製查證報告書或其電子檔案之全部或一部，或預納費用聲請付與查證報告書全部或一部之繕本、影本、節本或其電子檔案。", "25": "曾為查證人而為證人者，就其因實施查證所知悉之營業秘密事項，得拒絕證言。\n前項情形，查證人之秘密責任已經免除者，不得拒絕證言。", "26": "查證人之日費、旅費、報酬及其他實施查證之必要費用，準用鑑定人之規定，並為訴訟費用之一部。", "27": "第十九條至前條規定，於電腦程式著作權、營業秘密侵害事件準用之。", "28": "商業事件審理法第四十七條至第五十二條及第七十五條規定，於智慧財產民事事件準用之。", "29": "法院已知之特殊專業知識，應予當事人辯論之機會，始得採為裁判之基礎。\n審判長或受命法官就事件之法律關係，應向當事人曉諭爭點，並得適時表明其法律上見解及適度開示心證。", "30": "法院審理因專利權所生之民事訴訟事件，於解釋申請專利範圍有爭議時，宜適時依聲請或依職權界定專利權之文義範圍，並適度開示心證。", "31": "當事人提出之攻擊或防禦方法，涉及當事人或第三人之營業秘密，經當事人聲請，法院認為適當者，得不公開審判；其經兩造合意不公開審判者，亦同。", "32": "訴訟資料涉及營業秘密者，法院於不影響當事人行使辯論權之範圍內，得依當事人或第三人之聲請，裁定不予准許或限制訴訟資料之閱覽、抄錄、攝影或其他方式之重製。", "33": "前條第一項不予准許或限制裁定之原因消滅者，他造、當事人或第三人得聲請法院撤銷或變更該裁定。\n依前條第一項之閱覽、抄錄、攝影或其他方式之重製，而知悉或持有之營業秘密，不得為實施該訴訟以外之目的而使用。", "34": "文書、勘驗物或鑑定所需資料之持有人，無正當理由不從法院之命提出文書、勘驗物或鑑定所需資料者，法院得以裁定處新臺幣十萬元以下罰鍰；於必要時，並得以裁定命為強制處分。", "35": "專利權、電腦程式著作權、營業秘密侵害之事件，如當事人就其主張之權利或利益受侵害，或有受侵害之虞之事實已釋明者，他造否認其主張時，法院應定期命他造就其否認之事實及證據為具體答辯。\n前項他造無正當理由，逾期未答辯或答辯非具體者，法院得審酌情形認當事人已釋明之內容為真實。", "36": "當事人或第三人就其持有之營業秘密，經釋明符合下列情形者，法院得依該當事人或第三人之聲請，對他造、當事人、代理人、輔佐人或其他訴訟關係人發秘密保持命令：\n一、當事人書狀之內容，記載當事人或第三人之營業秘密，或已調查或應調查之證據，涉及當事人或第三人之營業秘密。\n二、為避免因前款之營業秘密經開示，或供該訴訟進行以外之目的使用，有妨害該當事人或第三人基於該營業秘密之事業活動之虞，致有限制其開示或使用之必要。\n受秘密保持命令之人，就該營業秘密，不得為實施該訴訟以外之目的而使用，或對未受秘密保持命令之人開示。", "37": "秘密保持命令之聲請，應以書狀記載下列事項：\n一、應受秘密保持命令之人。\n二、應受命令保護之營業秘密。\n三、符合前條第一項各款所列事由之事實。", "38": "准許秘密保持命令之裁定，應載明受保護之營業秘密、保護之理由，及其禁止之內容。\n秘密保持命令自送達受秘密保持命令之人，發生效力。", "39": "秘密保持命令之聲請人或請求人，除別有規定外，得聲請或請求撤銷該命令。\n法院認為核發秘密保持命令之裁定不當時，除有前項情形外，得依職權撤銷之。\n秘密保持命令經裁定撤銷確定時，失其效力。", "40": "對於曾發秘密保持命令之訴訟，如有未經限制或不許閱覽且未受秘密保持命令之人，請求閱覽、抄錄、攝影或以其他方式重製卷內文書時，法院書記官應即通知第三十六條第一項所定持有營業秘密之當事人或第三人。但秘密保持命令業經撤銷確定者，不在此限。", "41": "當事人主張或抗辯智慧財產權有應撤銷、廢止之原因者，法院應就其主張或抗辯有無理由自為判斷，不適用民事訴訟法、行政訴訟法、植物品種及種苗法或其他法律有關停止訴訟程序之規定。\n前項情形，法院認有撤銷、廢止之原因時，智慧財產權人於該民事訴訟中不得對於他造主張權利。", "42": "前條第一項情形，法院應即通知智慧財產專責機關；訴訟程序終結時，亦同。", "43": "當事人依第四十一條第一項規定主張或抗辯專利權有應撤銷之原因，專利權人已向專利專責機關申請更正專利權範圍者，應向法院陳明依更正後之專利權範圍為請求或主張。\n前項情形，專利權人因不可歸責於己之事由，致不得向專利專責機關申請更正，且如不許更正顯失公平者，得逕向法院陳明欲更正專利權之範圍，並以之為請求或主張。\n法院依第四項判斷更正專利權範圍為合法時，應依更正後之專利權範圍為本案之審理。", "44": "法院為判斷當事人依第四十一條第一項所為之主張或抗辯有無理由，或前條第四項更正專利權範圍之合法性，於必要時，得就相關法令或其他必要事項，徵詢智慧財產專責機關之意見。", "45": "智慧財產權益經專屬授權者，權利人、營業秘密所有人或專屬被授權人之一方，就該專屬授權之權益，與第三人發生民事訴訟時，應於言詞辯論終結前相當時期，將訴訟事件及進行程度告知他方。", "46": "保全證據之聲請，在起訴前，向應繫屬之法院為之；在起訴後，向已繫屬之法院為之。\n法院實施證據保全時，得為鑑定、勘驗、保全書證或訊問證人、專家證人、當事人本人。\n法院實施證據保全時，得命技術審查官到場執行職務。\n相對人無正當理由拒絕證據保全之實施時，法院於必要時得以強制力排除之，並得請警察機關協助。", "47": "對於智慧財產民事事件之第一審裁判，提起上訴或抗告者，除別有規定外，專屬智慧財產法院管轄。", "48": "對於智慧財產民事事件之第二審裁判，除別有規定外，得上訴或抗告於第三審法院。\n前項情形，第三審法院應設立專庭或專股辦理。", "49": "下列各款之處分確定時，當事人不得依民事訴訟法第四百九十六條第一項第十一款規定，對於專利權、商標權、品種權侵害事件之確定終局判決提起再審之訴：\n一、專利權舉發、商標權評定或廢止、品種權撤銷或廢止成立之處分。\n二、延長發明專利權期間舉發成立之審定。\n三、核准更正專利說明書、申請專利範圍或圖式之審定。", "50": "智慧財產民事事件支付命令之聲請與處理，依民事訴訟法第六編規定。\n債務人對支付命令提出合法異議者，發支付命令之法院應將卷證移送智慧財產法院處理。", "51": "假扣押、假處分或定暫時狀態處分之聲請，在起訴前，向應繫屬之法院為之；在起訴後，向已繫屬之法院為之。", "52": "聲請定暫時狀態之處分時，聲請人就有爭執之法律關係，及防止發生重大之損害，或避免急迫之危險，或有其他相類之情形，而有必要之事實，應釋明之；其釋明有不足者，法院應駁回聲請。\n聲請之原因雖經釋明，法院仍得命聲請人供擔保後為定暫時狀態之處分。\n聲請人自定暫時狀態之處分送達之日起十四日之不變期間內，未向法院為起訴之證明者，法院得依聲請或依職權撤銷之。\n定暫時狀態處分之裁定，因自始不當、第四項情形、聲請人聲請或其受本案判決敗訴確定而撤銷者，聲請人應賠償相對人因處分所受之損害。", "53": "判決，應以正本送達於當事人；正本以電子文件為之者，應經應受送達人同意。但對於在監所之人，正本不得以電子文件為之。\n前項規定，於裁定準用之。", "54": "智慧財產及商業法院組織法第三條第二款本文、第四款所定刑事案件，由地方法院管轄。\n營業秘密刑事案件之第一審管轄，依下列各款規定定之，不適用前項規定：\n一、犯營業秘密法第十三條之一、第十三條之二、第十三條之三第三項及第十三條之四之罪之案件，應由第一審智慧財產法庭管轄。\n二、犯國家安全法第八條第一項至第三項之罪之案件，應由第二審智慧財產法庭管轄。", "55": "卷宗及證物之內容涉及營業秘密者，法院得依當事人或利害關係人之聲請不公開審判。\n卷宗及證物之內容涉及營業秘密者，法院得依當事人、利害關係人之聲請或依職權限制卷宗及證物之檢閱、抄錄、攝影或其他方式之重製。", "56": "營業秘密刑事案件及其附帶民事訴訟，其卷宗及證物之內容涉及當事人或利害關係人之營業秘密，而為犯罪事實或損害賠償事實之證明或釋明方法者，除有特別情形外，當事人或利害關係人於第一次審判期日前，得聲請法院定其去識別化之代稱或代號。", "57": "不服第一審智慧財產法庭關於第五十四條第二項第一款案件依簡易程序所為裁判，提起上訴或抗告者，應向智慧財產法庭合議庭為之。", "58": "不服地方法院關於第五十四條第一項案件或第一審智慧財產法庭受理之案件，依通常、簡式審判或協商程序所為第一審裁判，提起上訴或抗告者，應向第二審智慧財產法庭為之。", "59": "前條第二項但書之情形，受移送之法院認管轄權有爭議者，除當事人已依前條第三項規定提起抗告，經最高法院認為無理由者外，應以裁定停止訴訟程序，並向最高法院請求指定管轄法院。", "60": "前條第一項停止訴訟程序之裁定，受移送法院得依聲請或依職權撤銷之。", "61": "移送訴訟前或第五十九條第二項之裁定前，如有急迫情形，事實審法院應依聲請或依職權為必要之處分。\n移送訴訟之裁定確定時，視為該訴訟自始即繫屬於受移送之法院。", "62": "不服第二審智慧財產法庭所為裁判，提起上訴或抗告者，除別有規定外，應依刑事訴訟法規定，向最高法院為之。\n前項情形，最高法院應適用第三審程序，並設立專庭或專股辦理。", "63": "審理第五十四條第一項及第二項案件之附帶民事訴訟，其刑事訴訟經依刑事訴訟法第一百六十一條第二項裁定駁回起訴者，應以裁定駁回原告之訴，並準用刑事訴訟法第五百零三條第一項至第三項規定。", "64": "不服地方法院關於第五十四條第一項案件或第一審智慧財產法庭受理之案件，依通常、簡式審判或協商程序之附帶民事訴訟所為裁判，提起上訴或抗告者，應向第二審智慧財產法庭為之。", "65": "第五十四條第一項及第二項案件之附帶民事訴訟應與刑事訴訟同時裁判。但有必要時，得於刑事訴訟裁判後六十日內裁判之。", "66": "第二十九條第一項、第三十六條至第四十條、第四十一條第一項及第五十三條規定，於審理第五十四條第一項及第二項案件或其附帶民事訴訟時，準用之。\n第四十九條規定，於審理違反商標法案件而提起之附帶民事訴訟時，準用之。\n第五十四條第一項及第二項案件，準用刑事訴訟法關於被害人訴訟參與之規定。", "67": "行政訴訟法第二編第二章簡易訴訟程序規定，於智慧財產行政事件程序不適用之。", "68": "智慧財產及商業法院組織法第三條第三款、第四款所定之行政事件，由智慧財產法院管轄。\n其他行政事件與前項各款事件合併起訴或為訴之追加時，應向智慧財產法院為之。\n智慧財產法院為辦理第一項之強制執行事務，得設執行處或囑託地方法院民事執行處或行政機關代為執行。\n債務人對於前項囑託代為執行之執行名義有異議者，由智慧財產法庭裁定之。", "69": "對於智慧財產法院之裁判，除法律別有規定外，得上訴或抗告於最高行政法院。", "70": "關於撤銷、廢止商標註冊或撤銷專利權之行政訴訟中，當事人於言詞辯論終結前，就同一撤銷或廢止理由提出之新證據，智慧財產法院仍應審酌之。\n智慧財產專責機關就前項新證據應提出答辯書狀，表明他造關於該證據之主張有無理由。", "71": "第二十九條至第四十條、第四十六條、第五十一條及第五十二條規定，於有關智慧財產行政事件，準用之。\n辦理智慧財產民事事件或刑事案件之法官，得參與就該事件或案件相牽涉之智慧財產行政事件之審判，不適用行政訴訟法第十九條第三款規定。", "72": "違反本法秘密保持命令者，處三年以下有期徒刑、拘役或科或併科新臺幣一百萬元以下罰金。\n犯前項之罪，其受命令保護之營業秘密，屬國家安全法第三條所指國家核心關鍵技術之營業秘密者，處五年以下有期徒刑、拘役或科或併科新臺幣三百萬元以下罰金。\n於外國、大陸地區、香港或澳門犯前二項之罪者，不問犯罪地之法律有無處罰規定，亦適用前二項規定。", "73": "法人之負責人、非法人團體之管理人或代表人及法人、非法人團體或自然人之代理人、受雇人或其他從業人員，因執行業務犯前條之罪者，除處罰其行為人外，對該法人、非法人團體或自然人亦科以前條第一項、第二項之罰金。但法人之負責人、非法人團體之管理人或代表人及自然人對於犯罪之發生，已盡力為防止行為者，不在此限。", "74": "查證人於法院審判時，就案情有重要關係之事項，具結而為虛偽查證或陳述者，處七年以下有期徒刑。\n犯前項之罪，於所虛偽查證或陳述之案件，裁判確定前自白者，減輕或免除其刑。\n查證人違反查證之目的，而重製、使用或洩漏因查證所知悉之營業秘密，處三年以下有期徒刑、拘役或科或併科新臺幣一百萬元以下罰金。\n犯前項之罪，其重製、使用或洩漏之營業秘密，屬國家安全法第三條所指國家核心關鍵技術之營業秘密者，處五年以下有期徒刑、拘役或科或併科新臺幣三百萬元以下罰金。", "75": "本法中華民國一百十二年一月十二日修正之條文施行前，已繫屬於法院之智慧財產民事事件，適用本法修正施行前之規定。但經當事人合意適用修正施行後之第十八條至第四十條、第四十二條、第四十四條、第四十五條及第五十三條規定者，不在此限。\n本法中華民國一百十二年一月十二日修正之條文施行前，已繫屬於法院之智慧財產刑事案件及其附帶民事訴訟，適用本法修正施行前之規定。\n本法中華民國一百十二年一百十二年一月十二日修正之條文施行前，已繫屬於法院之智慧財產行政事件，適用本法修正施行前之規定。", "76": "本法審理細則，由司法院定之。", "77": "本法施行日期，由司法院定之。"};

const EN_IP_ADJ = {"1": "Purpose\nThis Act is enacted for the purpose of protecting intellectual properties and related rights and interests through the establishment of a litigation system for the professional, proper, and expeditious adjudication of intellectual property cases.", "2": "Governing law\nIntellectual property cases shall be adjudicated pursuant to this Act. For matters not provided for under this Act, the laws applicable to civil, criminal or administrative actions, as the case may be, shall govern.", "3": "Definitions\nFor the purposes of this Act, the IPCC denotes the Intellectual Property and Commercial Court; an intellectual property tribunal and a commercial tribunal denote respectively an intellectual property tribunal and a commercial tribunal of the IPCC.\nFor the purposes of this Act, intellectual property cases denote the following cases:\n1. intellectual property civil actions\n2. intellectual property criminal cases\n3. intellectual property administrative actions\n4. other cases over which the IPCC has jurisdiction, as designated by law or the Judicial Yuan", "4": "Trade secrets definition\nFor the purposes of this Act, \"trade secrets\" denotes the trade secrets defined in Article 2 of the Trade Secrets Act.", "5": "Remote hearings\nWhere there are technological equipment for the transmission of voices and images between the premises of a party, representative, officer, agent, advocate, assistant ad litem, intervener, witness, expert witness, appraiser, verifier, court interpreter, expert, or other related party to an action and the court, allowing the direct conduct of a trial, the court may, if it deems appropriate, hear the case using such equipment upon motion or ex officio.\nIn the circumstances in the preceding paragraph, the court shall first seek the opinions of the parties.\nNo appeal may be lodged if the motion in Paragraph 1 is denied.\nIn the circumstance in Paragraph 1, the venue of attendance specified on the date notification or summons shall be the premises where such equipment are located.\nIf a transcript or other documents are prepared during an action pursuant to Paragraph 1, and signatures are required, such transcript or documents shall be transmitted from the court remotely. After their contents are verified and they are signed, they shall be returned to the court via technological equipment. Such transcript or other documents have the same effect as having been signed.\nThe rules governing the trial described in Paragraph 1 and transmission of documents in the preceding paragraph shall be established by the Judicial Yuan.", "6": "Technical Examination Officers\nThe court may, whenever necessary, order a Technical Examination Officer to perform the following duties:\n1. ask questions or explain to the parties pertaining to factual and legal issues based on his or her professional knowledge, in order to clarify matters involved in the action\n2. ask questions directly to witnesses, expert witnesses, or appraisers\n3. state opinions on the case to the judge\n4. assist in evidence-taking in the event of preservation of evidence\n5. assist in injunctive procedures or compulsory enforcement procedures\n6. assist with a verifier's verification\nThe court may order a Technical Examination Officer to compile a report on the results of his or her performance of duties.\nA report compiled by a Technical Examination Officer may be disclosed in whole or in part where the court deems necessary.\nBefore any special professional knowledge already known to the court as provided by a Technical Examination Officer is adopted as basis for judgment, the parties shall be accorded an opportunity to present their arguments regarding such knowledge.", "7": "Disqualification of Technical Examination Officers\nDisqualification of a Technical Examination Officer shall, depending on the procedure he or she is involved in, be governed mutatis mutandis by the rules of disqualification of a judge as provided in the procedure concerned.", "8": "Exclusion of certain CPC provisions\nChapters III and IV of Part I of the Code of Civil Procedure shall not apply in civil actions concerning intellectual properties.", "9": "Jurisdiction over IP civil cases\nFirst instance civil actions specified in Subparagraphs 1 and 4 of Article 3 of the Intellectual Property and Commercial Court Organization Act are submitted to the exclusive jurisdiction of the IPCC, notwithstanding any amendment or addition of a claim, provided the court in Articles 24 and 25 of the Code of Civil Procedure also has jurisdiction in the circumstances described in such articles.\nJurisdiction over a civil action as in the preceding paragraph shall be exercised by the IPCC if said case involves in whole or in part a labor incident as in Paragraph 1 of Article 2 of the Labor Incident Act.\nAdjudication of the civil action in the preceding paragraph by an intellectual property tribunal is governed by this Act, and by the Labor Incident Act where this Act is silent, provided Paragraph 1 of Article 4 and Chapter 2 of the Labor Incident Act do not apply.\nAn intellectual property tribunal shall by a ruling transfer a civil action as in Paragraph 1 to a commercial tribunal upon motion or ex officio if said case involves in whole or in part a commercial action as in Paragraph 2 of Article 2 of the Commercial Case Adjudication Act.", "10": "Mandatory attorney representation\nA party to an intellectual property civil action shall retain a lawyer as an agent ad litem if any of the following occurs, unless the party or its legal representative is qualified as a judge, prosecutor, or lawyer:\n1. a first instance civil action, where the amount or value of the claim exceeds the amount where an appeal may be taken to the court of third instance as in Article 466 of the Code of Civil Procedure\n2. a first instance civil action over patent rights, copyrights in computer programs or trade secrets\n3. a second instance civil action\n4. a motion for preservation of evidence or injunctive procedure, or a motion or interlocutory appeal over other case arising out of an action as in any of the preceding three subparagraphs, which is filed before a suit is initiated\n5. a retrial of the action in any of the preceding four subparagraphs\n6. an action before the court of third instance\n7. other action in which an agent ad litem is required by the Judicial Yuan to be retained", "11": "Litigation aid\nIf a party as in the main text of Paragraph 1 of the preceding article lacks the financial means to retain an agent ad litem, it may file a motion with the court to appoint a lawyer as its agent ad litem in accordance with provisions governing litigation aid.\nWhere a party lodging an appeal or interlocutory appeal files a motion as in the preceding paragraph, the court of the previous instance shall forward the dossier to the higher court.", "12": "Effect of litigation acts; defective representation\nA case as in Paragraph 1 of Article 10 is invalid unless the litigation is conducted by an agent ad litem, unless otherwise stipulated.\nFor the filing of an action, appeal, motion, or interlocutory appeal, if no agent ad litem is appointed in accordance with Paragraph 1 or 5 of Article 10, or if the one appointed in accordance with Paragraph 5 is deemed inappropriate by the court, the presiding judge shall order rectification be made within a prescribed time limit.", "13": "Attendance of party alongside agent\nIn a case as in the main text of Paragraph 1 of Article 10, an agent ad litem may appear together with the party on the court date, and the party may make statements orally with the permission of the presiding judge.\nThe permission in the preceding paragraph may be revoked by the presiding judge by a ruling at any time.\nA party is deemed absent if it fails to retain an agent ad litem as required or if the agent ad litem it retains fails to attend court.\nIn the circumstance referenced in Paragraph 1, a party may conduct litigation for itself as follows:\n1. admission\n2. reaching of settlement or mediation\n3. withdrawal of an action or motion\n4. withdrawal of an appeal or interlocutory appeal", "14": "Effect of agent's litigation acts\nAny litigation by or against an agent ad litem is directly effective against the party personally, unless an admission or statement of facts by the agent ad litem is promptly revoked or corrected by the party attending court in person.\nIn the case of willful misconduct or negligence by an agent ad litem in litigation, the party shall bear the same responsibility as if it were its own willful misconduct or negligence.", "15": "Cap on attorney remuneration\nRemuneration of lawyers as in the main text of Paragraph 1 of Article 10 and Paragraph 1 of Article 11 is part of litigation expenses or procedural costs and shall be capped. The Judicial Yuan will prescribe the standards for paying remuneration in consultation with the Ministry of Justice and Taiwan Bar Association etc.", "16": "Patent attorney as joint agent\nA party to the patent actions in Subparagraphs 2 to 7 of Paragraph 1 of Article 10 may also appoint a patent attorney as the joint agent ad litem with the permission of the presiding judge.\nThe permission in the preceding paragraph may be revoked by the presiding judge by a ruling at any time.\nIn the circumstance in Paragraph 1, the patent attorney and the lawyer shall jointly attend court to litigate unless the presiding judge permits otherwise.\nNo act of litigation of a patent attorney that contradicts those of a lawyer is valid.\nRemuneration of patent attorneys is not part of litigation expenses or procedural costs.", "17": "Application to interveners\nArticles 10, 12 to 14, and 16 are applicable to an intervener mutatis mutandis.\nRemuneration of an intervener's lawyers and patent attorneys is not part of litigation expenses or procedural costs.", "18": "Trial plan\nThe court shall decide on a trial plan through discussion with the parties when it adjudicates a case as in Subparagraphs 1 to 3, and Subparagraph 5, of Paragraph 1 of Article 10, or other case, when the case is complicated, or where necessary.", "19": "Verifier in patent infringement cases\nTo determine the truthfulness of a factum probandum in a patent infringement case, the court may, upon motion filed by a party, appoint a verifier to verify the documents or devices or equipment held or managed by the opposing party or a third party, unless the time or costs required for the verification or the burden on the verified party is obviously disproportionate.\nAn application for verification as in the preceding paragraph shall specify the following expressly in writing:\n1. the probable cause for patent infringement or the likelihood of patent infringement\n2. the reasons the applicant is unable to collect evidence by itself or by other means\n3. the necessity to order a Technical Examination Officer to assist a verifier with verification\n4. the object to be verified and its location\n5. the connection between the factum probandum and evidence to be obtained through verification\n6. the matter, method of, and necessity for verification", "20": "Verifier qualifications and disclosure\nNo person in any of the situations in Article 32 of the Code of Civil Procedure with a party or a third party may act as a verifier.", "21": "Revocation of verifier appointment\nThe court may revoke a ruling as in Paragraph 5 of Article 19 ex officio if any of the following occurs:\n1. the circumstance in the proviso of Paragraph 1 of Article 19\n2. a violation of Paragraph 1 of the preceding article\n3. a violation of the disclosure provision of Paragraph 2 of the preceding article\n4. a stake as in Subparagraphs 2 to 4 of Paragraph 2 of the preceding article, which is likely to affect the verifier's objectivity or impartiality", "22": "Verification procedure\nA verifier shall sign a written oath before verification, indicating that its verification will be impartial and truthful and that it agrees to be subjected to punishment for perjury if its verification is false.\nIn conducting a verification, a verifier may access the place of the object to be verified and may ask questions to a verified party or request said party to present a necessary document.\nWhere a party under verification refuses or hinders a verification without good cause, the court may deem the factum probandum which the applicant seeks to be verified to be true.", "23": "Verification report and trade secret protection\nA verifier shall compile a verification report and submit it to the court after verification.\nThe court shall deliver a photocopy or electronic file of the verification report received to the party under verification.\nA party under verification shall, within 14 days of the service of a photocopy or electronic file of the verification report, file a motion with the court for a ruling prohibiting disclosure of the report in whole or in part to the parties to the action if the report involves trade secrets.", "24": "Access to verification report\nIf a party under verification in Paragraph 3 of the preceding article fails to file a motion within the prescribed time limit or is not prohibited by a court ruling from disclosing a verification report, a party to the action may apply to a court clerk for reviewing, transcribing, videotaping, or otherwise reproducing the report.", "25": "Verifier's right to refuse testimony\nA witness having acted as a verifier may refuse to testify on trade secrets that became known to it due to its verification.\nThe witness in the preceding paragraph may not refuse to testify if relieved of its verifier's duty of secrecy.", "26": "Verifier's costs\nA verifier's per diem fee, travel expenses, remuneration, and other costs required for its verification are governed mutatis mutandis by appraiser provisions and form part of the litigation expenses.", "27": "Application to copyright and trade secret cases\nArticle 19 to the preceding article are applicable mutatis mutandis to copyrights in computer programs and trade secret infringements.", "28": "Application of Commercial Case Adjudication Act\nArticles 47 to 52 and Article 75 of the Commercial Case Adjudication Act are applicable to intellectual property civil actions mutatis mutandis.", "29": "Special professional knowledge; disclosure of conviction\nThe court shall accord the parties an opportunity to present their arguments on any special professional knowledge known to it before adopting it as basis for judgment.\nThe Presiding Judge or Commissioned Judge shall direct the parties to issues concerning the legal relations of the disputed matters, and may, at an appropriate time, provide his or her legal opinions and disclose conviction to the extent appropriate.", "30": "Patent claim construction\nIf a dispute occurs over the claim construction of a patent scope in the court's adjudication of a civil action arising out of a patent right, it is advisable for the court to define at an appropriate time, upon motion or ex officio, the literal meaning of the patent right and to disclose its conviction to the extent appropriate.", "31": "Non-public trial involving trade secrets\nWhen a party's means of attack or defense involves its own trade secrets or those of a third party, the court may hold a non-public trial upon motion of the party if the court deems appropriate; the same applies where both parties have agreed to a non-public trial.", "32": "Restriction on litigation materials involving trade secrets\nWhere litigation materials involve trade secrets, the court may, without prejudicing the parties' benefit of argument, refuse or otherwise allow limited review, transcription, videotaping, or otherwise reproduction of such litigation materials upon motion of the parties or a third party.", "33": "Revocation and appeals regarding restriction orders\nAn opposing party, a party concerned, or a third party may file a motion with the court to revoke or amend its ruling which disallows or restricts the review, transcription, videotaping, or otherwise reproduction as in Paragraph 1 of the preceding article if the reason for such ruling ceases to exist.\nNo trade secret known or held upon the review, transcription, videotaping, or otherwise reproduction in Paragraph 1 the preceding article may be used for purposes other than conducting the litigation.", "34": "Compelling submission of documents\nThe court may impose a penalty not more than NT$100,000 upon a holder of a document, object for inspection, or data required for appraisal who refuses without good cause to submit such document, object, or data to the court, and the court may order by a ruling such holder be subject to compulsory measures when necessary.", "35": "Specific defense in infringement cases\nIn infringement cases involving patent rights, copyrights in computer programs or trade secrets, if a party has made a preliminary showing that any rights or interests that it claims have been or are likely to be infringed, and the opposing party denies such claim, the court shall order the opposing party to raise a specific defense as to the fact and evidence concerning its denial within a prescribed time limit.\nThe court may, subject to the circumstances, find the preliminary showing of the infringed party true if the opposing party fails without good cause to raise a defense within the prescribed time limit.", "36": "Confidentiality preservation order\nWhere any of the following situations occurs with respect to trade secrets held by a party or a third party, the court may, upon motion along with a preliminary showing by such party or third party, issue a confidentiality preservation order upon the opposing party, the first-mentioned party, an agent, an assistant ad litem, or other related party to the action:\n1. A party's own trade secrets or those of a third party are disclosed in the first-mentioned party's pleadings, or evidence-taking that has been or is to be made involves trade secrets of the party or a third party.\n2. Limitation on discovery or use is required so as to prevent the discovery or use of the trade secrets in the preceding paragraph being intended for purposes other than those related to the case, and there are concerns of obstruction to the party's or the third party's business operation as a result of the disclosure of the trade secrets.\nThe person subject to a confidentiality preservation order shall not use the trade secrets for purposes other than those related to the case, nor shall it disclose said trade secrets to those not subject to the order.", "37": "Motion for confidentiality preservation order\nA motion seeking a confidentiality preservation order shall specify in writing the following:\n1. The persons to be subject to the confidentiality preservation order;\n2. The trade secrets to be protected by such order;\n3. The facts showing that conditions described in Paragraph 1 of the preceding article are met.", "38": "Ruling granting confidentiality preservation order\nA ruling granting a confidentiality preservation order shall specify the trade secrets to be protected, grounds for such protection, and content of the prohibition.\nA ruling granting a confidentiality preservation order shall be served on the party or the third party holding the trade secret, the requester, and anyone subject to the order.\nA confidentiality preservation order shall become effective upon being served on the person subject thereto.\nAn interlocutory appeal may be filed if a motion or request for a confidentiality preservation order is denied by the court.", "39": "Revocation of confidentiality preservation order\nA movant or requester of a confidentiality preservation order may, unless otherwise stipulated, move for or request revocation of the order.\nA person subject to a confidentiality preservation order may file a motion to revoke such order with the court at which the action is pending when the requirements specified in Paragraph 1 of Article 36 are not met.\nThe court may revoke a confidentiality preservation order ex officio if it deems the ruling granting the order inappropriate.\nA confidentiality preservation order shall become void when the ruling revoking such order becomes conclusive.", "40": "Dossier access where confidentiality preservation order exists\nIn an action where a confidentiality preservation order has been granted, the court clerk shall immediately notify the party or the third party that holds the trade secret as in Paragraph 1 of Article 36 of any application made by anyone not subject to the order for review, transcription, videotaping, or otherwise reproduction of the dossier documents.", "41": "IP right invalidity defense\nWhen a party claims or defends that an intellectual property right shall be cancelled or revoked, the court shall decide based on the merit of the case, and the Code of Civil Procedure, Administrative Litigation Act, the Plant Variety and Plant Seed Act, or other applicable laws concerning the stay of an action shall not apply.\nUnder the circumstances in the preceding paragraph, the holder of the intellectual property right shall not claim in the civil action any rights against the opposing party where the court has recognized the grounds for cancellation or revocation of the intellectual property right.", "42": "Notification to IP authority\nThe court shall notify the competent intellectual property authority immediately under the circumstance in Paragraph 1 of the preceding article. The same applies when the proceedings are concluded.", "43": "Amendment of patent claims during litigation\nWhen a party claims or defends in accordance with Paragraph 1 of Article 41 that there are grounds for revocation of a patent right, where the patentee has applied to the competent patent authority for amending the claims, the party shall state to the court that the amended claims apply to its further claim or assertion on the patent right.\nIf a patentee is prevented by factors not attributable to itself from applying to the competent patent authority for the requested amendment, and if denying such the amendment is obviously unfair, the party may directly state to the court that the aforesaid amendment to the claims applies.\nThe court shall adjudicate the case based on the amended claims if it finds the amendment is legal.", "44": "Consultation with IP authority\nThe court may, where necessary, seek the advice of the competent intellectual property authority on relevant legislation or other necessary matters for the purpose of determining the merits of a claim or defense which a party raises in accordance with Paragraph 1 of Article 41.", "45": "Notification of action to co-interest parties\nA right-holder, a trade secret owner, or an exclusive licensee of an exclusively licensed intellectual property right or interest that is engaged in a civil action with a third party over said right or interest shall notify the other party of the action and phase of litigation at an appropriate time prior to the conclusion of oral argument.", "46": "Preservation of evidence\nWhere no action has been initiated, a motion for preservation of evidence shall be made to the court where the action is to be brought; where an action has been initiated, such motion shall be made to the court where the action is pending.\nThe court may inspect, examine, or preserve documentary evidence or interrogate a witness, expert witness, or the party itself in the execution of the preservation of evidence.\nThe court may order a Technical Examination Officer to execute his duties on site in the execution of the preservation of evidence.\nWhere a respondent refuses an order of preservation of evidence without good cause, the court may, when necessary, enforce such order by force and request assistance from the police authority.", "47": "Appellate jurisdiction over IP civil cases\nThe IPCC has exclusive jurisdiction over an appeal or interlocutory appeal against a judgment rendered by the court of first instance on an intellectual property civil action, unless otherwise stipulated.", "48": "Third instance review\nUnless otherwise prescribed herein, an appeal or interlocutory appeal against a judgment of the second instance court regarding an intellectual property civil action may be filed with the third instance court.\nThe court of third instance shall establish a special tribunal or special division in the circumstance in the preceding paragraph.", "49": "Limitation on retrial\nWhere any of the following measures becomes conclusive, no party may initiate an action for retrial in accordance with Subparagraph 11 of Paragraph 1 of Article 496 of the Code of Civil Procedure in regard to a final and conclusive judgment on a patent, trademark, or plant variety right infringement case:\n1. a measure finding the invalidation of a patent right, invalidation or revocation of a trademark right, or nullification or cancellation of a plant variety right founded\n2. a measure finding an invalidation action over the extension of the term of an invention patent founded\n3. a measure approving an amendment of the description, claim(s), or drawing(s) of a patent", "50": "Order for payment\nApplication for and handling of an order for payment in intellectual property civil actions shall comply with the provisions of Part VI of the Code of Civil Procedure.\nWhere opposition is raised in due process by a debtor to an order for payment, the court that grants such order shall transfer the dossier documents to the IPCC.", "51": "Jurisdiction over provisional measures\nWhere no action has been initiated, an application for provisional attachment, preliminary injunction, or injunction maintaining the temporary status quo shall be filed with the court where the action is to be brought; where the action has been initiated, such application shall be filed with the court where the action is pending.", "52": "Injunction maintaining temporary status quo\nAn applicant seeking an injunction maintaining the temporary status quo shall provide a preliminary showing proving it is necessary to prevent material harm or imminent danger or other similar circumstances. The court shall dismiss the application if the preliminary showing is insufficient.\nWhen the grounds for an application for an injunction maintaining the temporary status quo are demonstrated in the preliminary showing, the court may still order the applicant to provide a bond for granting the injunction.\nThe court may, upon motion or ex officio, revoke an injunction maintaining the temporary status quo where the movant fails to prove to the court within a peremptory period of 14 days of the service of the ruling granting the injunction that an action has been initiated.\nWhen the court revokes an injunction maintaining the temporary status quo because such order is not justified ab initio, the applicant of the injunction shall indemnify the respondent against damage suffered.", "53": "Service of judgment\nAn authenticated copy of a judgment shall be served upon each of the parties. Service of an authenticated copy in the form of an electronic document is subject to consent of the party to be served, provided no authenticated copy in the form of an electronic document may be served on a prisoner.\nThe preceding paragraph applies to a ruling mutatis mutandis.", "54": "Criminal jurisdiction\nThe district court has jurisdiction over the criminal cases in the main text of Subparagraph 2, and Subparagraph 4, of Article 3 of the Intellectual Property and Commercial Court Organization Act.\nThe court of first instance regarding criminal cases that involve trade secrets is governed by the following subparagraphs but not the preceding paragraph:\n1. An intellectual property tribunal of first instance has jurisdiction over cases concerning the offenses in Articles 13-1, 13-2, Paragraph 3 of Article 13-3, and Article 13-4 of the Trade Secrets Act.\n2. An intellectual property tribunal of second instance has jurisdiction over cases concerning the offenses in Paragraphs 1 to 3 of Article 8 of the National Security Act.", "55": "Non-public trial (criminal)\nWhere a dossier or an exhibit involves trade secrets, the court may hold a non-public trial upon motion filed by a party or an interested party.\nWhere dossier documents or evidence involves trade secrets, the court may set limits on the review, transcription, videotaping, or otherwise transcription of such dossier documents or evidence upon motion filed by a party or an interested party or ex officio.", "56": "Pseudonymization of trade secrets (criminal)\nWhere a dossier or exhibit of a trade secret criminal case involves a trade secret of a party or an interested party which is a method for proving or making a preliminary showing of a fact of an offense or of damages, the party or interested party may file a motion with the court for determining a de-identified pseudonym or code before the first trial date.", "57": "Appeals from summary proceedings in trade secret cases\nAn appeal or interlocutory appeal against a judgment which an intellectual property tribunal of first instance renders on a case as in Subparagraph 1 of Paragraph 2 of Article 54 in summary proceedings shall be filed with the collegiate bench of an intellectual property tribunal of first instance.", "58": "Second instance appellate jurisdiction (criminal)\nAn appeal or interlocutory appeal against a judgment of the first instance rendered by a district court in an ordinary proceeding, summary trial proceeding, or bargaining process on a case as in Paragraph 1 of Article 54 shall be filed with an intellectual property tribunal of second instance.", "59": "Jurisdictional dispute resolution\nThe transferee court shall stay the proceedings by a ruling and request the Supreme Court to designate the court with jurisdiction if the first-mentioned court finds jurisdiction disputed.", "60": "Withdrawal of stay proceedings\nA transferee court may reverse a ruling to stay the proceedings as in Paragraph 1 of the preceding article upon motion or ex officio.", "61": "Urgent measures during transfer\nA trial court shall take necessary measures upon motion or ex officio if there exist emergent circumstances before it transfers an action.\nAn action is deemed pending before a transferee court ab initio when the ruling by which said action is transferred becomes conclusive.", "62": "Third instance review (criminal)\nAn appeal or interlocutory appeal against a judgment of an intellectual property tribunal of second instance shall be filed with the Supreme Court in accordance with the Code of Criminal Procedure unless otherwise stipulated.\nThe Supreme Court shall apply the procedure of third instance and establish a special tribunal or special division.", "63": "Supplemental civil actions\nIn regard to a supplemental civil action in which a case as in Paragraphs 1 and 2 of Article 54 is adjudicated, if prosecution in the relevant criminal action is dismissed by a ruling, the plaintiff's suit shall be dismissed by a ruling.\nExcept where the Supreme Court renders a judgment pursuant to Articles 508 through 511 of the Code of Criminal Procedure, the court shall try the supplemental civil action of a case concerning Paragraphs 1 and 2 of Article 54 by itself.", "64": "Appellate jurisdiction over supplemental civil actions\nAn appeal or interlocutory appeal against a judgment on a supplemental civil action of the district court in a case as in Paragraph 1 of Article 54 shall be filed with an intellectual property tribunal of second instance.", "65": "Timing of supplemental civil action judgment\nA supplemental civil action in a case as in Paragraphs 1 and 2 of Article 54 shall be decided with the criminal action at the same time. However, if necessary, it can be decided within 60 days after the judgment on the criminal action is rendered.", "66": "Mutatis mutandis application (criminal)\nThe provisions of Paragraph 1 of Article 29, Articles 36 to 40, Paragraph 1 of Article 41, and Article 53 shall apply mutatis mutandis to a case in Paragraphs 1 and 2 of Article 54 or its supplemental civil action.", "67": "Exclusion of summary administrative proceedings\nThe summary proceeding in Chapter II of Part II of the Code of Administrative Litigation Proceedings shall not apply to an administrative action concerning intellectual properties.", "68": "Administrative jurisdiction\nThe administrative actions prescribed in Subparagraphs 3 and 4 of Article 3 of the Intellectual Property and Commercial Court Organization Act are subject to the jurisdiction of the IPCC.\nWhen other administrative actions are jointly initiated with the actions set forth above, or are filed in addition thereto, they shall be filed with the IPCC.", "69": "Appeal to Supreme Administrative Court\nUnless otherwise prescribed by law, an appeal or interlocutory appeal against a judgment of the IPCC may be filed with the Supreme Administrative Court.", "70": "New evidence in administrative cases\nIn an administrative action concerning cancellation or revocation of a registered trademark or revocation of a patent right, the IPCC shall take into account any new evidence submitted on the same grounds for the cancellation or revocation prior to the end of the oral argument.\nThe competent intellectual property authority shall provide written briefs in response to the new evidence in the preceding paragraph.", "71": "Mutatis mutandis application (administrative)\nThe provisions of Articles 29 through 40, Article 46, Articles 51 and 52 shall apply mutatis mutandis to an administrative action concerning intellectual properties.\nA judge handling intellectual property civil or criminal actions may participate in the relevant intellectual property administrative trial, to which Subparagraph 3 of Article 19 of the Code of Administrative Litigation Proceedings shall not apply.", "72": "Violation of confidentiality preservation order\nOne who violates a confidentiality preservation order under this Act shall be subject to a sentence of imprisonment not more than three years, detention, or in lieu thereof or in addition thereto, a fine of not more than NT$1,000,000.\nAnyone committing the offense in the preceding paragraph will be sentenced to imprisonment not more than five years, detention, or in lieu thereof or in addition thereto, a fine of not more than NT$3,000,000 if the relevant trade secret protected by the order is a trade secret of national core key technologies under Article 3 of the National Security Act.\nThe preceding two paragraphs apply where an offense is committed overseas or in China, Hong Kong, or Macau, regardless of whether punishment is set forth in the laws of the place of the offense.", "73": "Corporate liability\nWhere the responsible person of a juridical person, or a manager or a representative of an unincorporated association, or an agent or an employee commits in conducting business an offense described in the preceding article, not only shall the committer be punished, but such juridical person, the unincorporated association, or the natural person shall also be subject to the fine set forth in Paragraphs 1 and 2, unless the responsible person has used its best efforts to prevent the offense.", "74": "False verification by verifier\nA verifier who makes a false verification or statement in a court trial with regard to a matter material to a case after signing a written oath will be sentenced to imprisonment not more than seven years.\nA person having committed an offense specified in the preceding paragraph will have its punishment reduced or remitted if it makes a confession before a judgment becomes conclusive.\nA verifier who reproduces, uses, or divulges against the purpose of verification a trade secret will be sentenced to imprisonment not more than three years, detention, or in lieu thereof or in addition thereto, a fine of not more than NT$1,000,000.\nAnyone committing the offense in the preceding paragraph will be sentenced to imprisonment not more than five years, detention, or in lieu thereof or in addition thereto, a fine of not more than NT$3,000,000 if the trade secret involves national core key technologies.", "75": "Transitional provisions\nIntellectual property civil actions pending before court prior to the enforcement of the January 12, 2023 amendment of this Act are governed by this Act as pre-amended, unless the parties mutually agree to the application of Articles 18 to 40, Articles 42, 44, 45, and 53 as amended.\nIntellectual property criminal cases and supplemental civil actions thereof as pending before court prior to the enforcement of the January 12, 2023 amendment of this Act are governed by this Act as pre-amended.\nIntellectual property administrative actions pending before court prior to the enforcement of the January 12, 2023 amendment of this Act are governed by this Act as pre-amended.", "76": "Adjudication rules\nThe Judicial Yuan shall enact the adjudication rules of this Act.", "77": "Date of enforcement\nThis Act shall be enforced as of the date to be prescribed by the Judicial Yuan."};

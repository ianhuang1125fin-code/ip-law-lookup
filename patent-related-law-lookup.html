解放の停止を直ちに通知される。", "55": "解放停止の期間\n申請人が解放停止の通知を受けた後10労働日以内に、被告以外の当事者が実体に関する手続を開始した旨又は権限ある機関が解放停止を延長する暫定的措置を採った旨を税関当局が通知されない場合は、当該品物が輸入又は輸出に関するその他の条件を満たす限り解放される。適切な場合には、この期間をさらに10労働日延長することができる。", "56": "輸入者及び品物の所有者の賠償\n誤った差押え又は第55条に従った解放により輸入者、荷受人及び品物の所有者に損害が生じた場合には、当局は申請人に対して適切な賠償を命じる権限を有する。", "57": "検査権及び情報提供\n加盟国は、権限ある機関に対して、秘密情報の保護を損なうことなく、権利者に対して税関当局が差し押さえた品物を検査し申立の実証に十分な機会を与える権限を付与する。権限ある機関は輸入者に対して当該品物を検査する同等の機会を与える権限をも有する。案件の実体について肯定的な決定が行われた場合には、加盟国は権限ある機関が荷送人、輸入者及び荷受人の氏名及び住所並びに当該品物の数量を権利者に通知する権限を付与することができる。", "58": "職権による行動\n加盟国が権限ある機関に対して自己の発意で行動し知的財産権が侵害されているという表見証拠を有する品物の解放を停止することを要求する場合には次のことが適用される。\n(a) 権限ある機関はいつでも権利者に対してその権限の行使を援助するために必要な情報を提供するよう求めることができること。\n(b) 輸入者及び権利者には解放停止が直ちに通知されること。輸入者が権限ある機関に解放停止についての申立をした場合には、第55条の条件が準用される。\n(c) 加盟国は、権限ある機関及び職員が善意をもって適切な救済措置を採り又は採ることを意図した場合にのみ当該機関及び職員を法的責任から免除することができること。", "59": "救済\n権利者がその他の訴訟を提起する権利及び被告が司法機関に審査を求める権利を損なうことなく、権限ある機関は第46条に規定する原則に従い知的財産権を侵害する品物を廃棄し又は処分するよう命じる権限を有する。商標偽造品については、特別の事情がある場合を除き、当局は侵害品を変更していない状態で再輸出し又は異なる税関手続の下に置くことを許可してはならない。", "60": "少量の輸入\n加盟国は、旅行者の個人荷物又は小口郵便に含まれる商業的性質のない少量の品物については上記の規定の適用を除外することができる。", "61": "加盟国は、少なくとも商業的規模での意図的な商標偽造又は著作権侵害の場合について刑事手続及び罰則を規定する。利用しうる救済措置には、十分な抑止力となりかつ同程度の重大性の犯罪に対する罰則の水準と整合的な、拘禁刑及び／又は金銭的罰金が含まれる。適切な場合には、利用しうる救済措置には、侵害品及び侵害行為に主として使用された材料及び用具の差押え、没収及び廃棄も含まれる。加盟国は、その他の知的財産権の侵害の場合、特に意図的なものでかつ商業的規模のものに対しても、刑事手続及び罰則を規定することができる。", "62": "1. 加盟国は、第II部第2節から第6節までに規定する知的財産権の取得及び維持の条件として合理的な手続及び手続形式に従うことを要求することができる。これらの手続及び手続形式は、この協定の規定に適合するものとする。\n2. 知的財産権の取得が付与又は登録を受けることを条件とする場合には、加盟国は、権利取得のための実体的条件が遵守されることを条件として、付与又は登録の手続が保護期間を不当に短縮しないよう合理的な期間内に付与又は登録を可能にすることを確保する。\n3. パリ条約（1967年）第4条の規定はサービスマークに準用される。\n4. 知的財産権の取得又は維持の手続並びに加盟国の法律が規定する場合の行政上の取消及び異議申立て、取消、無効等の当事者間手続は、第41条第2項及び第3項の規定する一般的原則に従う。\n5. 第4項に規定する手続の最終的な行政上の決定は司法機関又は準司法機関による審査を受けなければならない。ただし、異議申立て又は行政上の取消が成功しなかった場合に審査の機会を提供する義務はない。ただし、当該手続の根拠となった理由は（行政上の）無効手続の対象となりうる。", "63": "透明性\n1. 各加盟国の有効な法令及び規則、最終的な司法上の決定及び一般的に適用可能な行政上の裁定であって知的財産権（知的財産権の利用可能性、範囲、取得、執行及び権利の濫用防止）に関するこの協定の事項に関連するものは、政府及び権利者がそれに精通できるように国語で公告し又は公告が実際に行われない場合には公衆が入手できるようにする。加盟国相互の間の有効な協定もこの協定の事項に関連する場合には公告される。\n2. 加盟国は、第1項に規定する法令及び規則を、この協定の運用の審査を援助するためにTRIPS理事会に通報する。\n3. 各加盟国は、他の加盟国の書面による要請に応じて第1項に規定する種類の情報を提供できるよう準備していなければならない。\n4. 第1項から第3項までのいかなる規定も、加盟国が法律の執行を妨げ若しくは公共の利益に反することとなり又は特定の公企業若しくは私企業の正当な商業上の利益を損なうこととなる秘密情報を開示することを要求するものではない。", "64": "紛争解決\n1. 争点解決了解によって解釈されかつ適用されるGATT1994第22条及び第23条の規定は、この協定に基づく紛争の協議及び解決に適用される。ただし、この協定に別段の規定がある場合を除く。\n2. GATT1994第23条第1項(b)及び(c)の規定は、WTO協定の効力発生後5年間はこの協定に基づく紛争の解決には適用しない。\n3. 第2項の期間中に、TRIPS理事会は、この協定に基づくGATT1994第23条第1項(b)及び(c)に規定する申立の範囲及び様式を検討し、その勧告を承認のために閣僚会議に提出する。", "65": "経過取極\n1. 第2項、第3項及び第4項に従うことを条件として、加盟国は、WTO協定の効力発生後1年の期間が満了するまでこの協定の規定を適用することを義務づけられない。\n2. 開発途上国加盟国は、第3条、第4条及び第5条の規定を除くほか、この協定の規定の適用を前項の期間からさらに4年間延期する権利を有する。\n3. 中央管理経済から自由市場経済へ移行する過程にあり知的財産権制度の改革を行いかつ知的財産権の法令の準備及び実施において特別の問題に直面している他の加盟国も、前項と同一の猶予期間を受ける権利を有する。\n4. 開発途上国加盟国がこの協定の適用日において第2項の規定に従い製品特許の保護をその領域内で保護されていない技術分野に拡大することを義務づけられる場合には、当該加盟国はこの協定の第II部第5節の規定の当該技術分野への適用についてさらに5年間延期することができる。\n5. 第1項から第4項までの猶予期間を利用する加盟国は、その期間中にその国内法令及び慣行においてなされる変更がこの協定の規定への一致の程度を引き下げる結果とならないことを確保する。", "66": "後発開発途上国加盟国\n1. 後発開発途上国加盟国の特別のニーズ及び要件、その経済上、財政上及び行政上の制約並びに実行可能な技術基盤を構築する上での柔軟性の必要性に鑑み、当該加盟国は、第3条から第5条までの規定を除くほか、第65条第1項に規定する日から10年間この協定を実施することを要求されない。TRIPS理事会は、後発開発途上国加盟国の正式に動機付けられた要請があったときはこの期間を延長する。\n2. 先進国加盟国は、後発開発途上国加盟国が健全かつ実行可能な技術基盤を構築することを可能にするために技術移転を促進し及び奨励するための誘因を自国の領域内の企業及び機関に対して提供する。", "67": "技術協力\n先進国加盟国は、この協定の実施を促進するために、要請に基づき及び相互に合意された条件で、開発途上国及び後発開発途上国加盟国のために技術的及び財政的な協力を提供する。この協力には、知的財産権の保護及び執行に関する国内立法の準備並びに権利の濫用の防止に関する援助、並びに国内の機関及び機関の設立及び強化を支援すること（人材の訓練を含む）が含まれる。", "68": "TRIPS理事会\nTRIPS理事会は、この協定の運用を監視し、特に加盟国によるこの協定上の義務の遵守を監視するとともに、知的財産権の通商関連の側面に関する事項について加盟国に協議の機会を与える。また、加盟国が指定するその他の責務を果たし、特に紛争解決手続の文脈において加盟国から要請された援助を提供する。理事会はその任務の遂行に当たり適当と認める情報源に協議し情報を求めることができる。WIPOとの協議において、理事会はその最初の会合から1年以内に当該機関との協力についての適切な取決めを設けることを求める。", "69": "国際協力\nすべての加盟国は、知的財産権を侵害する品物の国際的取引を排除するために相互に協力することに同意する。この目的のために、加盟国は自国の行政内に連絡部署を設け通報し、侵害品の貿易に関する情報を交換できるよう準備する。加盟国は特に商標偽造品及び著作権侵害品の取引に関して各国の税関当局間での情報交換及び協力を促進する。", "70": "現存の対象の保護\n1. この協定は、当該加盟国についてこの協定が適用される日前に行われた行為については義務を生じさせない。\n2. この協定の規定に別段の定めがある場合を除き、この協定は当該加盟国についてこの協定が適用される日において存在しかつ当該日において当該加盟国において保護されているすべての対象又はその後この協定の保護要件を満たすものに対して義務を生じさせる。現存する著作物に関する著作権上の義務は、ベルヌ条約（1971年）第18条の規定のみに従い決定される。実演家及びレコード製作者のレコードにおける権利に関する義務は、この協定第14条第6項の規定に従いベルヌ条約（1971年）第18条を準用することのみによって決定される。\n3. この協定の適用の日において公有に帰している対象については、加盟国は保護を回復する義務を負わない。\n4. この協定に適合した法令によって侵害となる特定の保護の対象に関する行為であって、当該加盟国がWTO協定を受諾する前に開始されあるいは相当の投資がなされたものについては、加盟国は権利者が利用できる救済措置を制限し、この協定の当該加盟国への適用後もそのような行為の継続を可能にすることができる。ただし、少なくとも権利者が衡平な報酬を受けることを規定しなければならない。", "71": "検討及び修正\n1. TRIPS理事会は、第65条第2項に規定する過渡期間の満了後にこの協定の実施を検討する。理事会は、実施において得られた経験を考慮してその日から2年後及びその後同一間隔で検討する。理事会はまた、この協定の修正の根拠となりうる関連する新たな展開を審慮するために検討を行うことができる。\n2. 修正は、他の多国間協定で達成されかつ効力を生じておりかつWTOのすべての加盟国によって受諾された知的財産権のより高い保護レベルへの調整にのみ役立つ場合には、TRIPS理事会のコンセンサスによる提案に基づきWTO協定第10条第6項に従って閣僚会議による行動のために提出することができる。", "72": "留保\nこの協定のいかなる規定についても、他の加盟国の同意なく留保を付することはできない。", "73": "安全保障上の例外\nこの協定のいかなる規定も、次のことを要求するものと解釈してはならない。\n(a) 加盟国が開示すれば自国の安全保障上の重大な利益に反すると当該加盟国が認める情報を提供すること。\n(b) 自国の安全保障上の重大な利益の保護のために必要と当該加盟国が認める次の行動を妨げること。\n(i) 核分裂性物質又はそれが派生する物質に関する行動\n(ii) 武器、弾薬及び軍需品の取引に関する行動並びに軍事施設に直接又は間接に供給するために行われる他の商品及び原材料の取引に関する行動\n(iii) 戦時又は国際関係における他の緊急事態においてとられる行動\n(c) 国際の平和及び安全の維持のための国際連合憲章の下での義務に従ってとられた行動を妨げること。"};


const ZH = {"1": "為鼓勵、保護、利用發明、新型及設計之創作，以促進產業發展，特制定本法。", "2": "本法所稱專利，分為下列三種：\n一、發明專利。\n二、新型專利。\n三、設計專利。", "3": "本法主管機關為經濟部。\n專利業務，由經濟部指定專責機關辦理。", "4": "外國人所屬之國家與中華民國如未共同參加保護專利之國際條約或無相互保護專利之條約、協定或由團體、機構互訂經主管機關核准保護專利之協議，或對中華民國國民申請專利，不予受理者，其專利申請，得不予受理。", "5": "專利申請權，指得依本法申請專利之權利。\n專利申請權人，除本法另有規定或契約另有約定外，指發明人、新型創作人、設計人或其受讓人或繼承人。", "6": "專利申請權及專利權，均得讓與或繼承。\n專利申請權，不得為質權之標的。\n以專利權為標的設定質權者，除契約另有約定外，質權人不得實施該專利權。", "7": "受雇人於職務上所完成之發明、新型或設計，其專利申請權及專利權屬於雇用人，雇用人應支付受雇人適當之報酬。但契約另有約定者，從其約定。\n前項所稱職務上之發明、新型或設計，指受雇人於僱傭關係中之工作所完成之發明、新型或設計。\n一方出資聘請他人從事研究開發者，其專利申請權及專利權之歸屬依雙方契約約定；契約未約定者，屬於發明人、新型創作人或設計人。但出資人得實施其發明、新型或設計。\n依第一項、前項之規定，專利申請權及專利權歸屬於雇用人或出資人者，發明人、新型創作人或設計人享有姓名表示權。", "8": "受雇人於非職務上所完成之發明、新型或設計，其專利申請權及專利權屬於受雇人。但其發明、新型或設計係利用雇用人資源或經驗者，雇用人得於支付合理報酬後，於該事業實施其發明、新型或設計。\n受雇人完成非職務上之發明、新型或設計，應即以書面通知雇用人，如有必要並應告知創作之過程。\n雇用人於前項書面通知到達後六個月內，未向受雇人為反對之表示者，不得主張該發明、新型或設計為職務上發明、新型或設計。", "9": "前條雇用人與受雇人間所訂契約，使受雇人不得享受其發明、新型或設計之權益者，無效。", "10": "雇用人或受雇人對第七條及第八條所定權利之歸屬有爭執而達成協議者，得附具證明文件，向專利專責機關申請變更權利人名義。專利專責機關認有必要時，得通知當事人附具依其他法令取得之調解、仲裁或判決文件。", "11": "申請人申請專利及辦理有關專利事項，得委任代理人辦理之。\n在中華民國境內，無住所或營業所者，申請專利及辦理專利有關事項，應委任代理人辦理之。\n代理人，除法令另有規定外，以專利師為限。\n專利師之資格及管理，另以法律定之。", "12": "專利申請權為共有者，應由全體共有人提出申請。\n二人以上共同為專利申請以外之專利相關程序時，除撤回或拋棄申請案、申請分割、改請或本法另有規定者，應共同連署外，其餘程序各人皆可單獨為之。但約定有代表者，從其約定。\n前二項應共同連署之情形，應指定其中一人為應受送達人。未指定應受送達人者，專利專責機關應以第一順序申請人為應受送達人，並應將送達事項通知其他人。", "13": "專利申請權為共有時，非經共有人全體之同意，不得讓與或拋棄。\n專利申請權共有人非經其他共有人之同意，不得以其應有部分讓與他人。\n專利申請權共有人拋棄其應有部分時，該部分歸屬其他共有人。", "14": "繼受專利申請權者，如在申請時非以繼受人名義申請專利，或未在申請後向專利專責機關申請變更名義者，不得以之對抗第三人。\n為前項之變更申請者，不論受讓或繼承，均應附具證明文件。", "15": "專利專責機關職員及專利審查人員於任職期內，除繼承外，不得申請專利及直接、間接受有關專利之任何權益。\n專利專責機關職員及專利審查人員對職務上知悉或持有關於專利之發明、新型或設計，或申請人事業上之秘密，有保密之義務，如有違反者，應負相關法律責任。\n專利審查人員之資格，以法律定之。", "16": "專利審查人員有下列情事之一，應自行迴避：\n一、本人或其配偶，為該專利案申請人、專利權人、舉發人、代理人、代理人之合夥人或與代理人有僱傭關係者。\n二、現為該專利案申請人、專利權人、舉發人或代理人之四親等內血親，或三親等內姻親。\n三、本人或其配偶，就該專利案與申請人、專利權人、舉發人有共同權利人、共同義務人或償還義務人之關係者。\n四、現為或曾為該專利案申請人、專利權人、舉發人之法定代理人或家長家屬者。\n五、現為或曾為該專利案申請人、專利權人、舉發人之訴訟代理人或輔佐人者。\n六、現為或曾為該專利案之證人、鑑定人、異議人或舉發人者。\n專利審查人員有應迴避而不迴避之情事者，專利專責機關得依職權或依申請撤銷其所為之處分後，另為適當之處分。", "17": "申請人為有關專利之申請及其他程序，遲誤法定或指定之期間者，除本法另有規定外，應不受理。但遲誤指定期間在處分前補正者，仍應受理。\n申請人因天災或不可歸責於己之事由，遲誤法定期間者，於其原因消滅後三十日內，得以書面敘明理由，向專利專責機關申請回復原狀。但遲誤法定期間已逾一年者，不得申請回復原狀。\n申請回復原狀，應同時補行期間內應為之行為。\n前二項規定，於遲誤第二十九條第四項、第五十二條第四項、第七十條第二項、第一百二十條準用第二十九條第四項、第一百二十條準用第五十二條第四項、第一百二十條準用第七十條第二項、第一百四十二條第一項準用第二十九條第四項、第一百四十二條第一項準用第五十二條第四項、第一百四十二條第一項準用第七十條第二項規定之期間者，不適用之。", "18": "審定書或其他文件無從送達者，應於專利公報公告之，並於刊登公報後滿三十日，視為已送達。", "19": "有關專利之申請及其他程序，得以電子方式為之；其實施辦法，由主管機關定之。", "20": "本法有關期間之計算，其始日不計算在內。\n第五十二條第三項、第一百十四條及第一百三十五條規定之專利權期限，自申請日當日起算。", "21": "發明，指利用自然法則之技術思想之創作。", "22": "可供產業上利用之發明，無下列情事之一，得依本法申請取得發明專利：\n一、申請前已見於刊物者。\n二、申請前已公開實施者。\n三、申請前已為公眾所知悉者。\n發明雖無前項各款所列情事，但為其所屬技術領域中具有通常知識者依申請前之先前技術所能輕易完成時，仍不得取得發明專利。\n申請人出於本意或非出於本意所致公開之事實發生後十二個月內申請者，該事實非屬第一項各款或前項不得取得發明專利之情事。\n因申請專利而在我國或外國依法於公報上所為之公開係出於申請人本意者，不適用前項規定。", "23": "申請專利之發明，與申請在先而在其申請後始公開或公告之發明或新型專利申請案所附說明書、申請專利範圍或圖式載明之內容相同者，不得取得發明專利。但其申請人與申請在先之發明或新型專利申請案之申請人相同者，不在此限。", "24": "下列各款，不予發明專利：\n一、動、植物及生產動、植物之主要生物學方法。但微生物學之生產方法，不在此限。\n二、人類或動物之診斷、治療或外科手術方法。\n三、妨害公共秩序或善良風俗者。", "25": "申請發明專利，由專利申請權人備具申請書、說明書、申請專利範圍、摘要及必要之圖式，向專利專責機關申請之。\n申請發明專利，以申請書、說明書、申請專利範圍及必要之圖式齊備之日為申請日。\n說明書、申請專利範圍及必要之圖式未於申請時提出中文本，而以外文本提出，且於專利專責機關指定期間內補正中文本者，以外文本提出之日為申請日。\n未於前項指定期間內補正中文本者，其申請案不予受理。但在處分前補正者，以補正之日為申請日，外文本視為未提出。", "26": "說明書應明確且充分揭露，使該發明所屬技術領域中具有通常知識者，能瞭解其內容，並可據以實現。\n申請專利範圍應界定申請專利之發明；其得包括一項以上之請求項，各請求項應以明確、簡潔之方式記載，且必須為說明書所支持。\n摘要應敘明所揭露發明內容之概要；其不得用於決定揭露是否充分，及申請專利之發明是否符合專利要件。\n說明書、申請專利範圍、摘要及圖式之揭露方式，於本法施行細則定之。", "27": "申請生物材料或利用生物材料之發明專利，申請人最遲應於申請日將該生物材料寄存於專利專責機關指定之國內寄存機構。但該生物材料為所屬技術領域中具有通常知識者易於獲得時，不須寄存。\n申請人應於申請日後四個月內檢送寄存證明文件，並載明寄存機構、寄存日期及寄存號碼；屆期未檢送者，視為未寄存。\n前項期間，如依第二十八條規定主張優先權者，為最早之優先權日後十六個月內。\n申請前如已於專利專責機關認可之國外寄存機構寄存，並於第二項或前項規定之期間內，檢送寄存於專利專責機關指定之國內寄存機構之證明文件及國外寄存機構出具之證明文件者，不受第一項最遲應於申請日在國內寄存之限制。\n申請人在與中華民國有相互承認寄存效力之外國所指定其國內之寄存機構寄存，並於第二項或第三項規定之期間內，檢送該寄存機構出具之證明文件者，不受應在國內寄存之限制。\n第一項生物材料寄存之受理要件、種類、型式、數量、收費費率及其他寄存執行之辦法，由主管機關定之。", "28": "申請人就相同發明在與中華民國相互承認優先權之國家或世界貿易組織會員第一次依法申請專利，並於第一次申請專利之日後十二個月內，向中華民國申請專利者，得主張優先權。\n申請人於一申請案中主張二項以上優先權時，前項期間之計算以最早之優先權日為準。\n外國申請人為非世界貿易組織會員之國民且其所屬國家與中華民國無相互承認優先權者，如於世界貿易組織會員或互惠國領域內，設有住所或營業所，亦得依第一項規定主張優先權。\n主張優先權者，其專利要件之審查，以優先權日為準。", "29": "依前條規定主張優先權者，應於申請專利同時聲明下列事項：\n一、第一次申請之申請日。\n二、受理該申請之國家或世界貿易組織會員。\n三、第一次申請之申請案號數。\n申請人應於最早之優先權日後十六個月內，檢送經前項國家或世界貿易組織會員證明受理之申請文件。\n違反第一項第一款、第二款或前項之規定者，視為未主張優先權。\n申請人非因故意，未於申請專利同時主張優先權，或違反第一項第一款、第二款規定視為未主張者，得於最早之優先權日後十六個月內，申請回復優先權主張，並繳納申請費與補行第一項規定之行為。", "30": "申請人基於其在中華民國先申請之發明或新型專利案再提出專利之申請者，得就先申請案申請時說明書、申請專利範圍或圖式所載之發明或新型，主張優先權。但有下列情事之一，不得主張之：\n一、自先申請案申請日後已逾十二個月者。\n二、先申請案中所記載之發明或新型已經依第二十八條或本條規定主張優先權者。\n三、先申請案係第三十四條第一項或第一百零七條第一項規定之分割案，或第一百零八條第一項規定之改請案。\n四、先申請案為發明，已經公告或不予專利審定確定者。\n五、先申請案為新型，已經公告或不予專利處分確定者。\n六、先申請案已經撤回或不受理者。\n前項先申請案自其申請日後滿十五個月，視為撤回。\n先申請案申請日後逾十五個月者，不得撤回優先權主張。\n依第一項主張優先權之後申請案，於先申請案申請日後十五個月內撤回者，視為同時撤回優先權之主張。\n申請人於一申請案中主張二項以上優先權時，其優先權期間之計算以最早之優先權日為準。\n主張優先權者，其專利要件之審查，以優先權日為準。\n依第一項主張優先權者，應於申請專利同時聲明先申請案之申請日及申請案號數；未聲明者，視為未主張優先權。", "31": "相同發明有二以上之專利申請案時，僅得就其最先申請者准予發明專利。但後申請者所主張之優先權日早於先申請者之申請日者，不在此限。\n前項申請日、優先權日為同日者，應通知申請人協議定之；協議不成時，均不予發明專利。其申請人為同一人時，應通知申請人限期擇一申請；屆期未擇一申請者，均不予發明專利。\n各申請人為協議時，專利專責機關應指定相當期間通知申請人申報協議結果；屆期未申報者，視為協議不成。\n相同創作分別申請發明專利及新型專利者，除有第三十二條規定之情事外，準用前三項規定。", "32": "同一人就相同創作，於同日分別申請發明專利及新型專利者，應於申請時分別聲明；其發明專利核准審定前，已取得新型專利權，專利專責機關應通知申請人限期擇一；申請人未分別聲明或屆期未擇一者，不予發明專利。\n申請人依前項規定選擇發明專利者，其新型專利權，自發明專利公告之日消滅。\n發明專利審定前，新型專利權已當然消滅或撤銷確定者，不予專利。", "33": "申請發明專利，應就每一發明提出申請。\n二個以上發明，屬於一個廣義發明概念者，得於一申請案中提出申請。", "34": "申請專利之發明，實質上為二個以上之發明時，經專利專責機關通知，或據申請人申請，得為分割之申請。\n分割申請應於下列各款之期間內為之：\n一、原申請案再審查審定前。\n二、原申請案核准審定書、再審查核准審定書送達後三個月內。\n分割後之申請案，仍以原申請案之申請日為申請日；如有優先權者，仍得主張優先權。\n分割後之申請案，不得超出原申請案申請時說明書、申請專利範圍或圖式所揭露之範圍。\n依第二項第一款規定分割後之申請案，應就原申請案已完成之程序續行審查。\n依第二項第二款規定所為分割，應自原申請案說明書或圖式所揭露之發明且與核准審定之請求項非屬相同發明者，申請分割；分割後之申請案，續行原申請案核准審定前之審查程序。\n原申請案經核准審定之說明書、申請專利範圍或圖式不得變動，以核准審定時之申請專利範圍及圖式公告之。", "35": "發明專利權經專利申請權人或專利申請權共有人，於該專利案公告後二年內，依第七十一條第一項第三款規定提起舉發，並於舉發撤銷確定後二個月內就相同發明申請專利者，以該經撤銷確定之發明專利權之申請日為其申請日。\n依前項規定申請之案件，不再公告。", "36": "專利專責機關對於發明專利申請案之實體審查，應指定專利審查人員審查之。", "37": "專利專責機關接到發明專利申請文件後，經審查認為無不合規定程式，且無應不予公開之情事者，自申請日後經過十八個月，應將該申請案公開之。\n專利專責機關得因申請人之申請，提早公開其申請案。\n發明專利申請案有下列情事之一，不予公開：\n一、自申請日後十五個月內撤回者。\n二、涉及國防機密或其他國家安全之機密者。\n三、妨害公共秩序或善良風俗者。\n第一項、前項期間之計算，如主張優先權者，以優先權日為準；主張二項以上優先權時，以最早之優先權日為準。", "38": "發明專利申請日後三年內，任何人均得向專利專責機關申請實體審查。\n依第三十四條第一項規定申請分割，或依第一百零八條第一項規定改請為發明專利，逾前項期間者，得於申請分割或改請後三十日內，向專利專責機關申請實體審查。\n依前二項規定所為審查之申請，不得撤回。\n未於第一項或第二項規定之期間內申請實體審查者，該發明專利申請案，視為撤回。", "39": "申請前條之審查者，應檢附申請書。\n專利專責機關應將申請審查之事實，刊載於專利公報。\n申請審查由發明專利申請人以外之人提起者，專利專責機關應將該項事實通知發明專利申請人。", "40": "發明專利申請案公開後，如有非專利申請人為商業上之實施者，專利專責機關得依申請優先審查之。\n為前項申請者，應檢附有關證明文件。", "41": "發明專利申請人對於申請案公開後，曾經以書面通知發明專利申請內容，而於通知後公告前就該發明仍繼續為商業上實施之人，得於發明專利申請案公告後，請求適當之補償金。\n對於明知發明專利申請案已經公開，於公告前就該發明仍繼續為商業上實施之人，亦得為前項之請求。\n前二項規定之請求權，不影響其他權利之行使。但依本法第三十二條分別申請發明專利及新型專利，並已取得新型專利權者，僅得在請求補償金或行使新型專利權間擇一主張之。\n第一項、第二項之補償金請求權，自公告之日起，二年間不行使而消滅。", "42": "專利專責機關於審查發明專利時，得依申請或依職權通知申請人限期為下列各款之行為：\n一、至專利專責機關面詢。\n二、為必要之實驗、補送模型或樣品。\n前項第二款之實驗、補送模型或樣品，專利專責機關認有必要時，得至現場或指定地點勘驗。", "43": "專利專責機關於審查發明專利時，除本法另有規定外，得依申請或依職權通知申請人限期修正說明書、申請專利範圍或圖式。\n修正，除誤譯之訂正外，不得超出申請時說明書、申請專利範圍或圖式所揭露之範圍。\n專利專責機關依第四十六條第二項規定通知後，申請人僅得於通知之期間內修正。\n專利專責機關經依前項規定通知後，認有必要時，得為最後通知；其經最後通知者，申請專利範圍之修正，申請人僅得於通知之期間內，就下列事項為之：\n一、請求項之刪除。\n二、申請專利範圍之減縮。\n三、誤記之訂正。\n四、不明瞭記載之釋明。\n違反前二項規定者，專利專責機關得於審定書敘明其事由，逕為審定。\n原申請案或分割後之申請案，有下列情事之一，專利專責機關得逕為最後通知：\n一、對原申請案所為之通知，與分割後之申請案已通知之內容相同者。\n二、對分割後之申請案所為之通知，與原申請案已通知之內容相同者。\n三、對分割後之申請案所為之通知，與其他分割後之申請案已通知之內容相同者。", "44": "說明書、申請專利範圍及圖式，依第二十五條第三項規定，以外文本提出者，其外文本不得修正。\n依第二十五條第三項規定補正之中文本，不得超出申請時外文本所揭露之範圍。\n前項之中文本，其誤譯之訂正，不得超出申請時外文本所揭露之範圍。", "45": "發明專利申請案經審查後，應作成審定書送達申請人。\n經審查不予專利者，審定書應備具理由。\n審定書應由專利審查人員具名。再審查、更正、舉發、專利權期間延長及專利權期間延長舉發之審定書，亦同。", "46": "發明專利申請案違反第二十一條至第二十四條、第二十六條、第三十一條、第三十二條第一項、第三項、第三十三條、第三十四條第四項、第六項前段、第四十三條第二項、第四十四條第二項、第三項或第一百零八條第三項規定者，應為不予專利之審定。\n專利專責機關為前項審定前，應通知申請人限期申復；屆期未申復者，逕為不予專利之審定。", "47": "申請專利之發明經審查認無不予專利之情事者，應予專利，並應將申請專利範圍及圖式公告之。\n經公告之專利案，任何人均得申請閱覽、抄錄、攝影或影印其審定書、說明書、申請專利範圍、摘要、圖式及全部檔案資料。但專利專責機關依法應予保密者，不在此限。", "48": "發明專利申請人對於不予專利之審定有不服者，得於審定書送達後二個月內備具理由書，申請再審查。但因申請程序不合法或申請人不適格而不受理或駁回者，得逕依法提起行政救濟。", "49": "申請案經依第四十六條第二項規定，為不予專利之審定者，其於再審查時，仍得修正說明書、申請專利範圍或圖式。\n申請案經審查發給最後通知，而為不予專利之審定者，其於再審查時所為之修正，仍受第四十三條第四項各款規定之限制。但經專利專責機關再審查認原審查程序發給最後通知為不當者，不在此限。\n有下列情事之一，專利專責機關得逕為最後通知：\n一、再審查理由仍有不予專利之情事者。\n二、再審查時所為之修正，仍有不予專利之情事者。\n三、依前項規定所為之修正，違反第四十三條第四項各款規定者。", "50": "再審查時，專利專責機關應指定未曾審查原案之專利審查人員審查，並作成審定書送達申請人。", "51": "發明經審查涉及國防機密或其他國家安全之機密者，應諮詢國防部或國家安全相關機關意見，認有保密之必要者，申請書件予以封存；其經申請實體審查者，應作成審定書送達申請人及發明人。\n申請人、代理人及發明人對於前項之發明應予保密，違反者該專利申請權視為拋棄。\n保密期間，自審定書送達申請人後為期一年，並得續行延展保密期間，每次一年；期間屆滿前一個月，專利專責機關應諮詢國防部或國家安全相關機關，於無保密之必要時，應即公開。\n第一項之發明經核准審定者，於無保密之必要時，專利專責機關應通知申請人於三個月內繳納證書費及第一年專利年費後，始予公告；屆期未繳費者，不予公告。\n就保密期間申請人所受之損失，政府應給與相當之補償。", "52": "申請專利之發明，經核准審定者，申請人應於審定書送達後三個月內，繳納證書費及第一年專利年費後，始予公告；屆期未繳費者，不予公告。\n申請專利之發明，自公告之日起給予發明專利權，並發證書。\n發明專利權期限，自申請日起算二十年屆滿。\n申請人非因故意，未於第一項或前條第四項所定期限繳費者，得於繳費期限屆滿後六個月內，繳納證書費及二倍之第一年專利年費後，由專利專責機關公告之。", "53": "醫藥品、農藥品或其製造方法發明專利權之實施，依其他法律規定，應取得許可證者，其於專利案公告後取得時，專利權人得以第一次許可證申請延長專利權期間，並以一次為限，且該許可證僅得據以申請延長專利權期間一次。\n前項核准延長之期間，不得超過為向中央目的事業主管機關取得許可證而無法實施發明之期間；取得許可證期間超過五年者，其延長期間仍以五年為限。\n第一項所稱醫藥品，不及於動物用藥品。\n第一項申請應備具申請書，附具證明文件，於取得第一次許可證後三個月內，向專利專責機關提出。但在專利權期間屆滿前六個月內，不得為之。\n主管機關就延長期間之核定，應考慮對國民健康之影響，並會同中央目的事業主管機關訂定核定辦法。", "54": "依前條規定申請延長專利權期間者，如專利專責機關於原專利權期間屆滿時尚未審定者，其專利權期間視為已延長。但經審定不予延長者，至原專利權期間屆滿日止。", "55": "專利專責機關對於發明專利權期間延長申請案，應指定專利審查人員審查，作成審定書送達專利權人。", "56": "經專利專責機關核准延長發明專利權期間之範圍，僅及於許可證所載之有效成分及用途所限定之範圍。", "57": "任何人對於經核准延長發明專利權期間，認有下列情事之一，得附具證據，向專利專責機關舉發之：\n一、發明專利之實施無取得許可證之必要者。\n二、專利權人或被授權人並未取得許可證。\n三、核准延長之期間超過無法實施之期間。\n四、延長專利權期間之申請人並非專利權人。\n五、申請延長之許可證非屬第一次許可證或該許可證曾辦理延長者。\n六、核准延長專利權之醫藥品為動物用藥品。\n專利權延長經舉發成立確定者，原核准延長之期間，視為自始不存在。但因違反前項第三款規定，經舉發成立確定者，就其超過之期間，視為未延長。", "58": "發明專利權人，除本法另有規定外，專有排除他人未經其同意而實施該發明之權。\n物之發明之實施，指製造、為販賣之要約、販賣、使用或為上述目的而進口該物之行為。\n方法發明之實施，指下列各款行為：\n一、使用該方法。\n二、使用、為販賣之要約、販賣或為上述目的而進口該方法直接製成之物。\n發明專利權範圍，以申請專利範圍為準，於解釋申請專利範圍時，並得審酌說明書及圖式。\n摘要不得用於解釋申請專利範圍。", "59": "發明專利權之效力，不及於下列各款情事：\n一、非出於商業目的之未公開行為。\n二、以研究或實驗為目的實施發明之必要行為。\n三、申請前已在國內實施，或已完成必須之準備者。但於專利申請人處得知其發明後未滿十二個月，並經專利申請人聲明保留其專利權者，不在此限。\n四、僅由國境經過之交通工具或其裝置。\n五、非專利申請權人所得專利權，因專利權人舉發而撤銷時，其被授權人在舉發前，以善意在國內實施或已完成必須之準備者。\n六、專利權人所製造或經其同意製造之專利物販賣後，使用或再販賣該物者。上述製造、販賣，不以國內為限。\n七、專利權依第七十條第一項第三款規定消滅後，至專利權人依第七十條第二項回復專利權效力並經公告前，以善意實施或已完成必須之準備者。\n前項第三款、第五款及第七款之實施人，限於在其原有事業目的範圍內繼續利用。\n第一項第五款之被授權人，因該專利權經舉發而撤銷之後，仍實施時，於收到專利權人書面通知之日起，應支付專利權人合理之權利金。", "60": "發明專利權之效力，不及於以取得藥事法所定藥物查驗登記許可或國外藥物上市許可為目的，而從事之研究、試驗及其必要行為。", "60-1": "藥品許可證申請人就新藥藥品許可證所有人已核准新藥所登載之專利權，依藥事法第四十八條之九第四款規定為聲明者，專利權人於接獲通知後，得依第九十六條第一項規定，請求除去或防止侵害。\n專利權人未於藥事法第四十八條之十三第一項所定期間內對前項申請人提起訴訟者，該申請人得就其申請藥品許可證之藥品是否侵害該專利權，提起確認之訴。", "61": "混合二種以上醫藥品而製造之醫藥品或方法，其發明專利權效力不及於依醫師處方箋調劑之行為及所調劑之醫藥品。", "62": "發明專利權人以其發明專利權讓與、信託、授權他人實施或設定質權，非經向專利專責機關登記，不得對抗第三人。\n前項授權，得為專屬授權或非專屬授權。\n專屬被授權人在被授權範圍內，排除發明專利權人及第三人實施該發明。\n發明專利權人為擔保數債權，就同一專利權設定數質權者，其次序依登記之先後定之。", "63": "專屬被授權人得將其被授予之權利再授權第三人實施。但契約另有約定者，從其約定。\n非專屬被授權人非經發明專利權人或專屬被授權人同意，不得將其被授予之權利再授權第三人實施。\n再授權，非經向專利專責機關登記，不得對抗第三人。", "64": "發明專利權為共有時，除共有人自己實施外，非經共有人全體之同意，不得讓與、信託、授權他人實施、設定質權或拋棄。", "65": "發明專利權共有人非經其他共有人之同意，不得以其應有部分讓與、信託他人或設定質權。\n發明專利權共有人拋棄其應有部分時，該部分歸屬其他共有人。", "66": "發明專利權人因中華民國與外國發生戰事受損失者，得申請延展專利權五年至十年，以一次為限。但屬於交戰國人之專利權，不得申請延展。", "67": "發明專利權人申請更正專利說明書、申請專利範圍或圖式，僅得就下列事項為之：\n一、請求項之刪除。\n二、申請專利範圍之減縮。\n三、誤記或誤譯之訂正。\n四、不明瞭記載之釋明。\n更正，除誤譯之訂正外，不得超出申請時說明書、申請專利範圍或圖式所揭露之範圍。\n依第二十五條第三項規定，說明書、申請專利範圍及圖式以外文本提出者，其誤譯之訂正，不得超出申請時外文本所揭露之範圍。\n更正，不得實質擴大或變更公告時之申請專利範圍。", "68": "專利專責機關對於更正案之審查，除依第七十七條規定外，應指定專利審查人員審查之，並作成審定書送達申請人。\n專利專責機關於核准更正後，應公告其事由。\n說明書、申請專利範圍及圖式經更正公告者，溯自申請日生效。", "69": "發明專利權人非經被授權人或質權人之同意，不得拋棄專利權，或就第六十七條第一項第一款或第二款事項為更正之申請。\n發明專利權為共有時，非經共有人全體之同意，不得就第六十七條第一項第一款或第二款事項為更正之申請。", "70": "有下列情事之一者，發明專利權當然消滅：\n一、專利權期滿時，自期滿後消滅。\n二、專利權人死亡而無繼承人。\n三、第二年以後之專利年費未於補繳期限屆滿前繳納者，自原繳費期限屆滿後消滅。\n四、專利權人拋棄時，自其書面表示之日消滅。\n專利權人非因故意，未於第九十四條第一項所定期限補繳者，得於期限屆滿後一年內，申請回復專利權，並繳納三倍之專利年費後，由專利專責機關公告之。", "71": "發明專利權有下列情事之一，任何人得向專利專責機關提起舉發：\n一、違反第二十一條至第二十四條、第二十六條、第三十一條、第三十二條第一項、第三項、第三十四條第四項、第六項前段、第四十三條第二項、第四十四條第二項、第三項、第六十七條第二項至第四項或第一百零八條第三項規定者。\n二、專利權人所屬國家對中華民國國民申請專利不予受理者。\n三、違反第十二條第一項規定或發明專利權人為非發明專利申請權人。\n以前項第三款情事提起舉發者，限於利害關係人始得為之。\n發明專利權得提起舉發之情事，依其核准審定時之規定。但以違反第三十四條第四項、第六項前段、第四十三條第二項、第六十七條第二項、第四項或第一百零八條第三項規定之情事，提起舉發者，依舉發時之規定。", "72": "利害關係人對於專利權之撤銷，有可回復之法律上利益者，得於專利權當然消滅後，提起舉發。", "73": "舉發，應備具申請書，載明舉發聲明、理由，並檢附證據。\n專利權有二以上之請求項者，得就部分請求項提起舉發。\n舉發聲明，提起後不得變更或追加，但得減縮。\n舉發人補提理由或證據，應於舉發後三個月內為之，逾期提出者，不予審酌。", "74": "專利專責機關接到前條申請書後，應將其副本送達專利權人。\n專利權人應於副本送達後一個月內答辯；除先行申明理由，准予展期者外，屆期未答辯者，逕予審查。\n舉發案件審查期間，專利權人僅得於通知答辯、補充答辯或申復期間申請更正。但發明專利權有訴訟案件繫屬中，不在此限。\n專利專責機關認有必要，通知舉發人陳述意見、專利權人補充答辯或申復時，舉發人或專利權人應於通知送達後一個月內為之。除准予展期者外，逾期提出者，不予審酌。\n依前項規定所提陳述意見或補充答辯有遲滯審查之虞，或其事證已臻明確者，專利專責機關得逕予審查。", "75": "專利專責機關於舉發審查時，在舉發聲明範圍內，得依職權審酌舉發人未提出之理由及證據，並應通知專利權人限期答辯；屆期未答辯者，逕予審查。", "76": "專利專責機關於舉發審查時，得依申請或依職權通知專利權人限期為下列各款之行為：\n一、至專利專責機關面詢。\n二、為必要之實驗、補送模型或樣品。\n前項第二款之實驗、補送模型或樣品，專利專責機關認有必要時，得至現場或指定地點勘驗。", "77": "舉發案件審查期間，有更正案者，應合併審查及合併審定。\n前項更正案經專利專責機關審查認應准予更正時，應將更正說明書、申請專利範圍或圖式之副本送達舉發人。但更正僅刪除請求項者，不在此限。\n同一舉發案審查期間，有二以上之更正案者，申請在先之更正案，視為撤回。", "78": "同一專利權有多件舉發案者，專利專責機關認有必要時，得合併審查。\n依前項規定合併審查之舉發案，得合併審定。", "79": "專利專責機關於舉發審查時，應指定專利審查人員審查，並作成審定書，送達專利權人及舉發人。\n舉發之審定，應就各請求項分別為之。", "80": "舉發人得於審定前撤回舉發申請。但專利權人已提出答辯者，應經專利權人同意。\n專利專責機關應將撤回舉發之事實通知專利權人；自通知送達後十日內，專利權人未為反對之表示者，視為同意撤回。", "81": "有下列情事之一，任何人對同一專利權，不得就同一事實以同一證據再為舉發：\n一、他舉發案曾就同一事實以同一證據提起舉發，經審查不成立者。\n二、依智慧財產案件審理法第三十三條規定向智慧財產法院提出之新證據，經審理認無理由者。", "82": "發明專利權經舉發審查成立者，應撤銷其專利權；其撤銷得就各請求項分別為之。\n發明專利權經撤銷後，有下列情事之一，即為撤銷確定：\n一、未依法提起行政救濟者。\n二、提起行政救濟經駁回確定者。\n發明專利權經撤銷確定者，專利權之效力，視為自始不存在。", "83": "第五十七條第一項延長發明專利權期間舉發之處理，準用本法有關發明專利權舉發之規定。", "84": "發明專利權之核准、變更、延長、延展、讓與、信託、授權、強制授權、撤銷、消滅、設定質權、舉發審定及其他應公告事項，應於專利公報公告之。", "85": "專利專責機關應備置專利權簿，記載核准專利、專利權異動及法令所定之一切事項。\n前項專利權簿，得以電子方式為之，並供人民閱覽、抄錄、攝影或影印。", "86": "專利專責機關依本法應公開、公告之事項，得以電子方式為之；其實施日期，由專利專責機關定之。", "87": "為因應國家緊急危難或其他重大緊急情況，專利專責機關應依緊急命令或中央目的事業主管機關之通知，強制授權所需專利權，並儘速通知專利權人。\n有下列情事之一，而有強制授權之必要者，專利專責機關得依申請強制授權：\n一、增進公益之非營利實施。\n二、發明或新型專利權之實施，將不可避免侵害在前之發明或新型專利權，且較該在前之發明或新型專利權具相當經濟意義之重要技術改良。\n三、專利權人有限制競爭或不公平競爭之情事，經法院判決或行政院公平交易委員會處分。\n就半導體技術專利申請強制授權者，以有前項第一款或第三款之情事者為限。\n專利權經依第二項第一款或第二款規定申請強制授權者，以申請人曾以合理之商業條件在相當期間內仍不能協議授權者為限。\n專利權經依第二項第二款規定申請強制授權者，其專利權人得提出合理條件，請求就申請人之專利權強制授權。", "88": "專利專責機關於接到前條第二項及第九十條之強制授權申請後，應通知專利權人，並限期答辯；屆期未答辯者，得逕予審查。\n強制授權之實施應以供應國內市場需要為主。但依前條第二項第三款規定強制授權者，不在此限。\n強制授權之審定應以書面為之，並載明其授權之理由、範圍、期間及應支付之補償金。\n強制授權不妨礙原專利權人實施其專利權。\n強制授權不得讓與、信託、繼承、授權或設定質權。但有下列情事之一者，不在此限：\n一、依前條第二項第一款或第三款規定之強制授權與實施該專利有關之營業，一併讓與、信託、繼承、授權或設定質權。\n二、依前條第二項第二款或第五項規定之強制授權與被授權人之專利權，一併讓與、信託、繼承、授權或設定質權。", "89": "依第八十七條第一項規定強制授權者，經中央目的事業主管機關認無強制授權之必要時，專利專責機關應依其通知廢止強制授權。\n有下列各款情事之一者，專利專責機關得依申請廢止強制授權：\n一、作成強制授權之事實變更，致無強制授權之必要。\n二、被授權人未依授權之內容適當實施。\n三、被授權人未依專利專責機關之審定支付補償金。", "90": "為協助無製藥能力或製藥能力不足之國家，取得治療愛滋病、肺結核、瘧疾或其他傳染病所需醫藥品，專利專責機關得依申請，強制授權申請人實施專利權，以供應該國家進口所需醫藥品。\n依前項規定申請強制授權者，以申請人曾以合理之商業條件在相當期間內仍不能協議授權者為限。但所需醫藥品在進口國已核准強制授權者，不在此限。\n進口國如為世界貿易組織會員，申請人於依第一項申請時，應檢附進口國已履行下列事項之證明文件：\n一、已通知與貿易有關之智慧財產權理事會該國所需醫藥品之名稱及數量。\n二、已通知與貿易有關之智慧財產權理事會該國無製藥能力或製藥能力不足，而有作為進口國之意願。但為低度開發國家者，申請人毋庸檢附證明文件。\n三、所需醫藥品在該國無專利權，或有專利權但已核准強制授權或即將核准強制授權。\n前項所稱低度開發國家，為聯合國所發布之低度開發國家。\n進口國如非世界貿易組織會員，而為低度開發國家或無製藥能力或製藥能力不足之國家，申請人於依第一項申請時，應檢附進口國已履行下列事項之證明文件：\n一、以書面向中華民國外交機關提出所需醫藥品之名稱及數量。\n二、同意防止所需醫藥品轉出口。", "91": "依前條規定強制授權製造之醫藥品應全部輸往進口國，且授權製造之數量不得超過進口國通知與貿易有關之智慧財產權理事會或中華民國外交機關所需醫藥品之數量。\n依前條規定強制授權製造之醫藥品，應於其外包裝依專利專責機關指定之內容標示其授權依據；其包裝及顏色或形狀，應與專利權人或其被授權人所製造之醫藥品足以區別。\n強制授權之被授權人應支付專利權人適當之補償金；補償金之數額，由專利專責機關就與所需醫藥品相關之醫藥品專利權於進口國之經濟價值，並參考聯合國所發布之人力發展指標核定之。\n強制授權被授權人於出口該醫藥品前，應於網站公開該醫藥品之數量、名稱、目的地及可資區別之特徵。\n依前條規定強制授權製造出口之醫藥品，其查驗登記，不受藥事法第四十條之二第二項規定之限制。", "92": "關於發明專利之各項申請，申請人於申請時，應繳納申請費。\n核准專利者，發明專利權人應繳納證書費及專利年費；請准延長、延展專利權期間者，在延長、延展期間內，仍應繳納專利年費。", "93": "發明專利年費自公告之日起算，第一年年費，應依第五十二條第一項規定繳納；第二年以後年費，應於屆期前繳納之。\n前項專利年費，得一次繳納數年；遇有年費調整時，毋庸補繳其差額。", "94": "發明專利第二年以後之專利年費，未於應繳納專利年費之期間內繳費者，得於期滿後六個月內補繳之。但其專利年費之繳納，除原應繳納之專利年費外，應以比率方式加繳專利年費。\n前項以比率方式加繳專利年費，指依逾越應繳納專利年費之期間，按月加繳，每逾一個月加繳百分之二十，最高加繳至依規定之專利年費加倍之數額；其逾繳期間在一日以上一個月以內者，以一個月論。", "95": "發明專利權人為自然人、學校或中小企業者，得向專利專責機關申請減免專利年費。", "96": "發明專利權人對於侵害其專利權者，得請求除去之。有侵害之虞者，得請求防止之。\n發明專利權人對於因故意或過失侵害其專利權者，得請求損害賠償。\n發明專利權人為第一項之請求時，對於侵害專利權之物或從事侵害行為之原料或器具，得請求銷毀或為其他必要之處置。\n專屬被授權人在被授權範圍內，得為前三項之請求。但契約另有約定者，從其約定。\n發明人之姓名表示權受侵害時，得請求表示發明人之姓名或為其他回復名譽之必要處分。\n第二項及前項所定之請求權，自請求權人知有損害及賠償義務人時起，二年間不行使而消滅；自行為時起，逾十年者，亦同。", "97": "依前條請求損害賠償時，得就下列各款擇一計算其損害：\n一、依民法第二百十六條之規定。但不能提供證據方法以證明其損害時，發明專利權人得就其實施專利權通常所可獲得之利益，減除受害後實施同一專利權所得之利益，以其差額為所受損害。\n二、依侵害人因侵害行為所得之利益。\n三、依授權實施該發明專利所得收取之合理權利金為基礎計算損害。\n依前項規定，侵害行為如屬故意，法院得因被害人之請求，依侵害情節，酌定損害額以上之賠償。但不得超過已證明損害額之三倍。", "97-1": "專利權人對進口之物有侵害其專利權之虞者，得申請海關先予查扣。\n前項申請，應以書面為之，並釋明侵害之事實，及提供相當於海關核估該進口物完稅價格之保證金或相當之擔保。\n海關受理查扣之申請，應即通知申請人；如認符合前項規定而實施查扣時，應以書面通知申請人及被查扣人。\n被查扣人得提供第二項保證金二倍之保證金或相當之擔保，請求海關廢止查扣，並依有關進口貨物通關規定辦理。\n海關在不損及查扣物機密資料保護之情形下，得依申請人或被查扣人之申請，同意其檢視查扣物。\n查扣物經申請人取得法院確定判決，屬侵害專利權者，被查扣人應負擔查扣物之貨櫃延滯費、倉租、裝卸費等有關費用。", "97-2": "有下列情形之一，海關應廢止查扣：\n一、申請人於海關通知受理查扣之翌日起十二日內，未依第九十六條規定就查扣物為侵害物提起訴訟，並通知海關者。\n二、申請人就查扣物為侵害物所提訴訟經法院裁判駁回確定者。\n三、查扣物經法院確定判決，不屬侵害專利權之物者。\n四、申請人申請廢止查扣者。\n五、符合前條第四項規定者。\n前項第一款規定之期限，海關得視需要延長十二日。\n海關依第一項規定廢止查扣者，應依有關進口貨物通關規定辦理。\n查扣因第一項第一款至第四款之事由廢止者，申請人應負擔查扣物之貨櫃延滯費、倉租、裝卸費等有關費用。", "97-3": "查扣物經法院確定判決不屬侵害專利權之物者，申請人應賠償被查扣人因查扣或提供第九十七條之一第四項規定保證金所受之損害。\n申請人就第九十七條之一第四項規定之保證金，被查扣人就第九十七條之一第二項規定之保證金，與質權人有同一權利。但前條第四項及第九十七條之一第六項規定之貨櫃延滯費、倉租、裝卸費等有關費用，優先於申請人或被查扣人之損害受償。\n有下列情形之一者，海關應依申請人之申請，返還第九十七條之一第二項規定之保證金：\n一、申請人取得勝訴之確定判決，或與被查扣人達成和解，已無繼續提供保證金之必要者。\n二、因前條第一項第一款至第四款規定之事由廢止查扣，致被查扣人受有損害後，或被查扣人取得勝訴之確定判決後，申請人證明已定二十日以上之期間，催告被查扣人行使權利而未行使者。\n三、被查扣人同意返還者。\n有下列情形之一者，海關應依被查扣人之申請，返還第九十七條之一第四項規定之保證金：\n一、因前條第一項第一款至第四款規定之事由廢止查扣，或被查扣人與申請人達成和解，已無繼續提供保證金之必要者。\n二、申請人取得勝訴之確定判決後，被查扣人證明已定二十日以上之期間，催告申請人行使權利而未行使者。\n三、申請人同意返還者。", "97-4": "前三條規定之申請查扣、廢止查扣、檢視查扣物、保證金或擔保之繳納、提供、返還之程序、應備文件及其他應遵行事項之辦法，由主管機關會同財政部定之。", "98": "專利物上應標示專利證書號數；不能於專利物上標示者，得於標籤、包裝或以其他足以引起他人認識之顯著方式標示之；其未附加標示者，於請求損害賠償時，應舉證證明侵害人明知或可得而知為專利物。", "99": "製造方法專利所製成之物在該製造方法申請專利前，為國內外未見者，他人製造相同之物，推定為以該專利方法所製造。\n前項推定得提出反證推翻之。被告證明其製造該相同物之方法與專利方法不同者，為已提出反證。被告舉證所揭示製造及營業秘密之合法權益，應予充分保障。", "100": "發明專利訴訟案件，法院應以判決書正本一份送專利專責機關。", "101": "舉發案涉及侵權訴訟案件之審理者，專利專責機關得優先審查。", "102": "未經認許之外國法人或團體，就本法規定事項得提起民事訴訟。", "103": "法院為處理發明專利訴訟案件，得設立專業法庭或指定專人辦理。\n司法院得指定侵害專利鑑定專業機構。\n法院受理發明專利訴訟案件，得囑託前項機構為鑑定。", "104": "新型，指利用自然法則之技術思想，對物品之形狀、構造或組合之創作。", "105": "新型有妨害公共秩序或善良風俗者，不予新型專利。", "106": "申請新型專利，由專利申請權人備具申請書、說明書、申請專利範圍、摘要及圖式，向專利專責機關申請之。\n申請新型專利，以申請書、說明書、申請專利範圍及圖式齊備之日為申請日。\n說明書、申請專利範圍及圖式未於申請時提出中文本，而以外文本提出，且於專利專責機關指定期間內補正中文本者，以外文本提出之日為申請日。\n未於前項指定期間內補正中文本者，其申請案不予受理。但在處分前補正者，以補正之日為申請日，外文本視為未提出。", "107": "申請專利之新型，實質上為二個以上之新型時，經專利專責機關通知，或據申請人申請，得為分割之申請。\n分割申請應於下列各款之期間內為之：\n一、原申請案處分前。\n二、原申請案核准處分書送達後三個月內。", "108": "申請發明或設計專利後改請新型專利者，或申請新型專利後改請發明專利者，以原申請案之申請日為改請案之申請日。\n改請之申請，有下列情事之一者，不得為之：\n一、原申請案准予專利之審定書、處分書送達後。\n二、原申請案為發明或設計，於不予專利之審定書送達後逾二個月。\n三、原申請案為新型，於不予專利之處分書送達後逾三十日。\n改請後之申請案，不得超出原申請案申請時說明書、申請專利範圍或圖式所揭露之範圍。", "109": "專利專責機關於形式審查新型專利時，得依申請或依職權通知申請人限期修正說明書、申請專利範圍或圖式。", "110": "說明書、申請專利範圍及圖式，依第一百零六條第三項規定，以外文本提出者，其外文本不得修正。\n依第一百零六條第三項規定補正之中文本，不得超出申請時外文本所揭露之範圍。", "111": "新型專利申請案經形式審查後，應作成處分書送達申請人。\n經形式審查不予專利者，處分書應備具理由。", "112": "新型專利申請案，經形式審查認有下列各款情事之一，應為不予專利之處分：\n一、新型非屬物品形狀、構造或組合者。\n二、違反第一百零五條規定者。\n三、違反第一百二十條準用第二十六條第四項規定之揭露方式者。\n四、違反第一百二十條準用第三十三條規定者。\n五、說明書、申請專利範圍或圖式未揭露必要事項，或其揭露明顯不清楚者。\n六、修正，明顯超出申請時說明書、申請專利範圍或圖式所揭露之範圍者。", "113": "申請專利之新型，經形式審查認無不予專利之情事者，應予專利，並應將申請專利範圍及圖式公告之。", "114": "新型專利權期限，自申請日起算十年屆滿。", "115": "申請專利之新型經公告後，任何人得向專利專責機關申請新型專利技術報告。\n專利專責機關應將申請新型專利技術報告之事實，刊載於專利公報。\n專利專責機關應指定專利審查人員作成新型專利技術報告，並由專利審查人員具名。\n專利專責機關對於第一項之申請，應就第一百二十條準用第二十二條第一項第一款、第二項、第一百二十條準用第二十三條、第一百二十條準用第三十一條規定之情事，作成新型專利技術報告。\n依第一項規定申請新型專利技術報告，如敘明有非專利權人為商業上之實施，並檢附有關證明文件者，專利專責機關應於六個月內完成新型專利技術報告。\n新型專利技術報告之申請，於新型專利權當然消滅後，仍得為之。\n依第一項所為之申請，不得撤回。", "116": "新型專利權人行使新型專利權時，如未提示新型專利技術報告，不得進行警告。", "117": "新型專利權人之專利權遭撤銷時，就其於撤銷前，因行使專利權所致他人之損害，應負賠償責任。但其係基於新型專利技術報告之內容，且已盡相當之注意者，不在此限。", "118": "新型專利權人除有依第一百二十條準用第七十四條第三項規定之情形外，僅得於下列期間申請更正：\n一、新型專利權有新型專利技術報告申請案件受理中。\n二、新型專利權有訴訟案件繫屬中。", "119": "新型專利權有下列情事之一，任何人得向專利專責機關提起舉發：\n一、違反第一百零四條、第一百零五條、第一百零八條第三項、第一百十條第二項、第一百二十條準用第二十二條、第一百二十條準用第二十三條、第一百二十條準用第二十六條、第一百二十條準用第三十一條、第一百二十條準用第三十四條第四項、第六項前段、第一百二十條準用第四十三條第二項、第一百二十條準用第四十四條第三項、第一百二十條準用第六十七條第二項至第四項規定者。\n二、專利權人所屬國家對中華民國國民申請專利不予受理者。\n三、違反第十二條第一項規定或新型專利權人為非新型專利申請權人者。\n以前項第三款情事提起舉發者，限於利害關係人始得為之。\n新型專利權得提起舉發之情事，依其核准處分時之規定。但以違反第一百零八條第三項、第一百二十條準用第三十四條第四項、第六項前段、第一百二十條準用第四十三條第二項或第一百二十條準用第六十七條第二項、第四項規定之情事，提起舉發者，依舉發時之規定。\n舉發審定書，應由專利審查人員具名。", "120": "第二十二條、第二十三條、第二十六條、第二十八條至第三十一條、第三十三條、第三十四條第三項至第七項、第三十五條、第四十三條第二項、第三項、第四十四條第三項、第四十六條第二項、第四十七條第二項、第五十一條、第五十二條第一項、第二項、第四項、第五十八條第一項、第二項、第四項、第五項、第五十九條、第六十二條至第六十五條、第六十七條、第六十八條、第六十九條、第七十條、第七十二條至第八十二條、第八十四條至第九十八條、第一百條至第一百零三條，於新型專利準用之。", "121": "設計，指對物品之全部或部分之形狀、花紋、色彩或其結合，透過視覺訴求之創作。\n應用於物品之電腦圖像及圖形化使用者介面，亦得依本法申請設計專利。", "122": "可供產業上利用之設計，無下列情事之一，得依本法申請取得設計專利：\n一、申請前有相同或近似之設計，已見於刊物者。\n二、申請前有相同或近似之設計，已公開實施者。\n三、申請前已為公眾所知悉者。\n設計雖無前項各款所列情事，但為其所屬技藝領域中具有通常知識者依申請前之先前技藝易於思及時，仍不得取得設計專利。\n申請人出於本意或非出於本意所致公開之事實發生後六個月內申請者，該事實非屬第一項各款或前項不得取得設計專利之情事。\n因申請專利而在我國或外國依法於公報上所為之公開係出於申請人本意者，不適用前項規定。", "123": "申請專利之設計，與申請在先而在其申請後始公告之設計專利申請案所附說明書或圖式之內容相同或近似者，不得取得設計專利。但其申請人與申請在先之設計專利申請案之申請人相同者，不在此限。", "124": "下列各款，不予設計專利：\n一、純功能性之物品造形。\n二、純藝術創作。\n三、積體電路電路布局及電子電路布局。\n四、物品妨害公共秩序或善良風俗者。", "125": "申請設計專利，由專利申請權人備具申請書、說明書及圖式，向專利專責機關申請之。\n申請設計專利，以申請書、說明書及圖式齊備之日為申請日。\n說明書及圖式未於申請時提出中文本，而以外文本提出，且於專利專責機關指定期間內補正中文本者，以外文本提出之日為申請日。\n未於前項指定期間內補正中文本者，其申請案不予受理。但在處分前補正者，以補正之日為申請日，外文本視為未提出。", "126": "說明書及圖式應明確且充分揭露，使該設計所屬技藝領域中具有通常知識者，能瞭解其內容，並可據以實現。\n說明書及圖式之揭露方式，於本法施行細則定之。", "127": "同一人有二個以上近似之設計，得申請設計專利及其衍生設計專利。\n衍生設計之申請日，不得早於原設計之申請日。\n申請衍生設計專利，於原設計專利公告後，不得為之。\n同一人不得就與原設計不近似，僅與衍生設計近似之設計申請為衍生設計專利。", "128": "相同或近似之設計有二以上之專利申請案時，僅得就其最先申請者，准予設計專利。但後申請者所主張之優先權日早於先申請者之申請日者，不在此限。\n前項申請日、優先權日為同日者，應通知申請人協議定之；協議不成時，均不予設計專利。其申請人為同一人時，應通知申請人限期擇一申請；屆期未擇一申請者，均不予設計專利。\n各申請人為協議時，專利專責機關應指定相當期間通知申請人申報協議結果；屆期未申報者，視為協議不成。\n前三項規定，於下列各款不適用之：\n一、原設計專利申請案與衍生設計專利申請案間。\n二、同一設計專利申請案有二以上衍生設計專利申請案者，該二以上衍生設計專利申請案間。", "129": "申請設計專利，應就每一設計提出申請。\n二個以上之物品，屬於同一類別，且習慣上以成組物品販賣或使用者，得以一設計提出申請。\n申請設計專利，應指定所施予之物品。", "130": "申請專利之設計，實質上為二個以上之設計時，經專利專責機關通知，或據申請人申請，得為分割之申請。\n分割申請，應於原申請案再審查審定前為之。\n分割後之申請案，應就原申請案已完成之程序續行審查。", "131": "申請設計專利後改請衍生設計專利者，或申請衍生設計專利後改請設計專利者，以原申請案之申請日為改請案之申請日。\n改請之申請，有下列情事之一者，不得為之：\n一、原申請案准予專利之審定書送達後。\n二、原申請案不予專利之審定書送達後逾二個月。\n改請後之設計或衍生設計，不得超出原申請案申請時說明書或圖式所揭露之範圍。", "132": "申請發明或新型專利後改請設計專利者，以原申請案之申請日為改請案之申請日。\n改請之申請，有下列情事之一者，不得為之：\n一、原申請案准予專利之審定書、處分書送達後。\n二、原申請案為發明，於不予專利之審定書送達後逾二個月。\n三、原申請案為新型，於不予專利之處分書送達後逾三十日。\n改請後之申請案，不得超出原申請案申請時說明書、申請專利範圍或圖式所揭露之範圍。", "133": "說明書及圖式，依第一百二十五條第三項規定，以外文本提出者，其外文本不得修正。\n第一百二十五條第三項規定補正之中文本，不得超出申請時外文本所揭露之範圍。", "134": "設計專利申請案違反第一百二十一條至第一百二十四條、第一百二十六條、第一百二十七條、第一百二十八條第一項至第三項、第一百二十九條第一項、第二項、第一百三十一條第三項、第一百三十二條第三項、第一百三十三條第二項、第一百四十二條第一項準用第三十四條第四項、第一百四十二條第一項準用第四十三條第二項、第一百四十二條第一項準用第四十四條第三項規定者，應為不予專利之審定。", "135": "設計專利權期限，自申請日起算十五年屆滿；衍生設計專利權期限與原設計專利權期限同時屆滿。", "136": "設計專利權人，除本法另有規定外，專有排除他人未經其同意而實施該設計或近似該設計之權。\n設計專利權範圍，以圖式為準，並得審酌說明書。", "137": "衍生設計專利權得單獨主張，且及於近似之範圍。", "138": "衍生設計專利權，應與其原設計專利權一併讓與、信託、繼承、授權或設定質權。\n原設計專利權依第一百四十二條第一項準用第七十條第一項第三款或第四款規定已當然消滅或撤銷確定，其衍生設計專利權有二以上仍存續者，不得單獨讓與、信託、繼承、授權或設定質權。", "139": "設計專利權人申請更正專利說明書或圖式，僅得就下列事項為之：\n一、誤記或誤譯之訂正。\n二、不明瞭記載之釋明。\n更正，除誤譯之訂正外，不得超出申請時說明書或圖式所揭露之範圍。\n依第一百二十五條第三項規定，說明書及圖式以外文本提出者，其誤譯之訂正，不得超出申請時外文本所揭露之範圍。\n更正，不得實質擴大或變更公告時之圖式。", "140": "設計專利權人非經被授權人或質權人之同意，不得拋棄專利權。", "141": "設計專利權有下列情事之一，任何人得向專利專責機關提起舉發：\n一、違反第一百二十一條至第一百二十四條、第一百二十六條、第一百二十七條、第一百二十八條第一項至第三項、第一百三十一條第三項、第一百三十二條第三項、第一百三十三條第二項、第一百三十九條第二項至第四項、第一百四十二條第一項準用第三十四條第四項、第一百四十二條第一項準用第四十三條第二項、第一百四十二條第一項準用第四十四條第三項規定者。\n二、專利權人所屬國家對中華民國國民申請專利不予受理者。\n三、違反第十二條第一項規定或設計專利權人為非設計專利申請權人者。\n以前項第三款情事提起舉發者，限於利害關係人始得為之。\n設計專利權得提起舉發之情事，依其核准審定時之規定。但以違反第一百三十一條第三項、第一百三十二條第三項、第一百三十九條第二項、第四項、第一百四十二條第一項準用第三十四條第四項或第一百四十二條第一項準用第四十三條第二項規定之情事，提起舉發者，依舉發時之規定。", "142": "第二十八條、第二十九條、第三十四條第三項、第四項、第三十五條、第三十六條、第四十二條、第四十三條第一項至第三項、第四十四條第三項、第四十五條、第四十六條第二項、第四十七條、第四十八條、第五十條、第五十二條第一項、第二項、第四項、第五十八條第二項、第五十九條、第六十二條至第六十五條、第六十八條、第七十條、第七十二條、第七十三條第一項、第三項、第四項、第七十四條至第七十八條、第七十九條第一項、第八十條至第八十二條、第八十四條至第八十六條、第九十二條至第九十八條、第一百條至第一百零三條規定，於設計專利準用之。\n第二十八條第一項所定期間，於設計專利申請案為六個月。\n第二十九條第二項及第四項所定期間，於設計專利申請案為十個月。\n第五十九條第一項第三款但書所定期間，於設計專利申請案為六個月。", "143": "專利檔案中之申請書件、說明書、申請專利範圍、摘要、圖式及圖說，經專利專責機關認定具保存價值者，應永久保存。\n前項以外之專利檔案應依下列規定定期保存：\n一、發明專利案除經審定准予專利者保存三十年外，應保存二十年。\n二、新型專利案除經處分准予專利者保存十五年外，應保存十年。\n三、設計專利案除經審定准予專利者保存二十年外，應保存十五年。\n前項專利檔案保存年限，自審定、處分、撤回或視為撤回之日所屬年度之次年首日開始計算。\n本法中華民國一百零八年四月十六日修正之條文施行前之專利檔案，其保存年限適用修正施行後之規定。", "144": "主管機關為獎勵發明、新型或設計之創作，得訂定獎助辦法。", "145": "依第二十五條第三項、第一百零六條第三項及第一百二十五條第三項規定提出之外文本，其外文種類之限定及其他應載明事項之辦法，由主管機關定之。", "146": "第九十二條、第一百二十條準用第九十二條、第一百四十二條第一項準用第九十二條規定之申請費、證書費及專利年費，其收費辦法由主管機關定之。\n第九十五條、第一百二十條準用第九十五條、第一百四十二條第一項準用第九十五條規定之專利年費減免，其減免條件、年限、金額及其他應遵行事項之辦法，由主管機關定之。", "147": "中華民國八十三年一月二十三日前所提出之申請案，不得依第五十三條規定，申請延長專利權期間。", "148": "本法中華民國八十三年一月二十一日修正施行前，已審定公告之專利案，其專利權期限，適用修正前之規定。但發明專利案，於世界貿易組織協定在中華民國管轄區域內生效之日，專利權仍存續者，其專利權期限，適用修正施行後之規定。\n本法中華民國九十二年一月三日修正之條文施行前，已審定公告之新型專利申請案，其專利權期限，適用修正前之規定。\n新式樣專利案，於世界貿易組織協定在中華民國管轄區域內生效之日，專利權仍存續者，其專利權期限，適用本法中華民國八十六年五月七日修正之條文施行後之規定。", "149": "本法中華民國一百年十一月二十九日修正之條文施行前，尚未審定之專利申請案，除本法另有規定外，適用修正施行後之規定。\n本法中華民國一百年十一月二十九日修正之條文施行前，尚未審定之更正案及舉發案，適用修正施行後之規定。", "150": "本法中華民國一百年十一月二十九日修正之條文施行前提出，且依修正前第二十九條規定主張優先權之發明或新型專利申請案，其先申請案尚未公告或不予專利之審定或處分尚未確定者，適用第三十條第一項規定。\n本法中華民國一百年十一月二十九日修正之條文施行前已審定之發明專利申請案，未逾第三十四條第二項第二款規定之期間者，適用第三十四條第二項第二款及第六項規定。", "151": "第二十二條第三項第二款、第一百二十條準用第二十二條第三項第二款、第一百二十一條第一項有關物品之部分設計、第一百二十一條第二項、第一百二十二條第三項第一款、第一百二十七條、第一百二十九條第二項規定，於本法中華民國一百年十一月二十九日修正之條文施行後，提出之專利申請案，始適用之。", "152": "本法中華民國一百年十一月二十九日修正之條文施行前，違反修正前第三十條第二項規定，視為未寄存之發明專利申請案，於修正施行後尚未審定者，適用第二十七條第二項之規定；其有主張優先權，自最早之優先權日起仍在十六個月內者，適用第二十七條第三項之規定。", "153": "本法中華民國一百年十一月二十九日修正之條文施行前，依修正前第二十八條第三項、第一百零八條準用第二十八條第三項、第一百二十九條第一項準用第二十八條第三項規定，以違反修正前第二十八條第一項、第一百零八條準用第二十八條第一項、第一百二十九條第一項準用第二十八條第一項規定喪失優先權之專利申請案，於修正施行後尚未審定或處分，且自最早之優先權日起，發明、新型專利申請案仍在十六個月內，設計專利申請案仍在十個月內者，適用第二十九條第四項、第一百二十條準用第二十九條第四項、第一百四十二條第一項準用第二十九條第四項之規定。\n本法中華民國一百年十一月二十九日修正之條文施行前，依修正前第二十八條第三項、第一百零八條準用第二十八條第三項、第一百二十九條第一項準用第二十八條第三項規定，以違反修正前第二十八條第二項、第一百零八條準用第二十八條第二項、第一百二十九條第一項準用第二十八條第二項規定喪失優先權之專利申請案，於修正施行後尚未審定或處分，且自最早之優先權日起，發明、新型專利申請案仍在十六個月內，設計專利申請案仍在十個月內者，適用第二十九條第二項、第一百二十條準用第二十九條第二項、第一百四十二條第一項準用第二十九條第二項之規定。", "154": "本法中華民國一百年十一月二十九日修正之條文施行前，已提出之延長發明專利權期間申請案，於修正施行後尚未審定，且其發明專利權仍存續者，適用修正施行後之規定。", "155": "本法中華民國一百年十一月二十九日修正之條文施行前，有下列情事之一，不適用第五十二條第四項、第七十條第二項、第一百二十條準用第五十二條第四項、第一百二十條準用第七十條第二項、第一百四十二條第一項準用第五十二條第四項、第一百四十二條第一項準用第七十條第二項之規定：\n一、依修正前第五十一條第一項、第一百零一條第一項或第一百十三條第一項規定已逾繳費期限，專利權自始不存在者。\n二、依修正前第六十六條第三款、第一百零八條準用第六十六條第三款或第一百二十九條第一項準用第六十六條第三款規定，於本法修正施行前，專利權已當然消滅者。", "156": "本法中華民國一百年十一月二十九日修正之條文施行前，尚未審定之新式樣專利申請案，申請人得於修正施行後三個月內，申請改為物品之部分設計專利申請案。", "157": "本法中華民國一百年十一月二十九日修正之條文施行前，尚未審定之聯合新式樣專利申請案，適用修正前有關聯合新式樣專利之規定。\n本法中華民國一百年十一月二十九日修正之條文施行前，尚未審定之聯合新式樣專利申請案，且於原新式樣專利公告前申請者，申請人得於修正施行後三個月內申請改為衍生設計專利申請案。", "157-1": "中華民國一百零五年十二月三十日修正之第二十二條、第五十九條、第一百二十二條及第一百四十二條，於施行後提出之專利申請案，始適用之。", "157-2": "本法中華民國一百零八年四月十六日修正之條文施行前，尚未審定之專利申請案，除本法另有規定外，適用修正施行後之規定。\n本法中華民國一百零八年四月十六日修正之條文施行前，尚未審定之更正案及舉發案，適用修正施行後之規定。", "157-3": "本法中華民國一百零八年四月十六日修正之條文施行前，已審定或處分之專利申請案，尚未逾第三十四條第二項第二款、第一百零七條第二項第二款規定之期間者，適用修正施行後之規定。", "157-4": "本法中華民國一百零八年四月十六日修正之條文施行之日，設計專利權仍存續者，其專利權期限，適用修正施行後之規定。\n本法中華民國一百零八年四月十六日修正之條文施行前，設計專利權因第一百四十二條第一項準用第七十條第一項第三款規定之事由當然消滅，而於修正施行後準用同條第二項規定申請回復專利權者，其專利權期限，適用修正施行後之規定。", "158": "本法施行細則，由主管機關定之。", "159": "本法之施行日期，由行政院定之。\n本法中華民國一百零二年五月三十一日修正之條文，自公布日施行。"};
const EN = {"1": "Purpose\nThis Patent Act is enacted to encourage, protect and utilize the creations of inventions, utility models and designs in order to promote industrial development.", "2": "Types of patents\nThe term \"patent\" referred to in this Act is classified into the following three types:\n1. invention patents;\n2. utility model patents; and\n3. design patents.", "3": "Competent authority\nThe \"competent authority\" referred to in this Act is the Ministry of Economic Affairs (hereinafter referred to as “the MOEA”).\nPatent affairs shall be administrated by a specific agency appointed by the MOEA.", "4": "Foreign applications and the principle of reciprocity\nA patent application filed by a foreign applicant shall not be accepted if the home country of such foreign applicant is not a signatory to an international treaty for protection of patent rights to which the Republic of China (ROC) is a signatory, or if the home country has not concluded a treaty or an agreement with the ROC for reciprocal protection of patent rights, or if no patent protection agreement has been concluded between organizations or institutions of the ROC and the said foreign country, approved by the respective competent authorities, or if the laws of said foreign country do not accept patent applications filed by ROC nationals.", "5": "Right to apply for a patent\nThe term \"right to apply for a patent\" shall mean the right to file a patent application in accordance with this Act. Subject to provisions of this Act otherwise prescribed or the covenants otherwise set forth in an agreement, the term \"the owner of the right to apply for a patent\" shall mean an inventor, a utility model creator, a designer, or the assignee or successor thereof.", "6": "Transfer of right and pledge of a patent\nThe right to apply for a patent or the patent right is both assignable and inheritable.\nThe right to apply for a patent shall not be taken as the subject of a pledge.\nIn the case of taking a patent right as the subject of a pledge, the pledgee shall not be allowed to exploit the patent right, unless otherwise provided for in an agreement.", "7": "Inventions made for hire and hired to invent\nWhere an invention, a utility model or a design is made by an employee in the course of performing his/her duties, the right to apply for a patent and the patent right thereof shall be vested in his/her employer and the employer shall pay the employee reasonable remuneration; where there is an agreement providing otherwise, such agreement shall prevail.\nThe term \"an invention, a utility model or a design made by an employee in the course of performing his/her duties\" referred to  in the preceding paragraph, shall mean the invention, utility model, or design completed by an employee in the course of performing his/her duties during the period of employment.\nWhere a fund provider appoints another party to conduct research and development, the ownership of the right to apply for a patent and the patent right in connection with the outcome of such research and development shall be vested in the party as mutually agreed upon in an agreement between both parties, or such rights shall be vested in the inventor, utility model creator or designer in the absence of such agreement. However, the fund provider shall be entitled to exploit such invention, utility model or design.\nWhere the ownership of the right to apply for a patent and the patent right are vested in the employer or the fund provider pursuant to Paragraph 1 or the preceding paragraph, the inventor, utility model creator or designer concerned shall be entitled to have his/her name shown as such.", "8": "Inventions not made for hire\nWhere an invention, utility model, or design made by an employee has no connection to the course of performing his/her duties, the right to apply for a patent and the patent right for such invention, utility model or design shall be vested in the employee. However, if such invention, utility model or design is made through the utilization of the employer's resources or experiences, the employer may, after paying the employee a reasonable remuneration, exploit the invention, utility model or design concerned in the enterprise.\nUpon completion of an invention, utility model or design which has no connection to the course of an employee’s performing his/her duties, the employee shall give the employer a written notice regarding such event and shall also inform the employer of the creative process if necessary.\nIf the employer fails to raise any objection to the employee within six (6) months after receiving the employee's written notice under the preceding paragraph, the employer shall not claim that such invention, utility model or design was made by the said employee in the course of performing his/her duties.", "9": "Protection of employees’ legitimate rights\nAn agreement concluded between an employer and an employee, as stated in the preceding article, by which the employee is deprived of legitimate rights and interests regarding his/her invention, utility model, or design, shall be void.", "10": "Agreement on ownership\nWhere an agreement has been reached by an employer and its employee regarding a dispute over attribution of right(s) as set forth in Articles 7 and 8 of this Act, the employer or employee concerned may file a request, along with relevant document(s) of proof, with the Specific Patent Agency for a change of ownership of the right(s) involved. The Specific Patent Agency may, as it deems necessary, notify the parties involved to submit document(s) relevant to any mediation, arbitration, or court judgment rendered in accordance with other laws and regulations.", "11": "Patent agent\nAn applicant may designate an agent to file patent applications and handle patent-related matters on his/her behalf.\nAn applicant who has no domicile or business establishment in the territory of the ROC shall designate an agent to file patent applications and handle patent-related matters on his/her behalf.\nEligible agents shall be limited to patent attorneys unless otherwise provided for by laws and regulations. The qualifications and administration of patent attorneys shall be separately prescribed by laws.", "12": "Joint inventors\nWhere a right to apply for a patent is jointly owned, the patent application related thereto shall be filed by all the joint owner(s).\nWhere two or more persons engage in any patent-related procedure other than filing a patent application, each of them may complete such procedure independently, except for making a withdrawal or an abandonment of a patent application, filing an application for division or conversion, or taking other actions for which, this Act requires joint execution. However, if a representative is designated by a covenant, such covenant shall prevail.\nIn the case of an event requiring joint execution as set forth in the preceding two paragraphs, one of the joint owners shall be appointed as the recipient of the service of documents. In the absence of such a recipient, the Specific Patent Agency shall name the first-listed joint owner as the recipient and shall notify other joint owners of such service matters.", "13": "Joint ownership of the right to apply for a patent\nWhere the right to apply for a patent is jointly owned, the right to apply for the patent shall not be assigned or abandoned without the consent of all joint owners.\nWhere the right to apply for a patent is jointly owned by two or more persons, none of the joint owners shall assign his/her share to a third party without the consent of the other joint owners.\nWhere one of the owners of the right to apply for a patent abandons his/her own share, this share shall be vested in the other joint owner(s).", "14": "Recordation to have locus standi against a third party: the transference of right to apply for a patent\nIn the case of an inheritance or assignment of the right to apply for a patent, the successor or the assignee shall have no locus standi against any third party unless the patent application has been filed in the name of the successor or the assignee at the time of filing, or a request has been filed thereafter with the Specific Patent Agency to alter the recordation of applicant.\nThe request referred to in the preceding paragraph, whether for assignment or inheritance, shall be accompanied by documents of proof.", "15": "Restrictions on officers and employees as to interest in patents\nEmployees and patent examiners of the Specific Patent Agency shall be incapable, during the period of their appointments, of applying for a patent and of acquiring, directly or indirectly, except by inheritance, any patent or any right or interest in any patent.\nEmployees and patent examiners of the Specific Patent Agency are obligated to keep confidential any invention, utility model, design, or trade secrets of an applicant that have become known to or been possessed by them in the course of performing their duties; whoever violates such obligation is liable for legal responsibility.\nThe qualifications of patent examiners shall be prescribed separately by law.", "16": "Recusal scenarios for patent examiners\nPatent examiners shall recuse themselves from any of the following conditions:\n1. where, for a concerned patent case, the patent examiner or his/her spouse is the patent applicant, patentee, invalidation requester, patent agent, a partner of the said patent agent or a person having employment relationship with the patent agent;\n2. where, for a concerned patent case, the patent examiner is presently related to the patent applicant, patentee, invalidation requester or the patent agent by consanguinity within the fourth degree or by affinity within the third degree;\n3. where, for a concerned patent case, the patent examiner or his/her spouse and the patent applicant, patentee or invalidation requester are co-obligees, co-obligors, or debt-paying co-obligors;\n4. where, for a concerned patent case, the patent examiner is or was the legal representative, the family head or a household member of the patent applicant, patentee or invalidation requester;\n5. where, for a concerned patent case, the patent examiner is or was the litigation agent or the assisting party of the patent applicant, patentee or invalidation requester; or\n6. where, for a concerned patent case, the patent examiner is or was a witness, an expert witness, an opposition requester or an invalidation requester.\nWhere a patent examiner should have but did not exclude himself/herself from performing his/her duties, the Specific Patent Agency may, upon request or on its own authority, revoke the measure(s) already taken and adopt an alternative measure instead.", "17": "Delay and reinstatement\nUnless otherwise provided in this Act, if a person filing a patent application or taking other proceedings in connection with patent-related matters has failed to comply with a statutory or specified time period, the application filed or the proceeding initiated shall be dismissed. However, if the delay in acting within a specified time period has been remedied before the dismissal decision is served by the Specific Patent Agency, such application or proceeding shall still be accepted.\nIf the delay of a statutory time period is caused by natural calamity or other cause(s) not attributable to the applicant, the applicant may, within thirty (30) days after cessation of such cause, file a written request with the Specific Patent Agency stating the cause(s) for delay and requesting for reinstatement. An application for reinstatement shall not be accepted if the delay has exceeded one (1) year after expiration of the statutory time period.\nWhile requesting reinstatement, the applicant shall concurrently fulfill all obligations that should have been fulfilled within the concerned time period.\nThe preceding two paragraphs shall not apply to a delay of the time limits as set forth in Paragraph 4 of Article 29, Paragraph 4 of Article 52, Paragraph 2 of Article 70, Paragraph 4 of Article 29 applicable mutatis mutandis under Article 120, Paragraph 4 of Article 52 applicable mutatis mutandis under Article 120; Paragraph 2 of Article 70 applicable mutatis mutandis under Article 120; Paragraph 4 of Article 29 applicable mutatis mutandis under Paragraph 1 of Article 142; Paragraph 4 of Article 52 applicable mutatis mutandis under Paragraph 1 of Article 142, and Paragraph 2 of Article 70 applicable mutatis mutandis under Paragraph 1 of Article 142.", "18": "Service by publication\nIf an examination decision or any other document(s) cannot be served, such decision or document(s) shall be published in the Patent Gazette and shall be deemed to have been served thirty (30) days after publication.", "19": "E-filing\nApplication for patents and other relevant proceedings may be processed electronically; the implementation of which shall be prescribed by the competent authority.", "20": "Time periods\nThe duration of relevant time periods, as specified in this Act, shall not include the beginning date thereof.\nThe duration of the patent, as specified respectively in Paragraph 3 of Article 52, Article 114 and Article 135 of this Act, shall start to run from the filing date of the patent application concerned.", "21": "Definition of invention\nThe term \"invention\" means the creation of technical ideas, utilizing the laws of nature.", "22": "Substantial conditions\nAn invention which is industrially applicable may be granted a patent upon application in accordance with this Act, except for the following:\n1. the invention was disclosed in a printed publication prior to the filing of the patent application;\n2. the invention was publicly exploited prior to the filing of the patent application; or\n3. the invention was publicly known prior to the filing of the patent application.\nAn invention that is without the circumstances prescribed in the subparagraphs of the preceding paragraph but can be easily made by a person ordinarily skilled in the art based on prior art shall not be patented .\nA disclosure made by or against the applicant’s will shall not be deemed as one of the circumstances that would preclude the grant of an invention patent prescribed in the subparagraphs of Paragraph 1 or the preceding paragraph, provided that the concerned patent application is filed within twelve (12) months after the date of the disclosure.\nFor the publication in a gazette made in this country or a foreign country in accordance with the laws as the consequence of filing a patent application and made by the applicant’s will, the preceding paragraph is not applicable.", "23": "Deemed as lack of novelty\nA person shall not be entitled to a patent if the claimed invention was described in the specification, claim(s) or drawing(s) of a patent issued or an application for invention or utility model patent published, in which the patent or application, as the case may be, names another inventor and was effectively filed before the effective filing date of the claimed invention. However, this shall not apply where the applicant of the later-filed patent application is also the applicant of the earlier-filed patent application for invention or utility model.", "24": "Subject matter/Statutory exclusion\nAn invention patent shall not be granted in respect of any of the following:\n1. animals, plants, and essential biological processes for the production of animals or plants, except for processes for producing microorganisms;\n2. diagnostic, therapeutic, and surgical methods for the treatment of humans or animals; or\n3. inventions contrary to public order or morality.", "25": "Application\nA patent application for an invention shall be filed with the Specific Patent Agency by the owner of the right to apply for a patent, who is to provide an application form, a description, claim(s), an abstract, and the necessary drawing(s).\nThe filing date of a patent application for invention shall be the date on which the application form, description, claim(s), and the necessary drawing(s) are provided in full.\nWhere an applicant does not provide a description, claim(s), and the necessary drawing(s) in Chinese at the time of filing, but in a foreign language, and where the Chinese translation for the said documents is provided within the time period specified by the Specific Patent Agency, the filing date shall be the date on which the foreign language version is originally provided.\nWhere the Chinese translation is not provided within the specified time period as stated in the preceding paragraph, the patent application shall be dismissed. However, if the Chinese translation is provided before the dismissal decision is served, the date on which the Chinese translation is provided shall be regarded as the filing date, and the foreign language version shall be deemed not to have been provided.", "26": "Specification\nThe description shall fully disclose the invention in a manner that is clear and sufficient for it to be understood and carried out by a person having ordinary skill in the art.\nClaim(s) shall define the claimed invention, and more than one claim may be included therein. Each claim shall be disclosed clearly and concisely and supported by the description.\nAn abstract shall clearly contain a summary of the disclosed invention; it shall not be taken into account for the purpose of determining the sufficiency of the disclosure and the patentability of the claimed invention.\nThe manners of disclosure for description, claim(s), abstract, and drawing(s) shall be prescribed in the Enforcement Rules of the Patent Act.", "27": "Deposit of biological material\nWhen filing a patent application for invention involving a biological material or utilization thereof, the applicant shall, no later than the filing date, make a deposit of the biological material with a domestic depository designated by the Specific Patent Agency. No deposit is required if the biological material involved can be easily obtained by a person having ordinary skill in the art.\nAn applicant shall, within four (4) months after the filing date of patent application, submit to the Specific Patent Agency a certificate of deposit, indicating the depository, date of deposit and deposit number. If such a document is not submitted within the specified time period, the deposit shall be deemed not to have been made.\nWhere priority is claimed pursuant to Article 28, the specified time period set forth in the preceding paragraph shall be within sixteen (16) months after the earliest priority date.\nIn the event that, prior to filing the patent application for an invention, the biological material concerned has been deposited in a foreign depository recognized by the Specific Patent Agency, and where the certificate of deposit issued by the designated domestic depository and the foreign depository has been provided within the time period prescribed in Paragraph 2 or the preceding paragraph, the applicant is exempted from the requirement of making a deposit no later than the filing date, as set forth in Paragraph 1.\nIf an applicant has deposited the biological material in a depository designated by a foreign country in its territory with which the ROC recognizes the effects of deposits based on reciprocity, and if the applicant has submitted the certificate(s) of deposit issued by the said foreign depository within the time period prescribed in Paragraph 2 or Paragraph 3, the applicant is exempted from the requirement of making a deposit in the ROC.\nThe competent authority shall stipulate regulations on the requirements for accession, types, forms, quantities of deposits of biological materials, deposit fees, and other matters in connection with making deposits set forth in Paragraph 1.", "28": "Priority claim under WTO membership, etc.\nWhere an applicant has first applied for a patent in a foreign country, which reciprocally allows ROC nationals to claim patent priority, or with any member of the World Trade Organization (WTO), the applicant may claim priority in respect of a ROC patent application for the same invention if the ROC patent application for the same invention is filed within twelve (12) months after the filing date of the said first patent application.\nWhere an applicant claims two or more priorities in respect of a patent application, the period referred to in the preceding paragraph shall be based on the earliest priority date.\nIf a foreign applicant is a citizen of a non-member of the WTO and whose home country does not mutually recognize priority with the ROC, but the applicant has domicile or business establishment in any member of the WTO or in the territory of a reciprocal country, the applicant shall also be entitled to claim priority in accordance with the provisions set forth in Paragraph 1.\nFor a patent application filed with priority, examination of its patentability shall be based on the priority date.", "29": "Claim of priority\nAn applicant claiming priority in accordance with the preceding article shall simultaneously make a declaration with respect of the following when filing a patent application:\n1. the filing date of the first patent application;\n2. the country or member of the WTO in which the first patent application was filed; and\n3. the application number of the first patent application.\nWithin sixteen (16) months after the earliest priority date, the applicant shall submit a certified copy of the first patent application issued by the foreign patent authority under the preceding paragraph.\nIn case of a violation of Subparagraph 1 or Subparagraph 2 of Paragraph 1 or the preceding paragraph, the priority claim shall be deemed not to have been made.\nWhere an applicant unintentionally fails to claim priority claim at the time of filing, or where the priority claim is deemed not to have been made as prescribed in violation of Subparagraph 1 or Subparagraph 2 of Paragraph 1, the applicant may, within sixteen (16) months after the earliest priority date, apply for reinstatement of priority claim, pay the required fees, and undertake actions set forth in Paragraph 1.", "30": "Priority claim based on earlier application\nAn applicant filing a subsequent patent application based on an earlier patent application for an invention or utility model in the ROC may make a priority claim with respect to the invention or utility model disclosed in the description, claim(s) or drawing(s) submitted for the earlier patent application. This provision shall not apply under any of the following conditions:\n1. where a period of twelve (12) months has elapsed after the filing date of the earlier patent application;\n2. where priority has been claimed in accordance with the provisions of Article 28 or this article in respect of the invention or utility model disclosed in the earlier patent application;\n3. where the earlier patent application is a divisional patent application prescribed under Paragraph 1 of Article 34 or Paragraph 1 of Article 107, or a converted patent application prescribed under Paragraph 1 of Article 108;\n4. where the earlier patent application is a patent application for an invention that has been published or has been finally and bindingly rejected;\n5. where the earlier patent application is a patent application for a utility model that has been published or has been finally and bindingly rejected; or\n6. where the earlier patent application has been withdrawn or dismissed.\nThe earlier patent application referred to in the preceding paragraph shall be deemed to have been withdrawn upon an expiry of fifteen (15) months after its filing date.\nPriority claimed shall not be withdrawn upon an expiry of fifteen (15) months after the filing date of the earlier patent application.\nIn the event that a subsequent patent application filed with a priority claim in accordance with Paragraph 1 is withdrawn within fifteen (15) months after the filing date of the earlier patent application, the priority claim thus made shall be deemed to have been withdrawn at the same time.\nWhere an applicant claims two or more priorities for a patent application, the calculation of priority period shall be based on the earliest priority date.\nFor a patent application filed with priority, examination of its patentability shall be based on the priority date.\nWhere a priority claim is made in accordance with Paragraph 1, the filing date and the application number of the earlier patent application shall be declared at the time of filing. If such declaration is not made, the priority claim shall be deemed not to have been made.", "31": "First-to-file principle\nWhere two or more patent applications are filed for the same invention, only the earliest application can be granted. The above shall not apply if the priority date claimed for the later-filed application is earlier than the filing date of the earlier application.\nIf the filing date and the priority date referred to in the preceding paragraph are the same, the applicants shall be notified to reach an agreement with respect to the matter concerned. If such an agreement cannot be reached, none of the applications shall be granted. If the said patent applications are filed by the same applicant, the applicant shall be notified to select one patent application within a specified time period; failure to make a selection within the time period shall result in the rejection of all such patent applications.\nWhile the concerned applicants are in the process of reaching an agreement, the Specific Patent Agency shall require that these applicants report the results of the negotiation within an appropriate time period designated. If the said report is not provided within the specified time period, it shall be deemed that an agreement has not been reached.\nWhere a patent application for an invention and a patent application for a utility model are filed separately in respect of the same creation, the provisions set forth in the preceding three paragraphs shall apply mutatis mutandis, except for the conditions stipulated in Article 32.", "32": "One creation applied for an invention patent and a utility model patent\nAn applicant filing a patent application for an invention and a patent application for a utility model for the same creation on the same date shall make respective declarations in respect of the said applications. If the patent application for the utility model has been granted before an approval decision on the patent application for invention is rendered, the Specific Patent Agency shall notify the applicant to make a selection within a designated time period. The patent application for the invention shall not be granted if the applicant fails to make such declarations or selection within the specified time period.\nWhere the applicant selects the patent application for invention according to the provision set forth in the preceding paragraph, the utility model patent right shall become extinguished on the publication date of the invention patent.\nThe patent application for invention shall not be granted if the utility model patent right has become extinguished or has been finally and bindingly revoked before a decision is rendered on the patent application for invention.", "33": "One Invention One Patent\nA patent application for an invention shall relate to one invention.\nTwo or more inventions, so linked as to form a single general inventive concept, may be filed in one application.", "34": "Divisional application of invention patent\nA patent application that substantially contains two or more inventions may, upon notice by the Specific Patent Agency or upon request by the applicant, be divided into two or more divisional applications.\nA request for division shall be filed within any of the following time periods:\n1. before a reexamination decision on the original patent application is rendered; or\n2. within three (3) months after the date on which an approval decision for the original patent application or reexamination is served.\nThe filing date of the divisional patent application shall be the same as the filing date of the original application. Where the priority claim has been made, the applicant may claim priority for the divisional patent application.\nThe divisional patent application shall not extend beyond the scope of content disclosed in the description, claim(s), or drawing(s) of the original patent application as filed.\nFor the divisional patent application filed in accordance with Subparagraph 1 of Paragraph 2, the examination thereof shall resume the completed examination procedure of the original patent application.\nFor the divisional patent application filed in accordance with Subparagraph 2 of Paragraph 2, it shall be based on the invention(s) disclosed in the description or the drawing(s), but shall not be the same as that which has been approved in the original patent application; the examination thereof that has been conducted before the original patent application is approved shall be resumed.\nThe description, claim(s), or drawing(s) of the original patent application that have been approved may not be altered and shall be published based on the claim(s) and drawing(s) as originally approved.", "35": "Application date when the owner of the right to apply files a patent invalidation action\nWhere an invalidation action is filed against a granted patent by the owner of the right to apply for a patent or by the joint owner(s) of the right to apply for a patent within two (2) years after the publication date of the patent concerned, in accordance with Subparagraph 3, Paragraph 1 of Article 71, and where the said person or joint owner(s) newly files a patent application for the same invention within two (2) months after the day on which the invalidation decision revoking the patent has become final and binding, the filing date of the revoked patent shall be the filing date for the newly filed patent application.\nA patent application newly filed in accordance with the preceding paragraph shall not be published again.", "36": "Assignment of a patent examiner for examination\nThe Specific Patent Agency shall assign a patent examiner to conduct the substantive examination of a patent application for invention.", "37": "Early publication of a patent application for an invention\nAfter receiving application documents and determining through examination that the application conforms to stipulated formality requirement and contains no elements that may be deemed unsuitable for laying open, the Specific Patent Agency shall lay open the patent application for invention eighteen (18) months since its filing.\nThe Specific Patent Agency may advance the laying-open of a patent application upon the request of the applicant.\nA patent application for invention shall not be laid open under any of the following conditions:\n1. where it is withdrawn within fifteen (15) months after its filing date;\n2. where it involves national defense secrets or any other secrets pertaining to national security; or\n3. where it is contrary to public order or morality.\nWhere a priority is claimed, the calculation of time period set forth in Paragraph 1 and the preceding paragraph shall be based on the priority date; where two or more priorities are claimed, the calculation thereof shall be based on the earliest priority date.", "38": "Request for substantive examination\nA request to the Specific Patent Agency for substantive examination of a patent application for invention may be made by any person within three (3) years after the filing date of the patent application.\nWhere a division request is made pursuant to Paragraph 1 of Article 34 or where a patent application is converted into a patent application for invention pursuant to Paragraph 1 of Article 108, if the time period set forth in the preceding paragraph has lapsed, a request for substantive examination may be made within thirty (30) days after such request for division or conversion.\nA request for substantive examination according to the preceding two paragraphs shall not be withdrawn.\nWhere a request for substantive examination is not filed within the time period prescribed in Paragraph 1 or Paragraph 2, the patent application for invention shall be deemed to have been withdrawn.", "39": "Procedures for substantive examination\nA request form for substantive examination, as referred to in the preceding Article, shall be submitted.\nThe Specific Patent Agency shall publish the facts regarding a request for a substantive examination in the Patent Gazette.\nWhere substantive examination is requested by a person other than the invention patent applicant, the Specific Patent Agency shall notify the invention patent applicant of such fact.", "40": "Prioritized examination of a patent application for invention\nThe Specific Patent Agency may, upon request, conduct prioritized examination of a patent application for invention if it is commercially exploited by a person other than the applicant after it is laid open.\nRelevant document(s) of proof shall be submitted when filing a request referred to in the preceding paragraph.", "41": "Effect of laying open an application\nAn invention patent applicant may, after the publication of an invention patent application, claim appropriate compensation against the exploiter who, having been given a written notice by the applicant in respect of the contents of the invention after the laying-open of the invention patent application, continues to commercially exploit the invention after receiving the notice and prior to the publication of the said application.\nThe claim referred to in the preceding paragraph may also be made against a person who is fully aware that the patent application for invention has been laid open but continues to commercially exploit the invention prior to its publication.\nThe right to claim compensation as provided in the preceding two paragraphs does not affect the exercise of other rights. However, where an applicant having filed a patent application for invention and a patent application for utility model pursuant to Article 32 of this Act has been granted the utility model patent, the claim against such exploiter shall only be made based either on the right to claim compensation or on the utility model patent right.\nThe right to claim compensation as set forth in Paragraphs 1 and 2 shall become extinguished if not exercised within two (2) years after the publication date of the said invention patent.", "42": "Interview and inspection during the procedure of examination\nWhen examining a patent application for invention, the Specific Patent Agency may, upon request or on its own initiative, notify the applicant to conduct any of the following actions within a specified time period:\n1. to appear before the Specific Patent Agency for an interview; or\n2. to perform necessary experiment(s) or submit model(s) or sample(s).\nThe Specific Patent Agency may, when necessary, visit the site or a designated place to carry out an inspection on the experiment(s) performed or model(s) or sample(s) to be submitted pursuant to Subparagraph 2 of the preceding paragraph.", "43": "Amendment during examination; final notice\nUnless otherwise stipulated in this Act, when examining a patent application for invention, the Specific Patent Agency may, upon request or on its own initiative, notify the applicant to amend the description, claim(s), or drawing(s) within a specified time period.\nExcept for correction of translation errors, any amendment shall not extend beyond the scope of content disclosed in the description, claim(s), or drawing(s) as filed.\nWhere the Specific Patent Agency has issued a notice pursuant to Paragraph 2 of Article 46, a patent applicant shall only make amendment(s) within the specified time period in the notice.\nThe Specific Patent Agency may, as it deems necessary, issue a final notice after having issued a notice prescribed in the preceding paragraph. The applicant who is to amend claim(s) after a final notice has been issued shall only make the following amendments within the time period specified therein:\n1. to delete claim(s);\n2. to narrow down the scope of claim(s);\n3. to correct errors; or\n4. to clarify ambiguous statement(s).\nIn case of a violation of the provisions in the preceding two paragraphs, the Specific Patent Agency shall state the reasons in a written decision and render such decision accordingly.\nThe Specific Patent Agency may issue a final notice accordingly if the original patent application or its divisional application meets any of the following conditions:\n1. where the content of the notice issued for the original patent application is the same as that of the notice issued for the divisional patent application;\n2. where the content of the notice issued for the divisional patent application is the same as that of the notice issued for the original patent application; or\n3. where the content of the notice issued for a divisional application is the same as that of the notice issued for other divisional application(s).", "44": "Amendment of claim(s)\nWhere a patent applicant submits a description, claim(s), and drawing(s) prepared in a foreign language pursuant to Paragraph 3 of Article 25, such foreign language documents shall not be amended.\nThe Chinese translation submitted pursuant to Paragraph 3 of Article 25 shall not extend beyond the scope of content disclosed in the original foreign language documents as filed.\nAny correction of translation errors, in the Chinese version, as stated in the preceding paragraph shall not extend beyond the scope of content disclosed in the original foreign language documents as filed.", "45": "Decision of examination\nUpon completion of examination of a patent application for invention, a written decision shall be rendered and served on the applicant.\nWhen a patent application is rejected after examination, the reason(s) shall be given in the written decision of examination.\nA written decision of examination shall bear the name of the patent examiner. This requirement shall also apply to written decisions for reexamination, post-grant amendment, invalidation, patent term extension, and invalidation against patent term extension.", "46": "Grounds for the rejection of invention patent application\nWhen a patent application for invention is in violation of the provisions set forth in Articles 21 through 24, Article 26, Article 31, Paragraphs 1 and 3 of Article 32, Article 33, Paragraph 4 and the forepart of Paragraph 6 of Article 34, Paragraph 2 of Article 43, Paragraphs 2 and 3 of Article 44, or Paragraph 3 of Article 108, a decision of rejection shall be rendered.\nBefore rendering a decision in accordance with the preceding paragraph, the Specific Patent Agency shall notify the applicant to file a response within a designated time period. If the applicant fails to make a response within the time period, a decision of rejection shall be rendered accordingly.", "47": "Publication of patented invention and application for browsing\nA claimed invention shall be patented if there is no reason for negating its patentability, and the claim(s) and the drawing(s) of the patent application shall be published.\nAny person may apply to view, transcribe, photograph, or photocopy the written decision of examination, description, claim(s), abstract, drawing(s), and the file wrapper in connection with a patent application that has been published, except for the information that should be kept confidential by the Specific Patent Agency in accordance with laws.", "48": "Reexamination\nAn invention patent applicant disagrees with a decision of rejection may provide reason(s) to request a reexamination within two (2) months after the date on which the decision of rejection is served. If the patent application is not accepted or dismissed for formality defects or on the ground of ineligibility of the applicant, the applicant may directly file administrative remedy actions in accordance with the laws.", "49": "Amendment during reexamination\nWhere a decision of rejection is rendered pursuant to Paragraph 2 of Article 46, the applicant may amend the description, claim(s), or drawing(s) during the reexamination stage.\nWhere a final notice has been issued before the decision of rejection is rendered for a patent application, any amendment made during the reexamination stage shall still be subject to limitations set forth in each subparagraph of Paragraph 4 of Article 43. The above shall not apply to reexamination, if the Specific Patent Agency finds that the final notice issued in the original examination procedure was improper.\nThe Specific Patent Agency may issue a final notice accordingly under any of the following conditions:\n1. where the reason(s) for reexamination still entail grounds for an rejection;\n2. where the amendment(s) made during the reexamination stage still entail grounds for an rejection; or\n3. where an amendment made in accordance with the preceding paragraph is in violation of the subparagraphs of Paragraph 4 of Article 43.", "50": "Appointment of a patent examiner for reexamination\nIn reexamination cases, the Specific Patent Agency shall appoint a patent examiner who did not participate in the examination of the concerned patent application to conduct reexamination and render a written decision to be served on the applicant.", "51": "Confidentiality of invention involving national security\nWhere, through examination, an invention involves national defense secrets or any other secrets pertaining to national security, the Ministry of National Defense or relevant national security authorities shall be consulted for their comments; if it is deemed necessary to keep such invention confidential, the application documents of the said patent application shall be sealed. If a request for substantive examination has been filed for the said patent application, an examination decision shall be rendered and served on the applicant and the inventor.\nThe applicant, patent agent and the inventor shall keep confidential the invention referred to in the preceding paragraph; the right to apply for a patent for such invention shall be deemed to have been abandoned if there is any violation of the confidentiality requirement.\nThe confidentiality period shall last for one (1) year after the date on which a written decision is served on the applicant, and such period may be extended on an annual basis. The Specific Patent Agency shall consult with the Ministry of National Defense or relevant national security authorities one (1) month prior to the expiration of the confidentiality period and, if confidentiality is no longer required, such patent application shall be laid open.\nWhere an invention referred to in Paragraph 1 is approved and where confidentiality is deemed unnecessary for such a patent application, the Specific Patent Agency shall publish the grant of the invention patent after receiving patent certificate fee and the first-year annuity paid within three (3) months by the applicant. If the said fees are not paid prior to the time period stated above, no publication shall be made.\nThe Government shall pay a considerable compensation for the loss suffered by the applicant during the confidentiality period.", "52": "Payment of fees and publication of an issued invention patent\nFor a patent application for invention that is approved, the grant of such a patent application shall be published only when the patent certificate fee and the first-year patent annuity are paid by the applicant within three (3) months after the date on which the approval decision is served; if the fees are not paid within the said time period, no publication shall be made.\nA patent right granted to a patent application for an invention shall start from the publication date of the patent, and a patent certificate shall be issued thereto.\nThe term of an invention patent shall expire after a period of twenty (20) years from the filing date of the application.\nWhere the applicant unintentionally fails to pay the required fees within the time period set forth in Paragraph 1 or Paragraph 4 of the preceding article, the applicant should pay the patent certificate fee and two times the first-year patent annuity within six (6) months after the period has expired. After the said payment has been made, the Specific Patent Agency shall publish the patent.", "53": "Extension of patent term\nWhere a regulatory approval shall be obtained in accordance with other laws and regulations for the exploitation of an invention patent involving a pharmaceutical or agrichemical, or the manufacturing process thereof, if such regulatory approval is obtained after the publication of the concerned invention patent, the patentee may apply for one and only one extension of the patent term of said invention patent based on the first regulatory approval. The said regulatory approval is allowed to be used only once for seeking patent term extension.\nThe extension of the patent term approved under the preceding paragraph shall not exceed the length of time when the patent cannot be exploited because of the filing of a request for the regulatory approval with the central competent authorities in charge of the business. If the time needed to obtain the said regulatory approval exceeds five (5) years, the granted patent term extension shall still be five (5) years.\nThe term \"pharmaceutical\" as set forth in Paragraph 1 does not include any veterinary drug.\nWhen requesting for patent term extension as provided in the Paragraph 1, a request form and document(s) of proof must be submitted to the Specific Patent Agency within three (3) months after obtaining the first regulatory approval; no request for patent term extension shall be filed within six (6) months prior to the expiry of the original patent term.\nWhen making a decision on an application for patent term extension, the Specific Patent Agency shall take into consideration the impact on public health and shall coordinate with the central competent authorities in charge of the business to formulate the regulations concerned.", "54": "Deemed to have been extended\nWhere a request for patent term extension is filed in accordance with the preceding article, the patent term shall be deemed to have been extended if the Specific Patent Agency has yet to render a decision before the original patent term expires. However, where such request for patent term extension is not allowed, the patent term shall expire on the original expiration date.", "55": "Assignment of a patent examiner for extension request\nThe Specific Patent Agency shall appoint a patent examiner to examine a request for patent term extension, render a written decision, and serve it on the patentee.", "56": "Scope of patent term extension\nThe scope of a patent, for which a term extension has been granted, shall be limited to only the effective ingredients and uses stated in the regulatory approval concerned.", "57": "Invalidation of patent term extension\nAny person may file an invalidation action against the granted patent term extension with the Specific Patent Agency, along with document(s) of proof, under any of the following conditions:\n1. where it is unnecessary to obtain regulatory approval to exploit the invention patent concerned;\n2. where neither the patentee nor the licensee has obtained the regulatory approval;\n3. where the granted term of extension exceeds the period during which the patent cannot be exploited;\n4. where the requester of the patent term extension is not the patentee;\n5. where the regulatory approval for extension request is not the first approval, or a request for

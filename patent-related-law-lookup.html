const JA_IP_ADJ = {"1":"目的\n知的財産事件を専門的・適切かつ迅速に審理する訴訟制度を構築し、知的財産及びこれに関連する権益を保護するため、本法を制定する。","2":"準拠法\n知的財産事件の審理は、本法の規定による。本法に規定のない事項については、民事訴訟、刑事訴訟又は行政訴訟の手続においてそれぞれ適用される法律による。","3":"定義\n本法にいう「知的財産裁判所」とは、知的財産及び商業裁判所をいい、「知的財産法廷」「商業法廷」とは、知的財産裁判所の知的財産法廷及び商業法廷をいう。\n本法にいう「知的財産事件」とは、次の各号に掲げる事件をいう。\n一、知的財産民事事件。\n二、知的財産刑事事件。\n三、知的財産行政事件。\n四、その他法律の規定又は司法院の指定により知的財産裁判所が管轄する事件。","4":"営業秘密の定義\n本法にいう「営業秘密」とは、営業秘密法第二条に規定する営業秘密をいう。","5":"遠隔審理\n当事者、代表者、管理者、代理人、弁護人、補佐人、参加人、証人、専門家証人、鑑定人、調査人、特約通訳、専門家その他の訴訟関係者の所在地と裁判所との間に、音声及び映像を相互に伝送できる技術設備があり、直接審理が可能な場合、裁判所が適当と認めるときは、申請により又は職権で当該設備を利用することができる。\n前項の場合、裁判所はあらかじめ当事者の意見を聴取しなければならない。\n第一項の申請が却下された場合は、不服を申し立てることができない。\n第一項の場合、期日通知書又は召喚状に記載すべき出頭場所は、当該設備の所在地とする。\n第一項の手続により作成された調書その他の書類に署名を要する場合は、裁判所が遠隔端末に送信し、内容を確認して署名した後、技術設備により裁判所に返信することとし、その効力は署名済みの調書その他の書類と同じとする。\n第一項の審理及び前項の書類送信の手続に関する規則は、司法院が定める。","6":"技術審査官\n裁判所は、必要があるときは、技術審査官に次の職務を命じることができる。\n一、訴訟関係を明確にするため、事実上及び法律上の事項について、専門知識に基づき当事者に説明し又は質問すること。\n二、証人、専門家証人又は鑑定人に直接質問すること。\n三、本件について裁判官に意見を陳述すること。\n四、証拠保全の際に証拠調査を補助すること。\n五、保全手続又は強制執行手続において補助すること。\n六、調査人が調査を実施する際に補助すること。\n裁判所は、技術審査官に対し、その職務遂行の結果について報告書の作成を命じることができる。ただし、事件が複雑で必要がある場合は、中間報告書及び最終報告書を別々に作成するよう命じることができる。\n技術審査官が作成した報告書について、裁判所が必要と認めるときは、その全部又は一部の内容を公開することができる。\n裁判所が技術審査官から提供を受けた特殊な専門知識は、当事者に弁論の機会を与えた後でなければ、裁判の基礎とすることができない。","7":"技術審査官の忌避\n技術審査官の忌避は、その参与する手続の種類に応じ、各手続における裁判官の忌避に関する規定を準用する。","8":"民事訴訟法の不適用\n民事訴訟法第二編第三章及び第四章の規定は、知的財産民事事件の手続には適用しない。","9":"専属管轄\n知的財産及び商業裁判所組織法第三条第一号及び第四号に規定する第一審民事事件は、知的財産裁判所の専属管轄とし、訴えの追加その他の変更があっても影響を受けない。ただし、民事訴訟法第二十四条及び第二十五条に規定する場合は、当該裁判所もまた管轄権を有する。\n前項の民事事件の全部又は一部が、労働事件法第二条第一項に規定する労働事件に係るときは、知的財産裁判所が管轄する。\n知的財産法廷が前項の民事事件を審理するときは、本法の規定による。本法に規定のない事項については、労働事件法の規定を適用する。ただし、労働事件法第四条第一項及び第二章の規定は適用しない。\n第一項の民事事件の全部又は一部が、商業事件審理法第二条第二項に規定する商業訴訟事件に係るときは、知的財産法廷は、申請により又は職権で決定をもって商業法廷に移送して審理させなければならない。","10":"弁護士強制\n知的財産民事事件において、次の各号のいずれかに該当する場合、当事者は弁護士を訴訟代理人に選任しなければならない。ただし、当事者又はその法定代理人が裁判官、検察官若しくは弁護士の資格を有する場合はこの限りでない。\n一、第一審民事訴訟事件であって、訴訟の目的たる金額又は価額が民事訴訟法第四百六十六条に規定する第三審上告が認められる金額を超えるもの。\n二、特許権、コンピュータプログラムの著作権、営業秘密に関して争う第一審民事訴訟事件。\n三、第二審民事訴訟事件。\n四、提訴前の証拠保全申請、保全手続並びに前三号の訴訟事件から生じるその他の事件の申請又は抗告。\n五、前四号の再審事件。\n六、第三審裁判所の事件。\n七、その他司法院が弁護士を訴訟代理人に選任すべきと定める事件。","11":"訴訟救助による弁護士選任\n前条第一項本文の事件において、当事者が訴訟代理人を選任する資力がない場合は、訴訟救助の規定に基づき、裁判所に対して弁護士の選任を申請することができる。\n当事者が上訴又は抗告のため前項の規定に基づき申請した場合、原審裁判所は訴訟記録を上級審裁判所に送付しなければならない。\n第一項の弁護士選任に関する規則は、司法院が法務部及び全国弁護士連合会等の意見を参酌して定める。","12":"訴訟代理人による訴訟行為\n第十条第一項の事件は、別段の定めのある場合を除き、訴訟代理人が訴訟行為を行って初めて効力を生じる。\n提訴、上訴、申請又は抗告が第十条第一項若しくは第五項の規定による訴訟代理人の選任をしていない場合、又は第五項に基づき選任したが裁判所が不適当と認める場合は、裁判長は期間を定めてまず補正を命じなければならない。期間内に補正せず、かつ前条第一項の申請もしない場合は、裁判所は決定をもってこれを却下しなければならない。\n被告、被上訴人、相手方が第十条第一項若しくは第五項の規定による訴訟代理人の選任をしていない場合、又は第五項に基づき選任したが裁判所が不適当と認める場合は、裁判長はまず期間を定めて補正を命じなければならない。\n当事者が前二項の規定に基づき補正した場合、その訴訟行為は訴訟代理人が追認することにより、行為時に遡って効力を生じる。期間経過後に補正した場合は、追認時から効力を生じる。","13":"当事者の口頭陳述\n第十条第一項本文の事件において、訴訟代理人は当事者を伴って期日に出頭することができ、裁判長の許可を得た後、当事者は口頭で陳述することができる。\n前項の許可は、裁判長がいつでも決定をもって取り消すことができる。\n当事者が訴訟代理人を選任すべきであるのに選任せず、又は選任した訴訟代理人が出頭しない場合は、不出頭とみなす。\n第一項の場合、当事者は自ら次の訴訟行為を行うことができる。\n一、自認。\n二、和解又は調停の成立。\n三、訴えの取下げ又は申請の取下げ。\n四、上訴又は抗告の取下げ。","14":"訴訟代理人の行為の効力\n訴訟代理人がした又は訴訟代理人に対してなされた訴訟行為は、直接当事者本人に効力を生じる。ただし、訴訟代理人がした自認又は事実上の陳述が、出頭した当事者本人によって即時に撤回又は訂正された場合はこの限りでない。\n訴訟代理人が訴訟行為につき故意又は過失があるときは、当事者本人はその故意又は過失と同一の責任を負う。","15":"弁護士報酬\n第十条第一項本文及び第十一条第一項の弁護士報酬は、訴訟又は手続費用の一部を構成し、その上限額を定めなければならない。支給基準は、司法院が法務部及び全国弁護士連合会等の意見を参酌して定める。","16":"弁理士の訴訟代理\n第十条第一項第二号から第七号の特許権に関する訴訟事件について、裁判長の許可を得た場合、当事者は弁護士に加えて弁理士を訴訟代理人に選任することもできる。\n前項の許可は、裁判長がいつでも決定をもって取り消すことができ、訴訟委任を受けた者に送達しなければならない。\n第一項の場合、弁理士は弁護士と共に出廷して訴訟行為を行わなければならない。ただし、裁判長の許可を得た場合はこの限りでない。\n弁理士の訴訟行為が弁護士の訴訟行為と抵触する場合は、効力を生じない。\n弁理士の報酬は、訴訟又は手続費用に算入しない。","17":"参加人への準用\n第十条、第十二条から第十四条及び第十六条の規定は、参加人に準用する。\n参加人の弁護士及び弁理士の報酬は、訴訟又は手続費用に算入しない。","18":"審理計画\n裁判所が第十条第一項第一号から第三号及び第五号の事件を審理する場合、又はその他の事件について事件が複雑であるか若しくは必要があると認める場合は、当事者と協議して審理計画を策定しなければならない。","19":"調査人の選任\n特許権侵害事件において、裁判所は、証明すべき事実の真偽を判断するため、当事者の申請に基づき調査人を選任し、相手方又は第三者が保有若しくは管理する文書又は装置・設備に対して調査を実施させることができる。ただし、調査の実施に要する時間、費用又は被調査者の負担に対して明らかに不釣り合いな場合はこの限りでない。\n前項の調査申請は、書面により次の事項を明確に記載しなければならない。\n一、特許権が侵害され又は侵害されるおそれがある相当の理由。\n二、申請人が自ら又は他の方法で証拠を収集できない理由。\n三、技術審査官に調査人の調査実施を補助させる必要性。\n四、調査対象物及びその所在地。\n五、証明すべき事実と調査により得られる証拠との関連性。\n六、実施すべき調査の事項、方法及びその必要性。","20":"調査人の欠格事由\n当事者又は第三者との間に民事訴訟法第三十二条各号のいずれかの事情がある者は、調査人となることができない。","21":"調査命令の取消し\n第十九条第五項の決定について、次の各号のいずれかに該当する場合、裁判所は職権でこれを取り消すことができる。\n一、第十九条第一項ただし書に規定する事情が発生したとき。\n二、前条第一項の規定に違反したとき。\n三、前条第二項の開示規定に違反し、調査人の客観性又は公正性に影響を及ぼすおそれがあるとき。\n四、前条第二項第二号から第四号に規定する利害関係により、調査人の客観性又は公正性に影響を及ぼすおそれがあるとき。","22":"調査人の宣誓及び調査実施\n調査人は、調査前に宣誓し、宣誓書に公正かつ誠実に調査を行うこと、虚偽の調査を行った場合には偽証の処罰を受ける旨を記載しなければならない。\n調査人が調査を実施する際は、調査対象物の所在地に立ち入り、裁判所が許可した方法で文書又は装置・設備に対して調査を行うほか、被調査者に質問し又は必要な文書の提示を求めることができる。\n被調査当事者が正当な理由なく調査の実施を拒否し又は妨害した場合、裁判所は状況を考慮して、申請人が申請した調査に係る証明事実が真実であると認定することができる。","23":"調査報告書\n調査人は、調査実施後に調査報告書を作成して裁判所に提出しなければならない。\n裁判所は、調査報告書を受領した後、写し又は電子ファイルを被調査者に送達しなければならない。\n調査報告書が営業秘密に関わる場合、被調査者は調査報告書の写し又は電子ファイルの送達後十四日以内に、調査報告書の全部又は一部を当事者に開示することを禁じる旨の決定を裁判所に申請しなければならない。","24":"調査報告書の閲覧\n前条第三項の場合において、被調査者が期間内に申請せず、又は裁判所が調査報告書の開示禁止を決定しなかったときは、当事者は裁判所書記官に対し、調査報告書又はその電子ファイルの全部若しくは一部の閲覧、謄写、撮影その他の方法による複製を申請することができ、又は費用を予納して調査報告書の全部若しくは一部の謄本、写し、抄本若しくはその電子ファイルの交付を申請することができる。","25":"調査人の証言拒絶権\n調査人として調査を行った後に証人となった者は、調査の実施により知得した営業秘密に関する事項について、証言を拒絶することができる。\n前項の場合において、調査人の秘密保持義務が解除されているときは、証言を拒絶することができない。","26":"調査人の費用\n調査人の日当、旅費、報酬その他調査実施に必要な費用は、鑑定人に関する規定を準用し、訴訟費用の一部を構成する。","27":"準用規定（著作権・営業秘密）\n第十九条から前条までの規定は、コンピュータプログラムの著作権及び営業秘密の侵害事件に準用する。","28":"商業事件審理法の準用\n商業事件審理法第四十七条から第五十二条及び第七十五条の規定は、知的財産民事事件に準用する。","29":"専門知識の開示と争点の整理\n裁判所が既知の特殊な専門知識は、当事者に弁論の機会を与えた後でなければ、裁判の基礎とすることができない。\n裁判長又は受命裁判官は、事件の法律関係について当事者に争点を告知し、適時に法律上の見解を表明するとともに、適度に心証を開示することができる。","30":"特許クレームの解釈\n裁判所が特許権から生じた民事訴訟事件を審理する際、特許請求の範囲の解釈に争いがある場合は、申請に基づき又は職権で適時に特許権の文言的範囲を確定し、適度に心証を開示することが望ましい。","31":"営業秘密に係る非公開審理\n当事者が提出した攻撃防御方法が当事者又は第三者の営業秘密に関わる場合、当事者の申請に基づき、裁判所が適当と認めるときは、非公開で審理することができる。両当事者が合意して非公開で審理することについても同様とする。","32":"訴訟資料の閲覧制限\n訴訟資料が営業秘密に関わる場合、裁判所は当事者の弁論権の行使に影響を与えない範囲で、当事者又は第三者の申請に基づき、訴訟資料の閲覧、謄写、撮影その他の方法による複製を許可しない旨又は制限する旨の決定をすることができる。","33":"閲覧制限の解除及び目的外使用の禁止\n前条第一項の閲覧不許可又は制限決定の原因が消滅した場合、相手方、当事者又は第三者は裁判所に当該決定の取消し又は変更を申請することができる。\n前条第一項に基づく閲覧、謄写、撮影その他の方法による複製によって知得し又は保有した営業秘密は、当該訴訟の遂行以外の目的に使用してはならない。","34":"文書提出命令違反の制裁\n文書、検証物又は鑑定に必要な資料の保有者が、正当な理由なく裁判所の命令に従って文書、検証物又は鑑定に必要な資料を提出しない場合、裁判所は決定をもって新台湾ドル十万元以下の過料を科すことができる。必要があるときは、決定をもって強制処分を命じることもできる。","35":"具体的答弁命令\n特許権、コンピュータプログラムの著作権、営業秘密の侵害事件において、当事者がその主張する権利若しくは利益が侵害され又は侵害されるおそれがある事実について疎明した場合、相手方がその主張を否認するときは、裁判所は期間を定めて相手方に否認する事実及び証拠について具体的に答弁するよう命じなければならない。\n前項の相手方が正当な理由なく期間内に答弁せず又は答弁が具体的でない場合、裁判所は状況を考慮して当事者が疎明した内容が真実であると認定することができる。","36":"秘密保持命令\n当事者又は第三者が保有する営業秘密について、次の各号に該当することを疎明した場合、裁判所は当該当事者又は第三者の申請に基づき、相手方、当事者、代理人、補佐人その他の訴訟関係者に秘密保持命令を発することができる。\n一、当事者の書面の内容に当事者又は第三者の営業秘密が記載されている場合、又は既に調査し若しくは調査すべき証拠が当事者若しくは第三者の営業秘密に関わる場合。\n二、前号の営業秘密が開示され又は当該訴訟の遂行以外の目的に使用されることを防ぐため、当該当事者又は第三者の当該営業秘密に基づく事業活動を妨げるおそれがあり、その開示又は使用を制限する必要がある場合。\n秘密保持命令を受けた者は、当該営業秘密について、当該訴訟の遂行以外の目的に使用し、又は秘密保持命令を受けていない者に開示してはならない。","37":"秘密保持命令の申請\n秘密保持命令の申請は、書面により次の事項を記載しなければならない。\n一、秘密保持命令を受けるべき者。\n二、命令により保護されるべき営業秘密。\n三、前条第一項各号に掲げる事由に該当する事実。","38":"秘密保持命令の内容及び効力\n秘密保持命令を認める決定には、保護される営業秘密、保護の理由及び禁止内容を記載しなければならない。\n秘密保持命令は、秘密保持命令を受けた者に送達された時から効力を生じる。","39":"秘密保持命令の取消し\n秘密保持命令の申請人又は請求人は、別段の定めのある場合を除き、当該命令の取消しを申請し又は請求することができる。\n裁判所が秘密保持命令を発する決定が不当であると認める場合は、前項の場合を除き、職権でこれを取り消すことができる。\n秘密保持命令の取消決定が確定した場合は、その効力を失う。","40":"秘密保持命令発令訴訟の閲覧通知\n秘密保持命令が発令された訴訟について、閲覧制限を受けず又は閲覧不許可とされておらず、かつ秘密保持命令を受けていない者が記録内の文書の閲覧、謄写、撮影その他の方法による複製を請求した場合、裁判所書記官は直ちに第三十六条第一項に規定する営業秘密を保有する当事者又は第三者に通知しなければならない。ただし、秘密保持命令の取消しが確定している場合はこの限りでない。","41":"知的財産権の無効抗弁\n当事者が知的財産権に取消し又は廃止の原因があると主張し又は抗弁した場合、裁判所はその主張又は抗弁に理由があるか否かを自ら判断しなければならず、民事訴訟法、行政訴訟法、植物品種及び種苗法その他の法律に規定する訴訟手続の停止に関する規定は適用しない。\n前項の場合において、裁判所が取消し又は廃止の原因があると認めるときは、知的財産権者はその民事訴訟において相手方に対して権利を主張することができない。","42":"知的財産主管機関への通知\n前条第一項の場合、裁判所は直ちに知的財産主管機関に通知しなければならない。訴訟手続が終了した時も同様とする。","43":"特許権範囲の訂正\n当事者が第四十一条第一項の規定に基づき特許権に取消しの原因があると主張し又は抗弁し、特許権者が特許主管機関に特許権の範囲の訂正を申請している場合は、訂正後の特許権の範囲に基づいて請求又は主張する旨を裁判所に申し述べなければならない。\n前項の場合において、特許権者が自己に帰責できない事由により特許主管機関に訂正を申請することができず、かつ訂正を認めないことが明らかに公平でない場合は、訂正しようとする特許権の範囲を直接裁判所に申し述べ、これを請求又は主張の根拠とすることができる。\n裁判所が第四項の判断により特許権範囲の訂正が適法と認めるときは、訂正後の特許権の範囲に基づいて本案を審理しなければならない。","44":"知的財産主管機関への意見照会\n裁判所が当事者による第四十一条第一項の主張若しくは抗弁に理由があるか否か、又は前条第四項の特許権範囲の訂正の適法性を判断するため、必要があるときは、関係法令その他の必要事項について知的財産主管機関の意見を求めることができる。","45":"専用実施権者への訴訟告知\n知的財産権益が専用実施権の設定を受けている場合において、権利者、営業秘密の所有者又は専用実施権者の一方が、当該専用実施権に係る権益について第三者との間で民事訴訟を提起したときは、口頭弁論終結前の相当の期間内に、訴訟事件及びその進行状況を他方に告知しなければならない。","46":"証拠保全\n証拠保全の申請は、提訴前においては管轄となるべき裁判所に対して行い、提訴後においては係属している裁判所に対して行う。\n裁判所が証拠保全を実施する際は、鑑定、検証、書証の保全、又は証人、専門家証人若しくは当事者本人の尋問を行うことができる。\n裁判所は、証拠保全の実施に際して技術審査官に出頭して職務を執行するよう命じることができる。\n相手方が正当な理由なく証拠保全の実施を拒否した場合、裁判所は必要があるときに強制力をもってこれを排除することができ、警察機関に協力を求めることもできる。","47":"第一審裁判に対する上訴\n知的財産民事事件の第一審裁判に対して上訴又は抗告を提起する場合は、別段の定めのある場合を除き、知的財産裁判所の専属管轄とする。","48":"第二審裁判に対する上訴\n知的財産民事事件の第二審裁判に対しては、別段の定めのある場合を除き、第三審裁判所に上訴又は抗告することができる。\n前項の場合、第三審裁判所は専門法廷又は専門股を設置して処理しなければならない。","49":"再審の制限\n次の各号の処分が確定した場合、当事者は民事訴訟法第四百九十六条第一項第十一号の規定に基づき、特許権、商標権、品種権の侵害事件に係る確定終局判決に対して再審の訴えを提起することができない。\n一、特許権の無効審判、商標権の評定若しくは取消し、品種権の取消し若しくは廃止を認める処分。\n二、発明特許権の存続期間の延長に係る無効審判を認める審決。\n三、特許明細書、特許請求の範囲又は図面の訂正を承認する審決。","50":"支払命令\n知的財産民事事件における支払命令の申請及び処理は、民事訴訟法第六編の規定による。\n債務者が支払命令に対して適法な異議を申し立てた場合、支払命令を発した裁判所は記録及び証拠を知的財産裁判所に移送して処理させなければならない。","51":"仮差押等の申請\n仮差押、仮処分又は仮の地位を定める処分の申請は、提訴前においては管轄となるべき裁判所に対して行い、提訴後においては係属している裁判所に対して行う。","52":"仮の地位を定める処分\n仮の地位を定める処分を申請する際、申請人は争いのある法律関係について、重大な損害の発生を防止し、急迫の危険を回避し、又はこれに類する事情があり、必要性があることを疎明しなければならない。疎明が不十分な場合、裁判所は申請を却下しなければならない。\n申請の原因が疎明されていても、裁判所は申請人に担保を提供させた上で仮の地位を定める処分をすることができる。\n申請人が仮の地位を定める処分の送達の日から十四日の不変期間内に裁判所に提訴の証明をしない場合、裁判所は申請により又は職権でこれを取り消すことができる。\n仮の地位を定める処分の決定が、当初から不当であった場合、第四項の事情がある場合、申請人の申請による場合又は本案判決で敗訴が確定したことによって取り消された場合、申請人は相手方が処分によって被った損害を賠償しなければならない。","53":"判決の送達\n判決は、正本を当事者に送達しなければならない。正本を電子文書で行う場合は、受送達者の同意を得なければならない。ただし、拘禁施設にある者に対しては、正本を電子文書で行うことはできない。\n前項の規定は、決定に準用する。","54":"刑事事件の管轄\n知的財産及び商業裁判所組織法第三条第二号本文及び第四号に規定する刑事事件は、地方裁判所が管轄する。\n営業秘密刑事事件の第一審管轄は、次の各号の定めるところにより、前項の規定は適用しない。\n一、営業秘密法第十三条の一、第十三条の二、第十三条の三第三項及び第十三条の四の罪に係る事件は、第一審知的財産法廷が管轄する。\n二、国家安全法第八条第一項から第三項の罪に係る事件は、第二審知的財産法廷が管轄する。","55":"非公開審理及び閲覧制限（刑事）\n記録及び証拠物の内容が営業秘密に関わる場合、裁判所は当事者又は利害関係人の申請に基づき非公開で審理することができる。\n記録及び証拠物の内容が営業秘密に関わる場合、裁判所は当事者、利害関係人の申請に基づき又は職権で、記録及び証拠物の閲覧、謄写、撮影その他の方法による複製を制限することができる。","56":"匿名化の申請\n営業秘密刑事事件及びこれに係る附帯民事訴訟において、記録及び証拠物の内容が当事者又は利害関係人の営業秘密に関わり、犯罪事実又は損害賠償事実の証明若しくは疎明の方法として用いられる場合、特別な事情のある場合を除き、当事者又は利害関係人は第一回公判期日前に、裁判所に対し去識別化のための代称又は符号の指定を申請することができる。","57":"簡易手続に対する上訴\n第一審知的財産法廷が第五十四条第二項第一号の事件について簡易手続によりした裁判に対して上訴又は抗告を提起する場合は、知的財産法廷合議体に対して行わなければならない。","58":"通常手続等に対する上訴\n地方裁判所の第五十四条第一項の事件又は第一審知的財産法廷が受理した事件について、通常、簡式審判又は合意手続によりした第一審裁判に対して上訴又は抗告を提起する場合は、第二審知的財産法廷に対して行わなければならない。","59":"管轄争いの処理\n前条第二項ただし書の場合において、移送を受けた裁判所が管轄権に争いがあると認めるときは、当事者が前条第三項の規定に基づいて抗告を提起し最高裁判所が理由がないと認めた場合を除き、決定をもって訴訟手続を停止し、最高裁判所に管轄裁判所の指定を求めなければならない。","60":"訴訟停止決定の取消し\n前条第一項の訴訟手続停止の決定は、移送を受けた裁判所が申請に基づき又は職権でこれを取り消すことができる。","61":"急迫の場合の処分及び移送の効果\n訴訟の移送前又は第五十九条第二項の決定前に急迫の事情がある場合、事実審裁判所は申請に基づき又は職権で必要な処分をしなければならない。\n訴訟移送の決定が確定したときは、当該訴訟は当初から移送先の裁判所に係属していたものとみなす。","62":"第二審裁判に対する上訴（刑事）\n第二審知的財産法廷がした裁判に対して上訴又は抗告を提起する場合は、別段の定めのある場合を除き、刑事訴訟法の規定に基づき最高裁判所に対して行わなければならない。\n前項の場合、最高裁判所は第三審手続を適用し、専門法廷又は専門股を設置して処理しなければならない。","63":"附帯民事訴訟の取扱い\n第五十四条第一項及び第二項の事件に係る附帯民事訴訟について、刑事訴訟が刑事訴訟法第百六十一条第二項の決定により起訴が却下された場合は、決定をもって原告の訴えを却下し、刑事訴訟法第五百三条第一項から第三項の規定を準用しなければならない。","64":"附帯民事訴訟の上訴\n地方裁判所の第五十四条第一項の事件又は第一審知的財産法廷が受理した事件について、通常、簡式審判又は合意手続による附帯民事訴訟の裁判に対して上訴又は抗告を提起する場合は、第二審知的財産法廷に対して行わなければならない。","65":"附帯民事訴訟の同時裁判\n第五十四条第一項及び第二項の事件の附帯民事訴訟は、刑事訴訟と同時に裁判しなければならない。ただし、必要がある場合は、刑事訴訟の裁判後六十日以内に裁判することができる。","66":"刑事事件への準用\n第二十九条第一項、第三十六条から第四十条、第四十一条第一項及び第五十三条の規定は、第五十四条第一項及び第二項の事件又はこれに係る附帯民事訴訟の審理に準用する。\n第四十九条の規定は、商標法違反事件について提起された附帯民事訴訟の審理に準用する。\n第五十四条第一項及び第二項の事件には、被害者訴訟参加に関する刑事訴訟法の規定を準用する。","67":"行政訴訟法の不適用\n行政訴訟法第二編第二章の簡易訴訟手続の規定は、知的財産行政事件の手続には適用しない。","68":"行政事件の管轄\n知的財産及び商業裁判所組織法第三条第三号及び第四号に規定する行政事件は、知的財産裁判所が管轄する。\nその他の行政事件が前項各号の事件と併合して提訴され又は訴えの追加がある場合は、知的財産裁判所に対して行わなければならない。\n知的財産裁判所は、第一項の強制執行事務を処理するため、執行処を設置し又は地方裁判所民事執行処若しくは行政機関に嘱託して代わりに執行させることができる。\n債務者が前項の嘱託による代行執行の執行名義に異議を申し立てる場合は、知的財産法廷が決定する。","69":"行政事件の上訴\n知的財産裁判所の裁判に対しては、法律に別段の定めのある場合を除き、最高行政裁判所に上訴又は抗告することができる。","70":"行政訴訟における新証拠\n商標登録の取消し若しくは廃止又は特許権の取消しに関する行政訴訟において、当事者が口頭弁論終結前に同一の取消し又は廃止理由について提出した新証拠は、知的財産裁判所が審酌しなければならない。\n知的財産主管機関は、前項の新証拠について答弁書を提出し、相手方の当該証拠に関する主張に理由があるか否かを表明しなければならない。","71":"行政事件への準用\n第二十九条から第四十条、第四十六条、第五十一条及び第五十二条の規定は、知的財産行政事件に準用する。\n知的財産民事事件又は刑事事件を担当した裁判官は、当該事件又は事案に関連する知的財産行政事件の審理に参加することができ、行政訴訟法第十九条第三号の規定は適用しない。","72":"秘密保持命令違反の罰則\n本法の秘密保持命令に違反した者は、三年以下の有期懲役、拘留又は新台湾ドル百万元以下の罰金に処し、若しくはこれを併科する。\n前項の罪を犯し、命令により保護される営業秘密が国家安全法第三条に規定する国家核心重要技術の営業秘密に該当する場合は、五年以下の有期懲役、拘留又は新台湾ドル三百万元以下の罰金に処し、若しくはこれを併科する。\n外国、中国大陸地区、香港又はマカオにおいて前二項の罪を犯した者は、犯罪地の法律に処罰規定の有無を問わず、前二項の規定を適用する。","73":"両罰規定\n法人の代表者、非法人団体の管理者若しくは代表者、並びに法人、非法人団体若しくは自然人の代理人、使用人その他の従業者が業務の執行に際して前条の罪を犯した場合は、行為者を処罰するほか、当該法人、非法人団体又は自然人に対しても前条第一項及び第二項の罰金を科する。ただし、法人の代表者、非法人団体の管理者若しくは代表者及び自然人が犯罪の発生を防止するために力を尽くした場合はこの限りでない。","74":"調査人の偽証罪等\n調査人が裁判所の審判において、事件に重要な関係がある事項について宣誓の上で虚偽の調査又は陳述をした場合は、七年以下の有期懲役に処する。\n前項の罪を犯し、虚偽の調査又は陳述をした事件について裁判確定前に自白した場合は、刑を減軽し又は免除することができる。\n調査人が調査の目的に反し、調査により知得した営業秘密を複製、使用又は漏洩した場合は、三年以下の有期懲役、拘留又は新台湾ドル百万元以下の罰金に処し、若しくはこれを併科する。\n前項の罪を犯し、複製、使用又は漏洩した営業秘密が国家安全法第三条に規定する国家核心重要技術の営業秘密に該当する場合は、五年以下の有期懲役、拘留又は新台湾ドル三百万元以下の罰金に処し、若しくはこれを併科する。","75":"経過措置\n本法の中華民国百十二年一月十二日改正条文の施行前に裁判所に係属していた知的財産民事事件には、本法の改正施行前の規定を適用する。ただし、当事者が合意して改正施行後の第十八条から第四十条、第四十二条、第四十四条、第四十五条及び第五十三条の規定を適用する場合はこの限りでない。\n本法の中華民国百十二年一月十二日改正条文の施行前に裁判所に係属していた知的財産刑事事件及びこれに係る附帯民事訴訟には、本法の改正施行前の規定を適用する。\n本法の中華民国百十二年一月十二日改正条文の施行前に裁判所に係属していた知的財産行政事件には、本法の改正施行前の規定を適用する。","76":"審理規則\n本法の審理規則は、司法院が定める。","77":"施行日\n本法の施行日は、司法院が定める。"};
const DYNAMIC_LAWS = {};
const DYNAMIC_CACHE = {};  // cache fetched data


let currentLaw = 'act';
let currentNum = null;
let currentKey = null;
let currentPara = 0;
let currentSub = 0;

function selectLaw(law) {
  currentLaw = law;
  document.getElementById('result').className = 'result';

  const hintMap = {
    zh: {
      act:'專利法特殊條號：60-1, 97-1~97-4, 157-1~157-4',
      rules:'施行細則共93條（含26-1, 26-2, 89-1）',
      trips:'TRIPS共73條（第1~73條）',
      ip_adj:'智慧財產案件審理法共82條'
    },
    en: {
      act:'Special articles: 60-1, 97-1~97-4, 157-1~157-4',
      rules:'93 articles (incl. 26-1, 26-2, 89-1)',
      trips:'73 articles (Arts. 1–73)', ip_adj:'82 articles'
    },
    ja: {
      act:'特殊条番号：60-1, 97-1~97-4, 157-1~157-4',
      rules:'全93条（26-1, 26-2, 89-1を含む）',
      trips:'全73条（第1〜73条）', ip_adj:'全82条'
    }
  };
  const meta = {
    act:        { max:159, artMeta:'Patent Act · 中華民國專利法' },
    rules:      { max: 93, artMeta:'Enforcement Rules · 專利法施行細則' },
    trips:      { max: 73, artMeta:'TRIPS · 與貿易有關之智慧財產權協定' },
    ip_adj:     { max: 82, artMeta:'IP Adjudication Act · 智慧財產案件審理法' },
  };
  const m = meta[law] || { max:200, hint:'', artMeta:'' };
  document.getElementById('numInput').max = m.max;
  document.getElementById('hint-special').textContent = (hintMap[currentUILang]||hintMap.zh)[law] || '';
  document.getElementById('art-meta').textContent = m.artMeta;
}

function getDataSets() {
  switch(currentLaw) {
    case 'act':   return { zh: ZH, en: EN };
    case 'rules': return { zh: ZH_RULES, en: EN_RULES };
    case 'trips': return { zh: ZH_TRIPS, en: EN_TRIPS };
    case 'ip_adj': return { zh: ZH_IP_ADJ, en: EN_IP_ADJ };
    default:
      const cached = DYNAMIC_CACHE[currentLaw];
      if (cached) return cached;
      return null;
  }
}

function getPcode() {
  const m = { act:'J0070007', rules:'J0070008' };
  if (m[currentLaw]) return m[currentLaw];
  if (DYNAMIC_LAWS[currentLaw]) return DYNAMIC_LAWS[currentLaw].pcode;
  return null;
}

function lookup() {
  const raw = document.getElementById('numInput').value.trim();
  if (!raw) return;

  // For dynamic laws, fetch if not yet cached
  if (DYNAMIC_LAWS[currentLaw] && !DYNAMIC_CACHE[currentLaw]) {
    fetchDynamicLaw(currentLaw, raw);
    return;
  }

  const ds = getDataSets();
  if (!ds) return;
  const ZH_DATA = ds.zh;
  const EN_DATA = ds.en;

  let key = raw;
  if (!ZH_DATA[key]) {
    key = String(parseInt(raw));
  }

  currentNum = raw;
  currentKey = key;
  currentPara = parseInt(document.getElementById('paraInput').value) || 0;
  currentSub  = parseInt(document.getElementById('subInput').value)  || 0;

  const result = document.getElementById('result');
  result.className = 'result';
  void result.offsetWidth;
  result.className = 'result show';

  const found = !!ZH_DATA[key];
  document.getElementById('notFound').style.display = found ? 'none' : 'block';

  
  if (!found) {
    document.getElementById('artNum').textContent = '第 ' + raw + ' 條';
    return;
  }

  document.getElementById('artNum').textContent = '第 ' + key + ' 條';
  const zhParseLang = currentLaw === 'trips' ? 'trips' : 'zh';
  renderArticle('zh', ZH_DATA[key], zhParseLang);

  const enText = EN_DATA[key] || '（本條暫無英譯）\nNo English translation available for this article.';
  const enParseLang = currentLaw === 'trips' ? 'trips' : (currentLaw === 'rules' ? 'en' : 'en-headed');
  renderArticle('en', enText, enParseLang);

  // JA panel: static machine translation data
  const jaData = getJAData();
  if (!jaData) {
    renderJA('（このカテゴリの日本語訳はありません）\nNo Japanese translation for this law category.', true);
  } else {
    const jaFullText = jaData[key] || '（本条の日本語訳は未収録です）\nThis article is not yet included in the Japanese translation.';
    // Apply para/sub filtering same as renderArticle
    if (currentPara > 0) {
      const jaLang = currentLaw === 'trips' ? 'trips-ja' : (currentLaw === 'rules' ? 'ja' : 'ja-headed');
      const { sections } = parseStructure(jaLang, jaFullText);
      const sec = sections[currentPara - 1];
      if (!sec) {
        const el = document.getElementById('text-ja');
        if (el) el.innerHTML = '<div class="mt-notice">⚠ 機械翻訳（非公式） · Machine-translated, not official</div>' +
          `<span style="color:var(--red)">第 ${currentPara} 項は存在しません（本条は ${sections.length} 項）</span>`;
      } else if (currentSub > 0) {
        const sub = sec.subs[currentSub - 1];
        if (!sub) {
          const el = document.getElementById('text-ja');
          if (el) el.innerHTML = '<div class="mt-notice">⚠ 機械翻訳（非公式） · Machine-translated, not official</div>' +
            `<span style="color:var(--red)">第 ${currentPara} 項第 ${currentSub} 号は存在しません</span>`;
        } else {
          renderJA((sec.para ? sec.para + '\n' + sub : sub), true);
        }
      } else {
        const paraText = sec.para + (sec.subs.length > 0 ? '\n' + sec.subs.join('\n') : '');
        renderJA(paraText, true);
      }
    } else {
      renderJA(jaFullText, true);
    }
  }

  const pcode = getPcode();
  if (pcode) {
    const zhUrl = `https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=${pcode}&flno=${key}`;
    const enUrl = `https://law.moj.gov.tw/ENG/LawClass/LawAll.aspx?pcode=${pcode}`;
    const setHref = (id, url) => { const el = document.getElementById(id); if (el) el.href = url; };
    setHref('src-zh', zhUrl);
    setHref('src-en', enUrl);
    setHref('src-ja', enUrl);
  }
}

async function fetchDynamicLaw(lawId, pendingArticle) {
  const cfg = DYNAMIC_LAWS[lawId];
  const pcode = cfg.pcode;

  // Show loading INSIDE the panels, not by replacing result
  const result = document.getElementById('result');
  result.className = 'result show';
  const loadMsg = '載入中…\nLoading ' + cfg.enName + ' from law.moj.gov.tw…\n読み込み中…';
  ['zh','en','ja'].forEach(lg => {
    const el = document.getElementById('text-' + lg);
    if (el) el.textContent = loadMsg;
  });
  document.getElementById('notFound').style.display = 'none';
  document.getElementById('artNum').textContent = cfg.zhName;
  document.getElementById('art-meta').textContent = cfg.enName;

  try {
    const [zhRes, enRes] = await Promise.all([
      fetch('https://law.moj.gov.tw/api/ch/fundict/GetLawContent?pcode=' + pcode),
      fetch('https://law.moj.gov.tw/api/en/fundict/GetLawContent?pcode=' + pcode)
    ]);
    const zhJson = await zhRes.json();
    const enJson = await enRes.json().catch(() => ({ LawContent: [] }));

    const zhData = {}, enData = {};
    (zhJson.LawContent || []).forEach(item => {
      if (item.ArticleType === 'A' && item.ArticleNo) {
        zhData[String(parseInt(item.ArticleNo))] = item.ArticleContent || '';
      }
    });
    (enJson.LawContent || []).forEach(item => {
      if (item.ArticleType === 'A' && item.ArticleNo) {
        enData[String(parseInt(item.ArticleNo))] = item.ArticleContent || '';
      }
    });

    DYNAMIC_CACHE[lawId] = { zh: zhData, en: enData };
    ['zh','en','ja'].forEach(lg => {
      const el = document.getElementById('text-' + lg);
      if (el) el.textContent = '';
    });
    if (pendingArticle) {
      document.getElementById('numInput').value = pendingArticle;
      lookup();
    }
  } catch(e) {
    const errZh = '無法直接載入 ' + cfg.zhName + '（CORS 限制）。\n\n' +
      '請至官方網站查詢：\n' +
      '中文版：https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=' + pcode + '\n' +
      '英文版：https://law.moj.gov.tw/ENG/LawClass/LawAll.aspx?pcode=' + pcode;
    const errEn = 'Cannot load ' + cfg.enName + ' (CORS restriction).\n\n' +
      'Please visit the official website:\n' +
      'Chinese: https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=' + pcode + '\n' +
      'English: https://law.moj.gov.tw/ENG/LawClass/LawAll.aspx?pcode=' + pcode;

    const zhEl = document.getElementById('text-zh');
    const enEl = document.getElementById('text-en');
    const jaEl = document.getElementById('text-ja');
    if (zhEl) zhEl.textContent = errZh;
    if (enEl) enEl.textContent = errEn;
    if (jaEl) jaEl.textContent = errZh;

    // Update source links to official site
    ['src-zh','src-en'].forEach(id => {
      const a = document.getElementById(id);
      if (a) a.href = 'https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=' + pcode;
    });
    ['src-ja'].forEach(id => {
      const a = document.getElementById(id);
      if (a) a.href = 'https://law.moj.gov.tw/ENG/LawClass/LawAll.aspx?pcode=' + pcode;
    });
  }
}

function parseStructure(lang, text) {
  const allLines = text.split('\n').filter(l => l.trim() !== '');
  const zhSub = /^[一二三四五六七八九十百]+、/;
  const numSub = /^\d+\./;
  const tripsPara = /^\d+\./;

  let heading = null;
  let startIdx = 0;
  if (lang === 'en-headed' || lang === 'ja-headed') {
    heading = allLines[0];
    startIdx = 1;
  }

  // TRIPS uses "1. 2. 3." as paragraph (項) separators, not subparagraphs
  if (lang === 'trips' || lang === 'trips-ja') {
    const sections = [];
    const hasHeading = lang === 'trips-ja';
    const si = hasHeading ? 1 : 0;
    if (hasHeading) heading = allLines[0];
    for (let i = si; i < allLines.length; i++) {
      const line = allLines[i];
      if (tripsPara.test(line)) {
        sections.push({ para: line, subs: [] });
      } else if (sections.length > 0) {
        // continuation line — append to last para
        sections[sections.length - 1].para += ' ' + line;
      }
    }
    return { heading, sections };
  }

  const sections = [];
  let current = null;
  for (let i = startIdx; i < allLines.length; i++) {
    const line = allLines[i];
    const isSub = zhSub.test(line) || ((lang === 'en' || lang === 'en-headed') && numSub.test(line));
    if (!isSub) {
      if (current) sections.push(current);
      current = { para: line, subs: [] };
    } else {
      if (!current) current = { para: '', subs: [] };
      current.subs.push(line);
    }
  }
  if (current) sections.push(current);
  return { heading, sections };
}

function renderArticle(lang, text, parseLang) {
  const el = document.getElementById('text-' + lang);
  const { heading, sections } = parseStructure(parseLang || lang, text);
  const numEl = document.getElementById('artNum');

  // 決定要顯示的內容
  let output = '';
  let label = '';

  if (currentPara > 0) {
    const sec = sections[currentPara - 1];
    if (!sec) {
      el.innerHTML = lang === 'zh'
        ? `<span style="color:var(--red)">第 ${currentPara} 項不存在（本條共 ${sections.length} 項）</span>`
        : `<span style="color:var(--red)">Paragraph ${currentPara} does not exist (this article has ${sections.length} paragraph(s))</span>`;
      numEl.textContent = lang === 'zh' ? `第 ${currentKey} 條第 ${currentPara} 項` : `Article ${currentKey}, Para. ${currentPara}`;
      return;
    }

    if (currentSub > 0) {
      const sub = sec.subs[currentSub - 1];
      if (!sub) {
        const hasSubs = sec.subs.length > 0;
        el.innerHTML = lang === 'zh'
          ? `<span style="color:var(--red)">第 ${currentPara} 項第 ${currentSub} 款不存在${hasSubs ? `（本項共 ${sec.subs.length} 款）` : '（本項無款）'}</span>`
          : `<span style="color:var(--red)">Subparagraph ${currentSub} does not exist in Paragraph ${currentPara}${hasSubs ? ` (${sec.subs.length} subparagraph(s) available)` : ' (no subparagraphs)'}</span>`;
        numEl.textContent = lang === 'zh' ? `第 ${currentKey} 條第 ${currentPara} 項第 ${currentSub} 款` : `Article ${currentKey}, Para. ${currentPara}, Sub. ${currentSub}`;
        return;
      }
      output = sec.para ? sec.para + '\n' + sub : sub;
      label = lang === 'zh'
        ? `第 ${currentKey} 條第 ${currentPara} 項第 ${currentSub} 款`
        : `Article ${currentKey}, Paragraph ${currentPara}, Subparagraph ${currentSub}`;
    } else {
      output = sec.para + (sec.subs.length > 0 ? '\n' + sec.subs.join('\n') : '');
      label = lang === 'zh'
        ? `第 ${currentKey} 條第 ${currentPara} 項`
        : `Article ${currentKey}, Paragraph ${currentPara}`;
    }
  } else {
    output = text;
    label = '第 ' + currentKey + ' 條';
  }

  numEl.textContent = label;

  // 渲染
  if (lang === 'en' && heading && currentPara === 0) {
    const body = output.replace(heading, '').trim();
    el.innerHTML = `<span class="heading">${escHtml(heading)}</span>${escHtml(body)}`;
  } else {
    el.textContent = output;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function switchTab(lang, el) {
  document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
  el.className = 'tab active';
  document.querySelectorAll('.panel').forEach(p => { p.style.display = ''; p.className = 'panel'; });
  document.getElementById('panel-' + lang).className = 'panel active';
}

function copy(lang) {
  const key = currentKey;
  const lawNames = {
    act:        { zh:'中華民國專利法', en:'Patent Act', ja:'台湾特許法' },
    rules:      { zh:'專利法施行細則', en:'Enforcement Rules of the Patent Act', ja:'特許法施行細則' },
    trips:      { zh:'與貿易有關之智慧財產權協定', en:'Agreement on Trade-Related Aspects of Intellectual Property Rights', ja:'知的所有権の貿易関連の側面に関する協定（TRIPS）' },
    ip_adj:     { zh:'智慧財產案件審理法', en:'Intellectual Property Case Adjudication Act', ja:'知的財産案件処理法（台湾）' },
  };
  const lawInfo = lawNames[currentLaw] || lawNames.act;
  const lawZhName = lawInfo.zh;
  const lawEnName = lawInfo.en;
  const lawJaName = lawInfo.ja || lawInfo.en;
  let artLabel;
  if (lang === 'zh') {
    artLabel = currentPara > 0
      ? (currentSub > 0
          ? `${lawZhName}第${key}條第${currentPara}項第${currentSub}款\n\n`
          : `${lawZhName}第${key}條第${currentPara}項\n\n`)
      : `${lawZhName}第${key}條\n\n`;
  } else if (lang === 'ja') {
    artLabel = currentPara > 0
      ? (currentSub > 0
          ? `${lawJaName} 第${key}条第${currentPara}項第${currentSub}号\n\n`
          : `${lawJaName} 第${key}条第${currentPara}項\n\n`)
      : `${lawJaName} 第${key}条\n\n`;
  } else {
    artLabel = currentPara > 0
      ? (currentSub > 0
          ? `${lawEnName}, Article ${key}, Paragraph ${currentPara}, Subparagraph ${currentSub}\n\n`
          : `${lawEnName}, Article ${key}, Paragraph ${currentPara}\n\n`)
      : `${lawEnName}, Article ${key}\n\n`;
  }
  const ds = getDataSets();
  if (!ds) return;
  const ZH_DATA = ds.zh;
  const EN_DATA = ds.en;
  const jaDataCopy = getJAData();
  const fullText = lang === 'zh' ? ZH_DATA[key]
    : lang === 'ja' ? (jaDataCopy ? (jaDataCopy[key] || '') : '')
    : EN_DATA[key];
  // 如果有指定項款，從渲染的文字取
  const displayEl = document.getElementById('text-' + lang);
  const body = (currentPara > 0) ? displayEl.textContent : fullText;
  const full = artLabel + (body || '');

  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById('copy-' + lang);
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ 已複製';
    btn.className = 'btn-copy ok';
    setTimeout(() => { btn.innerHTML = orig; btn.className = 'btn-copy'; }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = full;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

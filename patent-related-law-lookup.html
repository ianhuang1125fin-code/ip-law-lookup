ot exceed a period of six (6) months.", "87": "Where the Specific Patent Agency notifies the applicant to retrieve the model(s), sample(s) or documentary evidence submitted pursuant to the Act within a specified time limit but the applicant fails to retrieve such items within the specified time limit, the Specific Patent Agency may dispose of these items at its discretion.", "88": "For any application filed pursuant to the Act and these Enforcement Rules, the form, description, claim(s), abstract and drawing(s) thereof shall conform to the designated written format after the implementation of this amended Act.\nUnder any of the following circumstances, the description, drawing(s), and description of drawing(s), other than the request form, shall conform to the designated written format prior to the implementation of this amended Act:\n1.a patent application for invention or utility model filed within three (3) months after implementation of this amended Act;\n2.for an application filed in a foreign language prior to implementation of this amended Act, the description, claim(s), drawing(s) or description of drawing(s) submitted within six (6) months after implementation of this amended Act; or\n3.for an application filed prior to implementation of this amended Act or pursuant to Subparagraph 1, when applying for an amendment or a post-grant amendment after implementation of this amended Act, the amended description, claim(s), drawing(s) or description of drawing(s).", "89": "For a patent application for design filed pursuant to Paragraph 2, Article 121 or Paragraph 2, Article 129 of the Act, if the priority date thereof predates the implementation date of the amended Act, the implementation date of the amended Act shall be regarded as the priority date.", "89-1": "The patent files such as application documents, description, claim(s), abstract, drawing(s), and illustration(s) deemed worth preserving by the Specific Patent Agency as set forth in Paragraph 1, Article 143 of the Act shall refer to these of the following patent cases：\n1.the invention patent is requested for compulsory licensing.\n2.the patents filed by an ROC national who is a Nobel laureate.\n3.the patent has been awarded the National Invention and Creation Award.\n4.the patent is filed for an invalidation action and the decision thereof is filed for administrative remedy actions.\n5.the patent is filed for an opposition and the decision thereof is filed for administrative remedy actions.\n6.the other patents are deemed by Specific Patent Agency to facilitate technological development of historical significance, economic value, or to have been involved in a major patent litigation case.", "90": "These Enforcement Rules shall enter into force on January 1, 2013.\nThe amendment of these Enforcement Rules shall enter into force on the date of promulgation, except the amendment promulgated on April 19, 2017, which entered into force on May 1, 2017, the amendment promulgated on September 27, 2019, which entered into force on November 1, 2019, and the amendment promulgated on March 24, 2023, which entered into force on May 1, 2023."};
// ── Japanese static lookup ──────────────────────────────────
function getJAData() {
  switch(currentLaw) {
    case 'act':   return JA;
    case 'rules': return JA_RULES;
    case 'trips': return JA_TRIPS;
    case 'ip_adj': return JA_IP_ADJ;
    default: return null;
  }
}


function renderJA(text, isMT) {
  const el = document.getElementById('text-ja');
  if (!el) return;
  if (isMT) {
    el.innerHTML = '<div class="mt-notice">⚠ 機械翻訳（非公式） · Machine-translated, not official</div><div>' + escHtml(text).replace(/\n/g, '<br>') + '</div>';
  } else {
    el.textContent = text;

利及所負擔之義務不及於伯恩公約第六條之二之規定所\n賦予或衍生之權利。\n2. 著作權之保護範圍僅及於表達，不及於觀念、程序、操作方法或數理概念\n等。", "10": "電腦程式及資料之編輯\n1. 電腦程式，不論係原始碼或目的碼，均應以伯恩公約（1971）所規定之文學\n著作保護之。\n2. 資料或其他素材之編輯，不論係藉由機器認讀或其他形式，如其內容之選\n擇或編排構成智慧之創作者，即應受會員至少在電腦程式及電影著作方\n面，應賦予著作人及其權利繼受人有授權或禁止將其著作原件或重製物對\n公眾商業性出租之權利。但在電影著作方面，除非此項出租已導致該項著\n作廣遭重製，實質損害著作人及其權利繼受人在該會員國內之專有重製權\n外，會員得不受前揭義務之限制。就電腦程式而言，如電腦程式本身並非\n出租之主要標的者，則會員對該項出租，不須賦予出租權。保護。但該保\n護不及於資料或素材本身，且對該資料或素材本身之著作權不生影響。", "11": "出租權\n會員至少在電腦程式及電影著作方面，應賦予著作人及其權利繼受人有授權\n或禁止將其著作原件或重製物對公眾商業性出租之權利。但在電影著作方面，除\n非此項出租已導致該項著作廣遭重製，實質損害著作人及其權利繼受人在該會員\n國內之專有重製權外，會員得不受前揭義務之限制。就電腦程式而言，如電腦程\n式本身並非出租之主要標的者，則會員對該項出租，不須賦予出租權。", "12": "保護期間\n著作之保護期間， 除攝影著作或應用美術著作以外，在不以自然人之生存期\n間為計算標準之情況下， 應自授權公開發表之日曆年末日起算至少五十年，如著\n作完成後五十年內未授權公開發表者，應自創作完成之日曆年末日起算五十年。", "13": "限制及例外\n會員就專屬權所為限制或例外之規定， 應以不違反著作之正常利用，且不至\n於不合理損害著作權人之合法權益之特定特殊情形為限。", "14": "對表演人、錄音物製作人及廣播機構之保護\n1. 關於附著於錄音物上之表演，表演人應可防止下列未經授權之行為：將其\n未附著於媒介物之表演予以附著及重製此一附著物。表演人亦應可防止下\n列未經其授權之行為：以無線電方式播送其現場表演及向公眾傳達該表演。\n2. 錄音物製作人享有授權或禁止將其錄音物直接或間接重製之權利。\n3. 廣播機構應有權利禁止下列未經其授權之行為：將廣播加以附著、將廣播\n附著物加以重製， 將廣播以無線電再公開播送，及將播出之電視廣播向公\n眾傳達。會員未賦予廣播機構前揭權利者，應依伯恩公約（1971）之規定，\n賦予所廣播之著作之著作權人得防止上述行為之可能性。\n4. 第十一條關於電腦程式之規定， 對於依會員之國內法所規定之錄音物製作\n人或該錄音物之其他權利人，準用之。但會員於一九九四年四月十五日，\n對錄音物權利人就錄音物之出租已實施合理之報酬制度，且該錄音物之商\n業性出租不至於對權利人之專有重製權構成實質損害者，得維持該制度。\n5. 本協定對表演人及錄音物製作人之保護期限為：自附著完成或演出之日曆\n年末日起算至少五十年。依第三項所給予之保護期限，為自播送之日曆年\n末日起算至少二十年。\n6. 任何會員，對於第一項至第三項規定之權利，於羅馬公約允許之範圍內，\n得訂定權利之條件、限制、例外規定及保留條款。但伯恩公約（1971）第十\n八條規定，對於表演人及錄音物製作人之權利，準用之。", "15": "保護客體\n1. 任何足以區別不同事業之商品或服務之任何標識或任何標識之組合，應足\n以構成商標。此類標識，特別是包含個人姓名之文字、字母、數字、圖形\n和顏色組合，及此類標識之聯合式，應得註冊為商標。當標識本身不足以\n區別相關之商品或服務時，會員得基於因使用所生之識別性而准其註冊。\n會員得規定，以視覺上可感知者作為註冊之要件。\n2. 前項規定，並不限制會員以其他理由核駁商標註冊之申請。但以該等理由\n不違反巴黎公約(1967)相關條文為限。\n3. 會員得以使用作為商標註冊要件。但商標之實際使用不得作為提出申請註\n冊之要件，亦不得僅因其意圖之使用未於申請提出後三年內實施而駁回其\n申請。\n4. 商標所指定使用之商品或服務之性質，不得構成不准商標註冊之事由。\n5. 會員應於註冊前或註冊後立即公告每件註冊之商標，並應提供申請撤銷該\n註冊之合理機會。會員亦得提供對商標註冊提出異議之機會。", "16": "所授予之權利\n1. 註冊商標權人應享有排他專屬權，以阻止他人未獲其同意，於交易過程中\n使用相同或近似之標識於同一或類似之商品或服務，而有致混淆之虞。凡\n使用相同標識於相同商品或服務者，推定有混淆之虞。上述權利不得侵害\n任何既存之權利，亦不得影響會員基於使用而賦予權利之可能性。\n2. 巴黎公約（1967）第六條之二之規定準用於服務。決定某一商標是否為著名\n商標，會員應考慮該商標在相關公眾之知名度，包括因商標之宣傳而在該\n會員所取得之知名度。\n3. 有關不類似於他人註冊商標所指定使用之商品或服務，準用巴黎公約（1967）\n第六條之二之規定於不類似於他人註冊商標所指定使用之商品或服務準用\n之。但以該商標於該等商品或服務之使用，有致相關公眾將該等商品或服\n務與註冊商標權人產生聯想，且註冊商標權人之利益有因該使用而受損害\n之虞者為限。", "17": "例外\n會員得對商標權做有限度的例外規定，例如說明性用語的合理使用；惟須考\n慮商標權人及第三人之合法權益。", "18": "保護期間\n商標首次註冊及每次延展註冊之期間，均不得少於七年。商標之註冊應可無\n限次延展。", "19": "使用規定\n1. 若以使用為維持註冊之要件，須商標權人無正當事由至少繼續三年以上未\n使用，始得廢止其註冊。但商標權人證明未使用係基於正當事由者，不在\n此限。商標未使用非出於商標權人之意願者，例如對該商標指定使用商品\n或服務之進口限制或其他之政府規定，應視為未使用之正當事由。\n2. 如他人使用商標係在商標權人監督之下，則該使用應視為維持商標註冊之\n使用。", "20": "其他規定\n於交易過程中，不得對商標之使用為特殊要求而造成不合理之妨礙，例如須\n與其他商標一起使用、須以特別的形式使用，或使用方式有害於識別商品或服務\n之能力。此規定並不禁止要求將用以表彰生產事業之商標與用於區別該事業指定\n使用於特定商品或服務之商標一起使用，但不得要求將此二者聯結使用。", "21": "授權與移轉\n會員得規定商標授權與移轉之要件。惟不得為商標強制授權之規定。無論所\n屬營業是否一併移轉，註冊商標權人應有移轉其註冊商標之權利。", "22": "地理標示之保護\n1. 本協定所稱之地理標示，係指為辨別一商品係產自一會員之領域，或其領\n域內之某一地區或地點之標示，而該商品之特定品質、聲譽或其他特性，\n主要係歸因於其地理來源者。\n2. 會員應提供地理標示之利害關係人法律途徑以防止：\n(a)於標示或展示商品時，使用任何方式明示或暗示系爭商品係產自非其實\n際產地之其他地理區域，而有致公眾誤認該商品之地理來源者；\n(b)構成巴黎公約（1967）第十條之二規定之不公平競爭之任何使用行為。\n3. 商標包含或由不實產地之地理標示所組成，若在該會員國內使用此地理標\n示於該商標指定使用之商品，本質上將致公眾誤認該商品之實際產地者，\n該會員應依法定職權或利害關係人之申請，不准此等商標之註冊或評定其\n註冊無效。\n4. 商品之地理標示，雖確係該商品原產地之領域、地區或地點，如向公眾不\n實表示該商品係產自其他領域者，仍有本條第一、第二及第三項之適用。", "23": "葡萄酒和烈酒地理標示之進一步保護\n1. 會員應提供利害關係人法律途徑，以防止將葡萄酒或烈酒之地理標示，使\n用在非產自該地理標示所表彰地區之葡萄酒或烈酒，即使其標示商品之真\n實產地，或者其係以翻譯之方式使用，或伴以「同類」、「同型」、「同風格」、\n「相仿」或其他類似的說明4。\n2. 葡萄酒或烈酒商標包含葡萄酒或烈酒之地理標示或由該地理標示所組成，\n而該葡萄酒或烈酒非產自其地理標示所表彰之地理來源者，會員應依法定\n職權或利害關係人之申請，不准該商標之註冊或評定其註冊為無效。\n3. 葡萄酒之地理標示若屬同名，且不違反第二十二條第四項之規定者，各標\n示均應保護之。各會員應在考量確保相關生產者獲得公平待遇及消費者不\n致被誤導的前提下，訂定區別同名地理標示之可行性規定。\n4. 為促進對葡萄酒地理標示之保護，與貿易有關之智慧財產權協定理事會應\n就有關建立葡萄酒地理標示之多邊通知及註冊制度進行談判，使適於保護\n之葡萄酒地理標示於參與該制度之會員間獲得保護。", "24": "國際談判：例外\n4 四十二條首句雖另有規定，會員仍得以行政措施執行此等義務。\n1. 會員同意依據第二十三條之規定，就加強對個別地理標示之保護進行談\n判。會員不得依據本條第四項至第八項之規定拒絕進行談判，或締結雙邊\n或多邊協定。就談判而言，於以個別地理標示之使用為談判主題時，會員\n應願意繼續考慮適用該等條款。\n2. 與貿易有關之智慧財產權協定理事會應隨時檢討本節規定之適用情形；首\n次檢討應於世界貿易組織協定生效後兩年內進行。任何影響遵守此等條款\n義務之事項，均可提交理事會討論；上開情事，理事會應依會員之請求，\n就透過相關會員間之雙邊或多邊諮商仍無法獲得合意解決方案之事項，與\n任一會員或數個會員間進行協商。理事會應採取各方同意之措施，以推動\n本節之適用，並促進本節目標之實現。\n3. 會員於執行本節規定時，不得減損世界貿易組織協定生效前已於該國存在\n之地理標示之保護。\n4. 本節之規定並未要求會員禁止其國民或居民，以類似之方式繼續使用另一\n會員之葡萄酒或烈酒地理標示，但以在該會員境內已連續使用此地理標示\n於相同或類似之商品或服務，並合於下列情事之一者為限：\n(a)在西元一九九四年四月十五日以前，已達十年以上者；或\n(b)於上開日期前係善意使用者。\n5. 商標之申請或註冊係屬善意，或商標權係因善意使用而取得，且該申請、\n註冊或因善意使用取得商標權係：\n(a)在該會員依第六篇規範適用此等規定之日期之前；或\n(b)在該地理標示於原產國受保護之前。\n依本節規定所採行之措施，不得因該商標相同或近似於該地理標示，而損\n及此商標註冊之資格或有效性，或商標使用之權利。\n6. 本節之規定並未要求會員對於其他會員地理標示之保護，及於其境內與該\n地理標示相同但係該地理標示相關商品或服務所習於使用之通用名稱。本\n節之規定並未要求會員對於任何其他會員有關葡萄酒商品之地理標示之保\n護，及於其境內與該地裡標示相同且於世界貿易組織協定生效日已存在之\n葡萄品種習用名稱。\n7. 會員得規定，依本節有關商標之使用或註冊提出之任何請求，必須於不當\n使用該受保護之標示於該會員境內已成為眾所周知後五年內為之，惟若該\n商標註冊日（若商標已於該日前公告）早於該會員境內不當使用已成為眾\n所周知之日，應於商標註冊日後五年內為之。但該地理標示之使用或註冊\n為惡意者，不適用之。\n8. 本節之規定不得損害任何人於交易過程中使用其姓名或其營業之被繼受人\n姓名之權利。但其使用姓名之方法足以致公眾誤認者，不在此限。\n9. 在原產國未獲得保護、已停止受到保護或於該國已不使用之地理標示，本\n協定並不課以保護之義務。", "25": "保護要件\n1. 會員應對獨創之工業設計具新穎性或原創性者，規定予以保護。會員得規\n定對於非顯著不同於習知設計或習知設計特徵之結合者， 為不具新穎性或\n原創性之設計。會員得規定，此種保護不及於主要基於技術或功能性之設\n計。\n2. 各會員應確保對紡織品設計之保護要件，特別是關於費用、審查或公告程\n序，不得不當損害尋求及取得此項保護之機會。會員得以工業設計法或著\n作權法履行本項義務。", "26": "保護\n1. 工業設計所有權人有權禁止第三人未經其同意， 基於商業目的而製造、販\n賣、進口附有複製該設計或實質複製該設計之物品。\n2. 會員於考量第三人合法利益下，得對工業設計保護為有限之例外規定。但\n以該例外規定並未不合理的牴觸受保護設計的正常利用，且並未不合理地\n損害受保護設計所有權人的合法利益。\n3. 權利保護期限至少應為十年。", "27": "可予專利之標的\n1. 在符合本條第二項及第三項規定之前提下，所有技術領域之發明應可取得\n專利，無論為物品或方法，惟需具備新穎性、進步性及可為產業上利用5。\n在符合第六十五條第四項、第七十條第八項，及本條第三項規定之前提下，\n專利之取得及專利權之享有，不得因發明地、技術領域、或產品是否為進\n口或在本地製造，而有歧視。\n2. 會員基於保護公共秩序或道德之必要，包括保護人類、動物、植物生命或\n健康或避免對環境的嚴重破壞，為禁止某些發明於其境內商業利用，得不\n給予專利。 但僅因該發明之使用為境內法所禁止者，不適用之。\n3. 會員亦得不予專利者：\n(a)對人類或動物疾病之診斷、治療及手術方法；\n(b)除微生物以外之植物與動物，及除「非生物」及微生物學方法以外之動\n物、植物的主要生物學育成方法。 會員應以專利法、或有效之單獨立法\n或前二者組合之方式給予植物品種保護。本款於世界貿易組織協定生效\n四年後予以檢討。", "28": "所授予之權利\n5 本條所稱「進步性」及「可為產業上利用」等名詞，可分別視為各會員所採之「非顯而易知」及\n「實用性」之同義字。\n1. 專利權人享有下列排他專屬權：\n(a)物品專利權人得禁止第三人未經其同意而製造、使用、為販賣之要約、\n販賣或為上述目的而進口6其專利物品。\n(b)方法專利權人得禁止第三人未經其同意而使用其方法，並得禁止使用、\n為販賣之要約、販賣或為上述目的而進口其方法直接製成之物品。\n2. 專利權人有權讓與或以繼承方式移轉其專利權，及訂立授權契約。", "29": "專利申請人之條件\n1. 會員應規定專利申請人須以所屬技術領域中具有通常知識者可據以實施之\n方式明確且充分的揭露其發明。會員並得要求申請人指出發明人在申請日\n或主張優先權者在優先權日已知悉實施其發明之最佳方式。\n2. 會員得要求專利申請人提供就同一發明在外國提出申請及獲得專利之資\n料。", "30": "授予權利之例外\n會員於考量第三人合法利益下，得對所授予專利權為例外規定，但該例外規定並\n未不合理抵觸專利權之正常使用，且未不合理損害專利所有權人之合法權益。", "31": "未經權利持有人授權之其他使用\n會員之法律允許不經專利權人之授權而為其他使用7時，包括政府使用或政府授權\n第三人實施，應遵守下列規定：\n6 此項權利與本協定所定關於產品之使用、販賣、進口或其他散佈之其他權利相同，均有第六條之\n適用。\n7 所謂其他使用，指其他非第三十條所允許之使用。\n(a)此類使用必須基於個案考量；\n(b)此類使用僅在使用前，意圖使用之人已經努力向權利持有人要求依合理\n之商業條款及條件獲得許可，但在合理期限內未獲成功，方可允許。如\n會員處於國家緊急情況或其他極為緊急情況，或基於非營利之公共使\n用，則可捨棄前述之要件。但在國家緊急情況或其他極為緊急情況下，\n應合理可行地儘快通知權利持有人，對基於非營利之公共使用，如政府\n或政府授權之合約人，未經專利檢索而知或有明顯理由應知政府將使用\n或將為政府而使用某有效專利，則應立即通知權利持有人。\n(c)此類使用之範圍及期間應限於所許可之目的；如為半導體技術應僅以非\n營利之公共使用，或作為經司法或行政程序認定為反競爭行為之救濟為\n限；\n(d)此類使用無專屬性；\n(e)此類使用不得讓與。但與此類使用有關之企業或商譽一併移轉者，不在\n此限。\n(f)此類使用應主要為供應該授權會員國內市場之需要；\n(g)在適當保護被授權使用人之合法利益前題下，一旦導致授權的情況不復\n存在，且很難再發生，則有義務予以終止授權。主管機關應有權主動要求\n審查該情況是否繼續存在。\n(h)在考慮有關授權之經濟價值下，應針對個別情況給付相當補償金予權利\n持有人。\n(i)此類使用處分之法律有效性，應由會員之司法機關審查，或由一個不同且\n屬上級之機關為獨立之審查。\n(j)任何與補償金相關之處分，均應由會員之司法機關審查，或由一個不同且\n屬上級之機關為獨立之審查。\n(k)會員依據司法或行政程序認定行為具有反競爭性，而以此類使用作為救\n濟時，得不受(b)項與(f)項之拘束。此種案件，在決定補償金額度時得考量\n改正反競爭行為之需要。如導致此類授權的情況可能再發生，主管機關應\n有權拒絕終止該授權。\n(l)某一專利（第二專利）必須侵害另一專利（第一專利），始得實施時，得\n允許此類使用。但必須符合下列要件：\n(i)第二專利之發明，相對於第一專利權申請專利範圍，應具相當的經濟上\n意義之重要技術改良；\n(ii)第一專利所有權人應有權在合理條件下以交互授權之方式，使用第二\n專利權。\n(iii)就第一專利權之使用授權，除與第二專利權一併移轉外，不得移轉。", "32": "撤銷或失權\n對專利撤銷或失權之任何決定，應給予司法審查之機會。", "33": "保護期間\n可享有之保護期間應自提交申請日起，至少二十年8。", "34": "方法專利：舉證責任\n1. 在系爭標的為第二十八條第一項(b)款專利權之民事侵權訴訟中，若該專利\n為方法專利時，司法機關應有權要求被告舉證其係以不同製法取得與系爭\n方法專利所製相同之物品。會員應規定，在有下列情事之一時，其未獲專\n利人同意所製造之物 品，在無反證時，視為係以該方法專利製造：\n(a)如以該方法專利所製成的產品為新的，\n8 對會員未採行原始核准制度者，得採該有原始核准制度國家之提交申請日起算其保護期間。\n(b)如被告物品有相當的可能係以該方法專利製成，且原告已盡合理努力而\n仍無法證明被告確實使用之方法。\n2. 會員得規定，僅在符合(a)款條件或僅在符合(b)款條件下，被指為侵權人之\n一方，始應負擔第一項所示之舉證責任。\n3. 在提出反證之過程，有關被告之製造及營業秘密之合法權益應列入考量。", "35": "有關積體電路智慧財產權條約\n會員同意依照積體電路智慧財產權條約之第二條至第七條（不包括第六條第\n三項）、第十二條及第十六條第三項保護積體電路電路布局（拓樸圖），並遵守下\n列規定。", "36": "保護範圍\n在受第三十七條第一項規定拘束之前提下， 會員應視未經權利持有人9授權之\n下列行為為違法：進口、販賣、或其他基於商業目的而散布受保護之電路布局、\n含有受保護電路布局之積體電路、或含有此種積體電路之物品繼續含有不法複製\n之電路布局者。", "37": "不需權利持有人授權之行為\n1. 縱有第三十六條之規定， 對含有不法複製之電路布局之積體電路，或其內\n積體電路含有不法複製電路布局之物品， 如行為人於取得該積體電路或含\n有該積體電路之物品時並不知且無適當理由可得而知有包含不法複製電路\n9 本節所稱「權利持有人」（right holder）與IPIC條約之「權利持有人」（holder of the right）意義\n相同。\n布局情事者， 會員不得視其行為為違法。會員應規定該行為人於被充分告\n知電路布局係不法複製後， 仍可處理其擁有之存貨及被告知前之訂單， 惟\n必須支付權利持有人相當於在自由協議該電路布局授權之情形下所應支付\n之合理權利金。\n2. 第三十一條第(a)至(k)款之規定，準用非自願授權實施之電路布局；或自政\n府使用或未經權利持有人授權之政府使用者。", "38": "保護期間\n1. 會員以註冊為權利保護要件時， 電路布局保護期間，自註冊申請日或於世\n界任何地方首次商業利用之日起，至少十年。\n2. 當會員不以註冊為保護要件時， 電路布局保護期間應自世界任何地方首次\n商業利用之日起，至少十年。\n3. 縱有前二項情事， 會員得規定權利保護期間為該電路布局創作後十五年。", "39": "1. 為依巴黎公約（1967）第十條之二，提供有效保護以防止不公平競爭，會員\n應就符合下列第二項所規定之未公開資訊，及依第三項規定所提交政府或\n政府相關機構之資料，予以保護。\n2. 自然人及法人對合法處於其控制下之資訊應有可能防止他人未經同意而以\n違背誠實商業行為的方式10，揭露、取得或使用，但該資料須：\n(a)具有秘密性質，且不論由就其整體或細節之配置及成分之組合視之，該\n項資料目前仍不為一般處理同類資訊之人所得知悉或取得者；\n10 本條所稱「有違商業誠信方法」，至少包含下列行為：違約、背信及誘引違約或背信，亦包括使\n第三人得到未公開之資訊而該第三人知悉或因重大過失而不知其行為在於取得該資訊。\n(b)因其秘密性而具有商業價值；且\n(c)合法控制該資訊之人已依情況採取合理步驟， 以保持其祕密性。\n3. 會員為核准新化學原料之醫藥品或農藥品上市，而要求提供業經相當努力\n完成且尚未公布之測試或其他相關資料，應防止該項資料被不公平的使用\n於商業之上。此外，除基於保護公眾之必要，或已採取措施以確實防止該\n項資料被不公平商業使用外，會員應保護該項資料以防止洩露。", "40": "1. 會員同意，有些限制競爭之智慧財產權授權行為或條件，可能對貿易產生\n負面影響，或阻礙技術之移轉及交流。\n2. 本協定並未限制會員得於立法時，明定某些授權行為或條件，因對相關市\n場之競爭產生負面影響，而構成智慧財產權的濫用。依照上開規定，任何\n會員得在其國內相關之法律與規章中，採行與本協定其他條款不相牴觸之\n適當方法，以防止或管制此等授權行為，例如：專屬之回饋授權、禁止對\n有效性異議及強制包裹授權等。\n3. 任一被請求諮商之會員，在其他會員有理由相信屬於被請求諮商會員擁有\n智慧財產權之國民或設有住所之人，就本節所規定之事項，從事違反請求\n諮商會員法律規章之行為，而該請求諮商之會員意欲確保其法規被遵守者，\n應於受請求時與之進行諮商；但此並不影響在任何一方會員法律下所採取\n之行動及其為最終決定之充分自主權。受請求之會員應對是項諮商予以充\n分而認真之考慮，並應提供適當之機會；其並應透過提供與系爭事項有關\n之可公開獲得之非機密資料及其可獲得之其他資料相互合作，但須受國內\n法律及請求之會員就防護資料之機密性與受請求之會員達成相互滿意之協\n議等條件之拘束。」\n4. 會員於其國民或設有住所之人如因本節規範事項，被認為違反其它一會員\n其法律或規定時，基於要求，在本條第三項規定之相同條件下，應有被其\n他會員賦予並無損於任何一方會員依其法律所為之行為及完全自由之最終\n決定為諮商之機會。", "41": "1. 會員應確保本篇所定之執行程序於其國內法律有所規定，以便對本協定所\n定之侵害智慧財產權行為，採行有效之行動，包括迅速救濟措施以防止侵\n害行為及對進一步之侵害行為產生遏阻之救濟措施。前述程序執行應避免\n對合法貿易造成障礙，並應提供防護措施以防止其濫用。\n2. 有關智慧財產權之執行程序應公平且合理。其程序不應無謂的繁瑣或過於\n耗費，或予以不合理之時限或任意的遲延。\n3. 就案件實體內容所作之決定應儘可能以書面為之， 並載明理由，而且至少\n應使涉案當事人均能迅速取得該書面；前揭決定，僅能依據已予當事人答\n辯機會之證據為之。\n4. 當事人應有權請求司法機關就其案件之最終行政決定為審理，並且依據會\n員之司法規定，至少對重要法律問題之初審司法判決予以審理。但會員並\n無義務就已宣判無罪之刑事案件提供再審之機會。\n5. 會員瞭解，本篇所規定之執行，並不強制要求會員於其現有之司法執行系\n統之外，另行建立一套有關智慧財產權之執行程序；亦不影響會員執行其\n一般國內法律之能力。本篇對會員而言， 並不構成執行智慧財產權與執行\n其他國內法之人力及資源分配之義務。", "42": "公平及衡平之程序\n會員應賦予權利持有人11行使本協定所涵蓋之智慧財產權之民事訴訟程序之\n權利。被告有被及時以書面詳細告知其被告之理由及其他相關細節之權利。 雙方\n當事人均得委任獨立之律師代理訴訟， 且訴訟程序於當事人必須親自到庭之相關\n規定上，不得使當事人增加額外之負擔。 訴訟當事人均應有權提出證據及陳述理\n由；訴訟程序於不違反憲法規定之原則下，應提供認定與保護秘密資訊之措施。", "43": "證據\n1. 當一造已提供足以支持其權利主張並能合理取得之證據， 且指明相關重要\n證據為對造所控制時，司法機關應有權責令對造提出該證據，但須在適當\n情形條件下確保對秘密資訊給予保護。\n2. 當事人一造在合理時間內自願且無正當理由而拒絕接受或未於合理期間提\n供必要資訊， 或明顯的阻礙相關執行程序， 會員得授權司法機關依據已\n被提出之資訊，包括因他方拒絕提供資訊而受不利影響之當事人所提出之\n指控及主張為肯定或否定之初步或最終判決。但應給予當事人就主張或證\n據辯論之機會。", "44": "禁制令\n1. 司法機關應有權命當事人停止侵害，特別係在於涉有侵害智慧財產權之進\n口物品，於結關後立即阻止其進入司法管轄區域內之商業管道。會員並無\n義務使前述司法禁制令適用於非因明知或可得而知之情況下，致侵害他人\n智慧財產權之情形。\n2. 雖本篇其他部分有特別規定， 在合於第二篇特別就政府未經權利持有人授\n權使用或政府授權第三人使用之規定條件下，會員可將針對此類使用之救\n濟限於以依第三十一條(h)款所規定使用報酬之給付。 在其他情形，本篇所\n規定之救濟應有適用，若本篇之救濟與會員法律牴觸，會員仍應提供確認\n11 本篇之「權利持有人」，包括得主張該等權利之法律上適格之聯合會及協會。。\n判決及充分之賠償。", "45": "損害賠償\n1. 司法機關對於明知，或可得而知之情況下，侵害他人智慧財產權之行為人，\n應有權令其對權利持有人因其侵權行為所受之損害，給付相當之賠償。\n2. 司法機關亦應有權命令侵害人支付權利持有人相關費用，該費用得包括合\n理之律師費；而於適當之情況下，會員並得授權其司法機關，命侵害人賠\n償權利人因其侵害行為所失之利益以及（或）法定賠償額， 縱使侵害人於\n行為當時，不知或無可得知其行為係屬侵害他人權利時亦同。", "46": "其他救濟\n為有效遏阻侵害情事，司法機關對於經其認定為侵害智慧財產權之物品，在\n無任何形式之補償下，應有權命於商業管道外處分之。以避免對權利持有人造成\n任何損害之方式，或在不違反其現行憲法之規定下，予以銷毀，司法機關對於主\n要用於製造侵害物品之原料與器具，亦應有權在無任何形式之補償下，以將再為\n侵害之危險減至最低之方式，命於商業管道外處分之。在斟酌前述請求時，侵害\n行為之嚴重性，所命之救濟方式及第三人利益間之比例原則應納入考量，關於商\n標仿冒品，除有特殊情形外，單純除去物品上之違法商標並不足以允許該物品進\n入於商業管道。", "47": "告知權\n會員得規定司法機關命侵害人告知權利持有人涉及製造及散布侵害物之其他\n第三人，以及散布侵害物之管道。但侵害情節輕微者，不在此限。", "48": "對被告之賠償\n1. 對於濫用保護執行程序，並要求採取措施，致造成他方當事人之行為受到\n限制或禁制者，司法機關應有權命前者賠償後者所受到之損害；司法機關\n亦應命其給付被告所支出之費用，該費用並得包括適當的律師費。\n2. 關於涉及智慧財產權保護或執行之任何法律施行，會員僅得於主管機關及\n公務員基於善意而採行或意圖採行適切救濟措施時，始得免除其法律責任。", "49": "行政程序\n以行政程序對個案給予民事救濟措施時，該行政程序應符合本節所定之各項\n原則。", "50": "1. 司法機關應有權採取迅速有效之暫時性措施以：\n(a)防止侵害智慧財產權之情事發生，特別是防止侵害物進入管轄區域內之\n商業管道包括業經海關通關放行之進口物品在內。\n(b)保全經主張為與侵害行為相關之證據。\n2. 司法機關應有權於僅有一造陳述意見之情況下， 特別是在任何延宕有可能\n對權利人造成無可彌補之傷害， 或顯見證據可能被銷燬之情形下，依其情\n形之適當與否，採取暫時性之措施。\n3. 司法機關應有權要求聲請人提出其可獲得之合理有效之證據，俾可適度地\n證明其係權利人，而且其權利正遭受侵害或有受侵害之虞，並且得命令聲\n請人提供足夠或相當之擔保，以保護被告及防止聲請人濫用權利。\n4. 如係依一造之陳述而採行暫時性措施，最遲應於措施執行後立即通知受該\n措施影響之當事人。會員應基於被告之請求，對其措施予以包括言詞審理\n之審查，以便在措施通知後之合理期間內，決定此等措施是否應予修正、\n撤銷或維持。\n5. 執行暫時性措施之機關得要求該暫時措施之聲請人提出其他必要資訊，以\n確定涉案物品。\n6. 於不影響第四項規定之前提下，依第一項及第二項實施之暫時措施，如未\n於原作成暫時性措施之司法機關，在該會員法律允許情況下所指定之合理\n期限內訴請就實體部分進行審理，應依被告之請求而予以撤銷或停止效\n力。如無司法機關之此種對期限之決定，則應在未逾二十個工作日或三十\n一個曆日之內提起，但以較長者為準。\n7. 如暫時性措施遭到撤銷，或因聲請人之任何行為或疏忽而失效，或於事後\n發現並無智慧財產權受侵害之虞之情事，司法機關應依被告之請求，命聲\n請人賠償被告因暫時性措施所受之損害。\n8. 暫時性措施可由行政機關以行政程序為之者，該程序應符合本節之原則。", "51": "海關之暫不放行措施\n會員應依照下述規定，訂定程序13，俾使有正當理由懷疑進口物品有仿冒商標\n或侵害著作權之權利人14，得以書面向主管之行政或司法機關提出申請，要求海關\n對此類物品暫不放行。會員得將此種申請程序適用於涉及智慧財產權其他行為之\n12 若一會員與另一會員屬同一關稅同盟之成員，並已相當程度的解除邊界物品移動之所有管制措\n施時，對該邊界無庸適用本節規定。\n13 對於由權利人自行或經其同意已在外國市場販售之物品進口，及轉運中之物品，無義務採取此\n項措施。\n14 為執行本協定之規定，(a)仿冒商標物品係指任何之物品（含包裝），附有與有效註冊使用於該類\n物品相同之商標，或與該註冊商標主要部分無法區別，而未經授權致依照進口國之法律對商標專\n用權人之權利造成侵害者；(b)侵害著作權貨品係指任何物品，於生產國未經權或其合法授權人\n同意而製造，且係直接或間接自某項物品製造，而其製造依進口國法律已構成侵害著作權或相關\n權利者。\n物品，但應符合本節之規定。會員亦可提供類似程序，由海關對於自其領域出口\n之侵權物品暫不予放行。", "52": "申請\n會員應要求權利持有人於依第五十一條規定提出申請時，需向主管機關提出\n足以推定在進口國法律之下有侵害權利持有人智慧財產權之表面証據，並就有關\n物品提供詳細說明，俾使海關易於辨認。主管機關應於合理期間內通知申請人是\n否已接受其申請，主管機關如對海關執行措施期間作成決定，並應將之通知申請\n人。", "53": "保證金或相當之擔保\n1. 主管機關應有權要求申請人提供足夠之保證金或相當之擔保， 以保護被告\n及主管機關，並防止其濫用權利。但該保證金或相當之擔保不得不合理阻\n礙對此等程序之行使。\n2. 依據本節規定提出申請而由海關暫不放行之貨品，其內容涉及工業設計、\n專利、電路布局及未公開之資訊，海關係基於非司法或其他非獨立機關所\n作之決定而暫不予放行，且依第五十五條規定之期間已屆滿而未獲得法律\n授權給予暫時救濟措施，並符合其他有關進口之規定者，貨主、進口商或\n收貨人應有權於繳交足夠之保證金，以保護權利持有人免於受侵害後，要\n求該批貨物予以放行。保證金之繳納不得損及權利持有人之其他救濟措\n施，權利持有人未於合理期間內行使訴訟時，保證金應發還。", "54": "暫不放行通知\n依第五十一條對貨品暫不予放行者，應立即通知進口商及申請人。", "55": "暫不放行之期限\n自申請人受暫不放行通知送達後十個工作日內，海關未被告知該案已由被告\n以外之一方已就該案之實體部分提起訴訟，或該案業經法律授權機關採取臨時措\n施予以延長留置期間，如該項物品已符合其他進口或出口之規定者，海關應予放\n行；在適當情況下，前述期間可再予延長十個工作日。該案之實體部分已提起訴\n訟者，在合理期間內，依據被告請求，應進行復審，包括給予被告陳述意見，以\n決定應否對該措施予以修改、廢止或確認。但暫不放行措施係依暫時性之司法措\n施執行或繼續執行時，應適用第五十條第六項之規定。", "56": "對進口商及物品所有人之賠償\n因錯誤扣押或扣押後依第五十五條規定放行，對進口商、收貨人及物品所有\n人造成損害者，相關機關應有權令申請人給付適當之賠償。", "57": "檢視權利及通知\n會員應授權主管機關，於不損及保護機密資料之情況下，給予權利持有人充\n分之機會，對海關所查扣之物品進行檢視，俾證實其指控。主管機關亦應有權給\n予進口商同等檢視物品之機會。倘就案件實體部分已作成肯定之裁決時，會員得\n授權主管機關，將發貨人、進口商及收貨人之姓名及地址，以及有關物品之數量\n通知權利持有人。", "58": "依職權之行為\n倘會員要求其主管機關主動採取措施，並要求其對於表面證據提示有侵害智\n慧財產權之貨品暫不放行者：\n(a)主管機關得隨時要求權利持有人提供資料，以協助其行使職權。\n(b)採取暫不放行措施時，應立即通知進口商及權利持有人。進口商就該項\n暫不放行措施向主管機關提出申覆時，應準用第五十五條之規定。\n(c)會員應僅於主管機關及公務員基於善意採行或意圖採行適當救濟措施\n時，始得免除其法律責任。", "59": "救濟措施\n在不損及權利持有人採取其他訴訟之權利，以及被告尋求司法機關審查之權\n利之前提下，主管機關有權命依照第四十六條所揭櫫之原則銷燬或處置侵害智慧\n財產權之物品。對於仿冒商標物品，主管機關除特殊情況外，不得允許該侵權物\n品未作改變狀態下，或適用不同之海關程序再出口。", "60": "微量進口\n會員對於旅客個人行李或小包寄送無商業性質之少量物品， 得免除上述條款\n之適用。", "61": "會員至少應對具有商業規模而故意仿冒商標或侵害著作權之案件，訂定刑事\n程序及罰則。救濟措施應包括足可產生嚇阻作用之徒刑及（或）罰金，並應和同\n等程度之其他刑事案件之量刑一致。必要時，救濟措施亦應包括對侵權物品以及\n主要用於侵害行為之材料及器具予以扣押、沒收或銷燬。會員亦得對其他侵害智\n慧財產權之案件，特別是故意違法並具商業規模者，訂定刑事程序及罰則。", "62": "1. 會員得規定應遵守合理之程序及手續，作為依本協定第二篇第二節至第六\n節規定取得及維持智慧財產權之條件。而此程序及手續應符合本協定之規\n定。\n2. 智慧財產權之取得需經由核准或登記者，會員應確保，於符合權利取得之\n實質條件下，應使權利之核准或登記程序在合理期間內完成，以避免保護\n期間遭不當之縮減。\n3. 服務標章應準用巴黎公約（1967）第四條之規定。\n4. 會員法律已訂有智慧財產權取得或維持之程序，行政撤銷，以及兩造間之\n程序，例如異議、撤銷或註銷者，應適用第四十一條第二項及第三項一般\n原則之規定。\n5. 第四項所定任何程序之最終行政決定應受司法或準司法機關之審查。但就\n異議或行政撤銷不成立，並無義務提供審查之機會，惟提起該等異議或行\n政撤銷程序所根據之理由得受（行政）無效程序之處理。", "63": "透明化\n1. 各會員所訂有效之法律、規則、最終司法判決及一般適用之行政決定等，\n凡與本協定實體內容相關者（智慧財產權之有效性、範圍、取得、執行及\n防止濫用）， 均應以其官方語言公告，但公告於實際上不可行時，應使其\n內容可以公開取得，以使各國政府及權利持有人對之熟悉。 任一會員與其\n他會員之政府或政府機構間所訂立與本協定實體內容有關之有效協定，亦\n應公告。\n2. 各會員均應將第一項有關之法律、規則通知與貿易有關之智慧財產權理事\n會，俾以協助使該理事會審查本協定之執行。如理事會在與世界智慧財產\n權組織就成立各項法律、規則之一般登記方式諮商成功時，應儘可能減輕\n會員履行上述義務之負擔，並得決定免除會員將有關法律、規則直接通知\n理事會之義務。理事會亦應考量本協定所為之各項通知義務係源自於巴黎\n公約（1967）第六條之三規定任何措施的關連性。\n3. 各會員均應準備因其他會員書面之要求，提供第一項所列之各項資料。一\n會員如有理由相信智慧財產權之某一特定司法判決或行政決定或雙邊協定\n等影響其在本協定之權益時，得以書面要求取得或被通知特定司法判決或\n行政決定或雙邊協定之詳細內容。\n4. 前三項規定並不要求會員揭露足以阻礙法律執行、違反公共利益或損害特\n定公有或私人企業合法商業利益之機密資料。", "64": "爭端解決\n1. 爭端解決瞭解書所解釋及適用之 GATT 1994 第二十二條及第二十三條，應\n適用於本協定之爭端諮商與解決。但本協定另有規定者，不在此限。\n2. GATT 1994 第二十三條第一項(b)款與(c)款，於 WTO 協定生效後五年內不適\n用之。\n3. 第二項期間內，與貿易有關之智慧財產權理事會應依本協定審理有關\nGATT 1994 第二十三條第一項(b)款與(c)款之控訴範圍暨型態，並將其建議\n送交部長級會議通過。無論通過該建議或延長第二項期間，部長級會議應\n以共識決作決定；且通過之建議，其效力應及於全體會員，不待其為進一\n步正式接受之程序。", "65": "過渡性安排\n1. 在受第二項、第三項、第四項拘束之前提下，會員自 WTO 協定生效後一年\n內並無義務適用本協定之規定。\n2. 任一開發中國家會員，對本協定之適用，除第一篇第三條、第四條及第五\n條規定外，得將前項期間另行延緩四年執行。\n3. 任一會員正處於由中央管制經濟轉型為自由企業經濟之過程中，且正進行\n重建智慧財產權體制結構，如在準備與執行智慧財產權法規過程中面臨特\n殊問題時，亦得享有前項之延緩期限。\n4. 屬開發中國家之會員，如依第二項規定，應於適用本協定之日，遵守本協\n定將其產品專利保護擴張至該國未予保護之科技領域時，該會員得就本協\n定第二篇第五節之科技領域再行延緩五年實施。\n5. 任一會員適用前四項過渡期間者，應確保其於該期間內對其國內法律、規\n則與執行內容有所修正時，不會導致與本協定規定之符合程度降低。", "66": "低度開發國家會員\n1. 鑑於低度開發國家會員之特殊需求，及其經濟、財政、行政之限制，與建\n立一可行之科技基礎所需之彈性，此等會員，除第三條至第五條規定外，\n自本協定第六十五條第一項所定之日起十年內，不得被要求實施本協定。\n與貿易有關之智慧財產權理事會得基於低度開發國家會員之請求延長該期\n限。\n2. 已開發國家會員應提供其國內企業及機構誘因，推廣並鼓勵將技術移轉至\n低度開發國家會員，使其能建立一穩定可行之科技基礎。", "67": "技術合作\n為有助於本協定之實施，已開發會員應基於請求及雙方同意之條款與條件，\n提供有利於開發中國家及低度開發國家會員技術上及財務上之合作。上述合作應\n包括智慧財產權保護與執行之國內立法準備工作及權利濫用的防制等協助，及對\n國內官方及代理機構之設立與強化之支助，包括人員之訓練。", "68": "與貿易有關之智慧財產權理事會\nTRIPS理事會應監督本協定之實行，尤其是監督會員是否遵行其義務，其並應\n提供會員就 TRIPS 事務之諮商之機會。該理事會亦應完成會員指定之責任，尤其\n應提供會員依爭端解決程序所請求之協助。理事會為執行其職責得參考並蒐集其\n認為適當之資料。為與世界智慧財產權組織進行諮商，理事會應於第一次會議舉\n行後一年內尋求建立與該組織合作的適當安排。", "69": "國際合作\n所有會員同意相互合作以消弭侵害智慧財產權物品之國際貿易。 為此，會員\n應建立並通知其行政體系內之連繫單位，並就違法物品之貿易交換資料。各會員\n尤應對仿冒商標及侵害著作權之物品之交易促進各國海關當局之資訊交換及相互\n合作。", "70": "現存標的之保護\n1. 本協定對於會員適用本協定前之行為不具約束力。\n2. 除本協定另有規定外，本協定對於會員適用本協定之日已存在且已受會員\n保護或日後符合保護要件之標的，亦適用之。本項及第三項、第四項關於\n現存著作之著作權保護應完全依據伯恩公約（1971）第十八條規定決定之；\n關於錄音物製作人及表演人之權利應完全依本協定第十四條第六項規定適\n用伯恩公約（1971）第十八條規定決定之。\n3. 本協定適用之日業已成為公共所有之物，會員無義務恢復其保護。\n4. 與含有受保護之特定產品有關之各種行為，違反符合本協定之國內法規，\n且係在該會員未接受 WTO 協定前業已開始或已大量投資者，任一會員對權\n利人之救濟方式得予以限制，俾使前述行為於該會員適用 WTO 協定後得繼\n續為之。但會員至少應規定權利人得獲得合理之補償金。\n5. 任何人於會員適用本協定前購買之原件或重製物，會員無義務對之適用本\n協定第十一條及第十四條第四項。\n6. 倘政府之授權係於本協定公布生效日確知之前所為者，則就非由權利人授\n權使用之情形， 會員不應被要求適用第三十一條，或第二十七條第一項關\n於專利權就技術領域應無歧視授與之要件。\n7. 智慧財產權以註冊為取得保護之要件者，申請人所申請註冊之會員適用本\n協定時，該申請案仍未確定者，申請人得依本協定修改申請案以加強保護，\n但此項修正不得包括涵蓋新事項。\n8. WTO 協定生效時，會員尚未依第二十七條給予藥品及農藥品專利保護者，\n該會員應：\n(a)不問第四篇之規定，自世界貿易組織協定生效日起，提供可使該項發明\n申請專利之方式。\n(b)於本協定適用日起，使該等申請案適用本協定之專利要件基準，且該基\n準視同於申請案之申請日或優先權日即已存在。\n(c)對符合(b)款基準之申請案，自准予專利時起依本協定給予專利保護，且\n其所餘專利期間依第三十三條申請日起算\n9. 當一產品依 8（a）屬於某一會員之專利申請案，不論第 6 篇如何規定，該\n產品獲得該會員市場專屬權者，應給予 5 年排他市場專屬權或至核准或不\n准專利申請，二者間較短者為止。以上規定適用於 WTO 協定生效後已於另\n一會員申請專利並獲准該產品專利權，且亦在該另一會員獲得市場排他上\n市專屬權。", "71": "檢討與修正\n1. TRIPS 理事會應於六十五條第二項規定之過渡期間屆滿後對本協定之執行\n進行檢討。該理事會並應就其執行中所獲得之經驗於該期滿日後二年及其\n後每二年，予以檢討。該理事會亦得展開審理任何有關之最近發展，俾供\n本協定修改之依據。\n2. 修正內容僅於為調適達到其他多邊協定所採行之較高層次之智慧財產權保\n護目的，並為世界貿易組織所有會員所接受者，得由與貿易有關之智慧財\n產權理事會於共識決後提議由部長級會議依第十條第六項執行之。", "72": "保留\n本協定任一條文未獲其他會員同意，不得予以保留。", "73": "安全例外\n本協定內各條款不得被詮釋為：\n(a)要求任一會員提供其認為揭露後有違其基本安全利益之資料；或\n(b)就下列事項阻止任一會員採取任何其認為對其基本安全利益有必要之保\n護行為，例如：\n(i)關於核子分裂物質或其產物。\n(ii)關於武器彈藥戰爭用品之交易以及直接或間接提供軍事設施用途之用\n品或物資之交易。\n(iii)戰時或其他國際關係緊急情況之措施；或\n(c)阻止任何一會員遵循聯合國憲章之義務，所為維持世界和平及安全所採\n取之任何行為。"};
const EN_TRIPS = {"1": "Nature and Scope of Obligations\n1. Members shall give effect to the provisions of this Agreement. Members may, but shall not\nbe obliged to, implement in their law more extensive protection than is required by this Agreement,\nprovided that such protection does not contravene the provisions of this Agreement. Members shall\nbe free to determine the appropriate method of implementing the provisions of this Agreement within\ntheir own legal system and practice.\n2. For the purposes of this Agreement, the term \"intellectual property\" refers to all categories of\nintellectual property that are the subject of Sections 1 through 7 of Part II.\n3. Members shall accord the treatment provided for in this Agreement to the nationals of other\nMembers.1 In respect of the relevant intellectual property right, the nationals of other Members shall\nbe understood as those natural or legal persons that would meet the criteria for eligibility for protection\nprovided for in the Paris Convention (1967), the Berne Convention (1971), the Rome Convention and\nthe Treaty on Intellectual Property in Respect of Integrated Circuits, were all Members of the WTO\nmembers of those conventions.2 Any Member availing itself of the possibilities provided in paragraph 3\nof Article 5 or paragraph 2 of Article 6 of the Rome Convention shall make a notification as foreseen\nin those provisions to the Council for Trade-Related Aspects of Intellectual Property Rights (the \"Council\nfor TRIPS\").", "2": "Intellectual Property Conventions\n1. In respect of Parts II, III and IV of this Agreement, Members shall comply with Articles 1 through\n12, and Article 19, of the Paris Convention (1967).\n2. Nothing in Parts I to IV of this Agreement shall derogate from existing obligations that Members\nmay have to each other under the Paris Convention, the Berne Convention, the Rome Convention and\nthe Treaty on Intellectual Property in Respect of Integrated Circuits.\n1When \"nationals\" are referred to in this Agreement, they shall be deemed, in the case of a separate customs territory\nMember of the WTO, to mean persons, natural or legal, who are domiciled or who have a real and effective industrial or\ncommercial establishment in that customs territory.\n2In this Agreement, \"Paris Convention\" refers to the Paris Convention for the Protection of Industrial Property; \"Paris\nConvention (1967)\" refers to the Stockholm Act of this Convention of 14 July 1967. \"Berne Convention\" refers to the Berne\nConvention for the Protection of Literary and Artistic Works; \"Berne Convention (1971)\" refers to the Paris Act of this\nConvention of 24 July 1971. \"Rome Convention\" refers to the International Convention for the Protection of Performers,\nProducers of Phonograms and Broadcasting Organizations, adopted at Rome on 26 October 1961. \"Treaty on Intellectual\nProperty in Respect of Integrated Circuits\" (IPIC Treaty) refers to the Treaty on Intellectual Property in Respect of Integrated\nCircuits, adopted at Washington on 26 May 1989. \"WTO Agreement\" refers to the Agreement Establishing the WTO.", "3": "National Treatment\n1. Each Member shall accord to the nationals of other Members treatment no less favourable than\nthat it accords to its own nationals with regard to the protection3 of intellectual property, subject to\nthe exceptions already provided in, respectively, the Paris Convention (1967), the Berne\nConvention (1971), the Rome Convention or the Treaty on Intellectual Property in Respect of Integrated\nCircuits. In respect of performers, producers of phonograms and broadcasting organizations, this\nobligation only applies in respect of the rights provided under this Agreement. Any Member availing\nitself of the possibilities provided in Article 6 of the Berne Convention (1971) or paragraph 1(b) of\nArticle 16 of the Rome Convention shall make a notification as foreseen in those provisions to the Council\nfor TRIPS.\n2. Members may avail themselves of the exceptions permitted under paragraph 1 in relation to\njudicial and administrative procedures, including the designation of an address for service or the\nappointment of an agent within the jurisdiction of a Member, only where such exceptions are necessary\nto secure compliance with laws and regulations which are not inconsistent with the provisions of this\nAgreement and where such practices are not applied in a manner which would constitute a disguised\nrestriction on trade.", "4": "Most-Favoured-Nation Treatment\nWith regard to the protection of intellectual property, any advantage, favour, privilege or immunity\ngranted by a Member to the nationals of any other country shall be accorded immediately and\nunconditionally to the nationals of all other Members. Exempted from this obligation are any advantage,\nfavour, privilege or immunity accorded by a Member:\n(a) deriving from international agreements on judicial assistance or law enforcement of\na general nature and not particularly confined to the protection of intellectual property;\n(b) granted in accordance with the provisions of the Berne Convention (1971) or the Rome\nConvention authorizing that the treatment accorded be a function not of national\ntreatment but of the treatment accorded in another country;\n(c) in respect of the rights of performers, producers of phonograms and broadcasting\norganizations not provided under this Agreement;\n(d) deriving from international agreements related to the protection of intellectual property\nwhich entered into force prior to the entry into force of the WTO Agreement, provided\nthat such agreements are notified to the Council for TRIPS and do not constitute an\narbitrary or unjustifiable discrimination against nationals of other Members.\n3For the purposes of Articles 3 and 4, \"protection\" shall include matters affecting the availability, acquisition, scope,\nmaintenance and enforcement of intellectual property rights as well as those matters affecting the use of intellectual property\nrights specifically addressed in this Agreement.", "5": "Multilateral Agreements on Acquisition or\nMaintenance of Protection\nThe obligations under Articles 3 and 4 do not apply to procedures provided in multilateral\nagreements concluded under the auspices of WIPO relating to the acquisition or maintenance of\nintellectual property rights.", "6": "Exhaustion\nFor the purposes of dispute settlement under this Agreement, subject to the provisions of\nArticles 3 and 4 nothing in this Agreement shall be used to address the issue of the exhaustion of\nintellectual property rights.", "7": "Objectives\nThe protection and enforcement of intellectual property rights should contribute to the promotion\nof technological innovation and to the transfer and dissemination of technology, to the mutual advantage\nof producers and users of technological knowledge and in a manner conducive to social and economic\nwelfare, and to a balance of rights and obligations.", "8": "Principles\n1. Members may, in formulating or amending their laws and regulations, adopt measures necessary\nto protect public health and nutrition, and to promote the public interest in sectors of vital importance\nto their socio-economic and technological development, provided that such measures are consistent\nwith the provisions of this Agreement.\n2. Appropriate measures, provided that they are consistent with the provisions of this Agreement,\nmay be needed to prevent the abuse of intellectual property rights by right holders or the resort to\npractices which unreasonably restrain trade or adversely affect the international transfer of technology.\nSTANDARDS CONCERNING THE AVAILABILITY, SCOPE\nAND USE OF INTELLECTUAL PROPERTY RIGHTS", "9": "Relation to the Berne Convention\n1. Members shall comply with Articles 1 through 21 of the Berne Convention (1971) and the\nAppendix thereto. However, Members shall not have rights or obligations under this Agreement in\nrespect of the rights conferred under Article 6bis of that Convention or of the rights derived therefrom.\n2. Copyright protection shall extend to expressions and not to ideas, procedures, methods of\noperation or mathematical concepts as such.", "10": "Computer Programs and Compilations of Data\n1. Computer programs, whether in source or object code, shall be protected as literary works under\nthe Berne Convention (1971).\n2. Compilations of data or other material, whether in machine readable or other form, which by\nreason of the selection or arrangement of their contents constitute intellectual creations shall be protected\nas such. Such protection, which shall not extend to the data or material itself, shall be without prejudice\nto any copyright subsisting in the data or material itself.", "11": "Rental Rights\nIn respect of at least computer programs and cinematographic works, a Member shall provide\nauthors and their successors in title the right to authorize or to prohibit the commercial rental to the\npublic of originals or copies of their copyright works. A Member shall be excepted from this obligation\nin respect of cinematographic works unless such rental has led to widespread copying of such works\nwhich is materially impairing the exclusive right of reproduction conferred in that Member on authors\nand their successors in title. In respect of computer programs, this obligation does not apply to rentals\nwhere the program itself is not the essential object of the rental.", "12": "Term of Protection\nWhenever the term of protection of a work, other than a photographic work or a work of applied\nart, is calculated on a basis other than the life of a natural person, such term shall be no less than 50 years\nfrom the end of the calendar year of authorized publication, or, failing such authorized publication within\n50 years from the making of the work, 50 years from the end of the calendar year of making.", "13": "Limitations and Exceptions\nMembers shall confine limitations or exceptions to exclusive rights to certain special cases which\ndo not conflict with a normal exploitation of the work and do not unreasonably prejudice the legitimate\ninterests of the right holder.", "14": "Protection of Performers, Producers of Phonograms\n(Sound Recordings) and Broadcasting Organizations\n1. In respect of a fixation of their performance on a phonogram, performers shall have the possibility\nof preventing the following acts when undertaken without their authorization: the fixation of their unfixed\nperformance and the reproduction of such fixation. Performers shall also have the possibility of\npreventing the following acts when undertaken without their authorization: the broadcasting by wireless\nmeans and the communication to the public of their live performance.\n2. Producers of phonograms shall enjoy the right to authorize or prohibit the direct or indirect\nreproduction of their phonograms.\n3. Broadcasting organizations shall have the right to prohibit the following acts when undertaken\nwithout their authorization: the fixation, the reproduction of fixations, and the rebroadcasting by wireless\nmeans of broadcasts, as well as the communication to the public of television broadcasts of the same.\nWhere Members do not grant such rights to broadcasting organizations, they shall provide owners of\ncopyright in the subject matter of broadcasts with the possibility of preventing the above acts, subject\nto the provisions of the Berne Convention (1971).\n4. The provisions of Article 11 in respect of computer programs shall apply mutatis mutandis\nto producers of phonograms and any other right holders in phonograms as determined in a Member's\nlaw. If on 15 April 1994 a Member has in force a system of equitable remuneration of right holders\nin respect of the rental of phonograms, it may maintain such system provided that the commercial rental\nof phonograms is not giving rise to the material impairment of the exclusive rights of reproduction\nof right holders.\n5. The term of the protection available under this Agreement to performers and producers of\nphonograms shall last at least until the end of a period of 50 years computed from the end of the calendar\nyear in which the fixation was made or the performance took place. The term of protection granted\npursuant to paragraph 3 shall last for at least 20 years from the end of the calendar year in which the\nbroadcast took place.\n6. Any Member may, in relation to the rights conferred under paragraphs 1, 2 and 3, provide for\nconditions, limitations, exceptions and reservations to the extent permitted by the Rome Convention.\nHowever, the provisions of Article 18 of the Berne Convention (1971) shall also apply, mutatis mutandis,\nto the rights of performers and producers of phonograms in phonograms.", "15": "Protectable Subject Matter\n1. Any sign, or any combination of signs, capable of distinguishing the goods or services of one\nundertaking from those of other undertakings, shall be capable of constituting a trademark. Such signs,\nin particular words including personal names, letters, numerals, figurative elements and combinations\nof colours as well as any combination of such signs, shall be eligible for registration as trademarks.\nWhere signs are not inherently capable of distinguishing the relevant goods or services, Members may\nmake registrability depend on distinctiveness acquired through use. Members may require, as a condition\nof registration, that signs be visually perceptible.\n2. Paragraph 1 shall not be understood to prevent a Member from denying registration of a trademark\non other grounds, provided that they do not derogate from the provisions of the Paris Convention (1967).\n3. Members may make registrability depend on use. However, actual use of a trademark shall\nnot be a condition for filing an application for registration. An application shall not be refused solely\non the ground that intended use has not taken place before the expiry of a period of three years from\nthe date of application.\n4. The nature of the goods or services to which a trademark is to be applied shall in no case form\nan obstacle to registration of the trademark.\n5. Members shall publish each trademark either before it is registered or promptly after it is\nregistered and shall afford a reasonable opportunity for petitions to cancel the registration. In addition,\nMembers may afford an opportunity for the registration of a trademark to be opposed.", "16": "Rights Conferred\n1. The owner of a registered trademark shall have the exclusive right to prevent all third parties\nnot having the owner’s consent from using in the course of trade identical or similar signs for goods\nor services which are identical or similar to those in respect of which the trademark is registered where\nsuch use would result in a likelihood of confusion. In case of the use of an identical sign for identical\ngoods or services, a likelihood of confusion shall be presumed. The rights described above shall not\nprejudice any existing prior rights, nor shall they affect the possibility of Members making rights available\non the basis of use.\n2. Article 6bis of the Paris Convention (1967) shall apply, mutatis mutandis, to services. In\ndetermining whether a trademark is well-known, Members shall take account of the knowledge of the\ntrademark in the relevant sector of the public, including knowledge in the Member concerned which\nhas been obtained as a result of the promotion of the trademark.\n3. Article 6bis of the Paris Convention (1967) shall apply, mutatis mutandis, to goods or services\nwhich are not similar to those in respect of which a trademark is registered, provided that use of that\ntrademark in relation to those goods or services would indicate a connection between those goods or\nservices and the owner of the registered trademark and provided that the interests of the owner of the\nregistered trademark are likely to be damaged by such use.", "17": "Exceptions\nMembers may provide limited exceptions to the rights conferred by a trademark, such as fair\nuse of descriptive terms, provided that such exceptions take account of the legitimate interests of the\nowner of the trademark and of third parties.", "18": "Term of Protection\nInitial registration, and each renewal of registration, of a trademark shall be for a term of no\nless than seven years. The registration of a trademark shall be renewable indefinitely.", "19": "Requirement of Use\n1. If use is required to maintain a registration, the registration may be cancelled only after an\nuninterrupted period of at least three years of non-use, unless valid reasons based on the existence of\nobstacles to such use are shown by the trademark owner. Circumstances arising independently of the\nwill of the owner of the trademark which constitute an obstacle to the use of the trademark, such as\nimport restrictions on or other government requirements for goods or services protected by the trademark,\nshall be recognized as valid reasons for non-use.\n2. When subject to the control of its owner, use of a trademark by another person shall be recognized\nas use of the trademark for the purpose of maintaining the registration.", "20": "Other Requirements\nThe use of a trademark in the course of trade shall not be unjustifiably encumbered by special\nrequirements, such as use with another trademark, use in a special form or use in a manner detrimental\nto its capability to distinguish the goods or services of one undertaking from those of other undertakings.\nThis will not preclude a requirement prescribing the use of the trademark identifying the undertaking\nproducing the goods or services along with, but without linking it to, the trademark distinguishing the\nspecific goods or services in question of that undertaking.", "21": "Licensing and Assignment\nMembers may determine conditions on the licensing and assignment of trademarks, it being\nunderstood that the compulsory licensing of trademarks shall not be permitted and that the owner of\na registered trademark shall have the right to assign the trademark with or without the transfer of the\nbusiness to which the trademark belongs.", "22": "Protection of Geographical Indications\n1. Geographical indications are, for the purposes of this Agreement, indications which identify\na good as originating in the territory of a Member, or a region or locality in that territory, where a given\nquality, reputation or other characteristic of the good is essentially attributable to its geographical origin.\n2. In respect of geographical indications, Members shall provide the legal means for interested\nparties to prevent:\n(a) the use of any means in the designation or presentation of a good that indicates or\nsuggests that the good in question originates in a geographical area other than the true\nplace of origin in a manner which misleads the public as to the geographical origin\nof the good;\n(b) any use which constitutes an act of unfair competition within the meaning of\nArticle 10bis of the Paris Convention (1967).\n3. A Member shall, ex officio if its legislation so permits or at the request of an interested party,\nrefuse or invalidate the registration of a trademark which contains or consists of a geographical indication\nwith respect to goods not originating in the territory indicated, if use of the indication in the trademark\nfor such goods in that Member is of such a nature as to mislead the public as to the true place of origin.\n4. The protection under paragraphs 1, 2 and 3 shall be applicable against a geographical indication\nwhich, although literally true as to the territory, region or locality in which the goods originate, falsely\nrepresents to the public that the goods originate in another territory.", "23": "Additional Protection for Geographical Indications\nfor Wines and Spirits\n1. Each Member shall provide the legal means for interested parties to prevent use of a geographical\nindication identifying wines for wines not originating in the place indicated by the geographical indication\nin question or identifying spirits for spirits not originating in the place indicated by the geographical\nindication in question, even where the true origin of the goods is indicated or the geographical indication\nis used in translation or accompanied by expressions such as \"kind\", \"type\", \"style\", \"imitation\" or the\nlike.4\n2. The registration of a trademark for wines which contains or consists of a geographical indication\nidentifying wines or for spirits which contains or consists of a geographical indication identifying spirits\nshall be refused or invalidated, ex officio if a Member's legislation so permits or at the request of an\ninterested party, with respect to such wines or spirits not having this origin.\n3. In the case of homonymous geographical indications for wines, protection shall be accorded\nto each indication, subject to the provisions of paragraph 4 of Article 22. Each Member shall determine\nthe practical conditions under which the homonymous indications in question will be differentiated\nfrom each other, taking into account the need to ensure equitable treatment of the producers concerned\nand that consumers are not misled.\n4. In order to facilitate the protection of geographical indications for wines, negotiations shall\nbe undertaken in the Council for TRIPS concerning the establishment of a multilateral system of\nnotification and registration of geographical indications for wines eligible for protection in those Members\nparticipating in the system.", "24": "International Negotiations; Exceptions\n1. Members agree to enter into negotiations aimed at increasing the protection of individual\ngeographical indications under Article 23. The provisions of paragraphs 4 through 8 below shall not\nbe used by a Member to refuse to conduct negotiations or to conclude bilateral or multilateral agreements.\nIn the context of such negotiations, Members shall be willing to consider the continued applicability\nof these provisions to individual geographical indications whose use was the subject of such negotiations.\n2. The Council for TRIPS shall keep under review the application of the provisions of this Section;\nthe first such review shall take place within two years of the entry into force of the WTO Agreement.\nAny matter affecting the compliance with the obligations under these provisions may be drawn to the\nattention of the Council, which, at the request of a Member, shall consult with any Member or Members\nin respect of such matter in respect of which it has not been possible to find a satisfactory solution\nthrough bilateral or plurilateral consultations between the Members concerned. The Council shall take\nsuch action as may be agreed to facilitate the operation and further the objectives of this Section.\n3. In implementing this Section, a Member shall not diminish the protection of geographical\nindications that existed in that Member immediately prior to the date of entry into force of the WTO\nAgreement.\n4Notwithstanding the first sentence of Article 42, Members may, with respect to these obligations, instead provide for\nenforcement by administrative action.\n4. Nothing in this Section shall require a Member to prevent continued and similar use of a particular\ngeographical indication of another Member identifying wines or spirits in connection with goods or\nservices by any of its nationals or domiciliaries who have used that geographical indication in a\ncontinuous manner with regard to the same or related goods or services in the territory of that Member\neither (a) for at least 10 years preceding 15 April 1994 or (b) in good faith preceding that date.\n5. Where a trademark has been applied for or registered in good faith, or where rights to a trademark\nhave been acquired through use in good faith either:\n(a) before the date of application of these provisions in that Member as defined in Part VI;\nor\n(b) before the geographical indication is protected in its country of origin;\nmeasures adopted to implement this Section shall not prejudice eligibility for or the validity of the\nregistration of a trademark, or the right to use a trademark, on the basis that such a trademark is identical\nwith, or similar to, a geographical indication.\n6. Nothing in this Section shall require a Member to apply its provisions in respect of a geographical\nindication of any other Member with respect to goods or services for which the relevant indication\nis identical with the term customary in common language as the common name for such goods or services\nin the territory of that Member. Nothing in this Section shall require a Member to apply its provisions\nin respect of a geographical indication of any other Member with respect to products of the vine for\nwhich the relevant indication is identical with the customary name of a grape variety existing in the\nterritory of that Member as of the date of entry into force of the WTO Agreement.\n7. A Member may provide that any request made under this Section in connection with the use\nor registration of a trademark must be presented within five years after the adverse use of the protected\nindication has become generally known in that Member or after the date of registration of the trademark\nin that Member provided that the trademark has been published by that date, if such date is earlier than\nthe date on which the adverse use became generally known in that Member, provided that the\ngeographical indication is not used or registered in bad faith.\n8. The provisions of this Section shall in no way prejudice the right of any person to use, in the\ncourse of trade, that person’s name or the name of that person’s predecessor in business, except where\nsuch name is used in such a manner as to mislead the public.\n9. There shall be no obligation under this Agreement to protect geographical indications which\nare not or cease to be protected in their country of origin, or which have fallen into disuse in that country.", "25": "Requirements for Protection\n1. Members shall provide for the protection of independently created industrial designs that are\nnew or original. Members may provide that designs are not new or original if they do not significantly\ndiffer from known designs or combinations of known design features. Members may provide that such\nprotection shall not extend to designs dictated essentially by technical or functional considerations.\n2. Each Member shall ensure that requirements for securing protection for textile designs, in\nparticular in regard to any cost, examination or publication, do not unreasonably impair the opportunity\nto seek and obtain such protection. Members shall be free to meet this obligation through industrial\ndesign law or through copyright law.", "26": "Protection\n1. The owner of a protected industrial design shall have the right to prevent third parties not having\nthe owner’s consent from making, selling or importing articles bearing or embodying a design which\nis a copy, or substantially a copy, of the protected design, when such acts are undertaken for commercial\npurposes.\n2. Members may provide limited exceptions to the protection of industrial designs, provided that\nsuch exceptions do not unreasonably conflict with the normal exploitation of protected industrial designs\nand do not unreasonably prejudice the legitimate interests of the owner of the protected design, taking\naccount of the legitimate interests of third parties.\n3. The duration of protection available shall amount to at least 10 years.", "27": "Patentable Subject Matter\n1. Subject to the provisions of paragraphs 2 and 3, patents shall be available for any inventions,\nwhether products or processes, in all fields of technology, provided that they are new, involve an inventive\nstep and are capable of industrial application.5 Subject to paragraph 4 of Article 65, paragraph 8 of\nArticle 70 and paragraph 3 of this Article, patents shall be available and patent rights enjoyable without\ndiscrimination as to the place of invention, the field of technology and whether products are imported\nor locally produced.\n2. Members may exclude from patentability inventions, the prevention within their territory of\nthe commercial exploitation of which is necessary to protect ordre public or morality, including to protect\nhuman, animal or plant life or health or to avoid serious prejudice to the environment, provided that\nsuch exclusion is not made merely because the exploitation is prohibited by their law.\n3. Members may also exclude from patentability:\n(a) diagnostic, therapeutic and surgical methods for the treatment of humans or animals;\n(b) plants and animals other than micro-organisms, and essentially biological processes\nfor the production of plants or animals other than non-biological and microbiological\nprocesses. However, Members shall provide for the protection of plant varieties either\nby patents or by an effective sui generis system or by any combination thereof. The\n5For the purposes of this Article, the terms \"inventive step\" and \"capable of industrial application\" may be deemed by\na Member to be synonymous with the terms \"non-obvious\" and \"useful\" respectively.\nprovisions of this subparagraph shall be reviewed four years after the date of entry into\nforce of the WTO Agreement.", "28": "Rights Conferred\n1. A patent shall confer on its owner the following exclusive rights:\n(a) where the subject matter of a patent is a product, to prevent third parties not having\nthe owner’s consent from the acts of: making, using, offering for sale, selling, or\nimporting6 for these purposes that product;\n(b) where the subject matter of a patent is a process, to prevent third parties not having\nthe owner’s consent from the act of using the process, and from the acts of: using,\noffering for sale, selling, or importing for these purposes at least the product obtained\ndirectly by that process.\n2. Patent owners shall also have the right to assign, or transfer by succession, the patent and to\nconclude licensing contracts.", "29": "Conditions on Patent Applicants\n1. Members shall require that an applicant for a patent shall disclose the invention in a manner\nsufficiently clear and complete for the invention to be carried out by a person skilled in the art and\nmay require the applicant to indicate the best mode for carrying out the invention known to the inventor\nat the filing date or, where priority is claimed, at the priority date of the application.\n2. Members may require an applicant for a patent to provide information concerning the applicant’s\ncorresponding foreign applications and grants.", "30": "Exceptions to Rights Conferred\nMembers may provide limited exceptions to the exclusive rights conferred by a patent, provided\nthat such exceptions do not unreasonably conflict with a normal exploitation of the patent and do not\nunreasonably prejudice the legitimate interests of the patent owner, taking account of the legitimate\ninterests of third parties.\n6This right, like all other rights conferred under this Agreement in respect of the use, sale, importation or other distribution\nof goods, is subject to the provisions of Article 6.", "31": "Other Use Without Authorization of the Right Holder\nWhere the law of a Member allows for other use7 of the subject matter of a patent without the\nauthorization of the right holder, including use by the government or third parties authorized by the\ngovernment, the following provisions shall be respected:\n(a) authorization of such use shall be considered on its individual merits;\n(b) such use may only be permitted if, prior to such use, the proposed user has made efforts\nto obtain authorization from the right holder on reasonable commercial terms and\nconditions and that such efforts have not been successful within a reasonable period\nof time. This requirement may be waived by a Member in the case of a national\nemergency or other circumstances of extreme urgency or in cases of public non-\ncommercial use. In situations of national emergency or other circumstances of extreme\nurgency, the right holder shall, nevertheless, be notified as soon as reasonably practicable.\nIn the case of public non-commercial use, where the government or contractor, without\nmaking a patent search, knows or has demonstrable grounds to know that a valid patent\nis or will be used by or for the government, the right holder shall be informed promptly;\n(c) the scope and duration of such use shall be limited to the purpose for which it was\nauthorized, and in the case of semi-conductor technology shall only be for public non-\ncommercial use or to remedy a practice determined after judicial or administrative\nprocess to be anti-competitive;\n(d) such use shall be non-exclusive;\n(e) such use shall be non-assignable, except with that part of the enterprise or goodwill\nwhich enjoys such use;\n(f) any such use shall be authorized predominantly for the supply of the domestic market\nof the Member authorizing such use;\n(g) authorization for such use shall be liable, subject to adequate protection of the legitimate\ninterests of the persons so authorized, to be terminated if and when the circumstances\nwhich led to it cease to exist and are unlikely to recur. The competent authority shall\nhave the authority to review, upon motivated request, the continued existence of these\ncircumstances;\n(h) the right holder shall be paid adequate remuneration in the circumstances of each case,\ntaking into account the economic value of the authorization;\n(i) the legal validity of any decision relating to the authorization of such use shall be subject\nto judicial review or other independent review by a distinct higher authority in that\nMember;\n(j) any decision relating to the remuneration provided in respect of such use shall be subject\nto judicial review or other independent review by a distinct higher authority in that\nMember;\n7\"Other use\" refers to use other than that allowed under Article 30.\n(k) Members are not obliged to apply the conditions set forth in subparagraphs (b) and (f)\nwhere such use is permitted to remedy a practice determined after judicial or\nadministrative process to be anti-competitive. The need to correct anti-competitive\npractices may be taken into account in determining the amount of remuneration in such\ncases. Competent authorities shall have the authority to refuse termination of\nauthorization if and when the conditions which led to such authorization are likely to\nrecur;\n(l) where such use is authorized to permit the exploitation of a patent (\"the second patent\")\nwhich cannot be exploited without infringing another patent (\"the first patent\"), the\nfollowing additional conditions shall apply:\n(i) the invention claimed in the second patent shall involve an important technical\nadvance of considerable economic significance in relation to the invention\nclaimed in the first patent;\n(ii) the owner of the first patent shall be entitled to a cross-licence on reasonable\nterms to use the invention claimed in the second patent; and\n(iii) the use authorized in respect of the first patent shall be non-assignable except\nwith the assignment of the second patent.", "32": "Revocation/Forfeiture\nAn opportunity for judicial review of any decision to revoke or forfeit a patent shall be available.", "33": "Term of Protection\nThe term of protection available shall not end before the expiration of a period of twenty years\ncounted from the filing date.8", "34": "Process Patents: Burden of Proof\n1. For the purposes of civil proceedings in respect of the infringement of the rights of the owner\nreferred to in paragraph 1(b) of Article 28, if the subject matter of a patent is a process for obtaining\na product, the judicial authorities shall have the authority to order the defendant to prove that the process\nto obtain an identical product is different from the patented process. Therefore, Members shall provide,\nin at least one of the following circumstances, that any identical product when produced without the\nconsent of the patent owner shall, in the absence of proof to the contrary, be deemed to have been\nobtained by the patented process:\n8It is understood that those Members which do not have a system of original grant may provide that the term of protection\nshall be computed from the filing date in the system of original grant.\n(a) if the product obtained by the patented process is new;\n(b) if there is a substantial likelihood that the identical product was made by the process\nand the owner of the patent has been unable through reasonable efforts to determine\nthe process actually used.\n2. Any Member shall be free to provide that the burden of proof indicated in paragraph 1 shall\nbe on the alleged infringer only if the condition referred to in subparagraph (a) is fulfilled or only if\nthe condition referred to in subparagraph (b) is fulfilled.\n3. In the adduction of proof to the contrary, the legitimate interests of defendants in protecting\ntheir manufacturing and business secrets shall be taken into account.", "35": "Relation to the IPIC Treaty\nMembers agree to provide protection to the layout-designs (topographies) of integrated circuits\n(referred to in this Agreement as \"layout-designs\") in accordance with Articles 2 through 7 (other than\nparagraph 3 of Article 6), Article 12 and paragraph 3 of Article 16 of the Treaty on Intellectual Property\nin Respect of Integrated Circuits and, in addition, to comply with the following provisions.", "36": "Scope of the Protection\nSubject to the provisions of paragraph 1 of Article 37, Members shall consider unlawful the\nfollowing acts if performed without the authorization of the right holder:9 importing, selling, or otherwise\ndistributing for commercial purposes a protected layout-design, an integrated circuit in which a protected\nlayout-design is incorporated, or an article incorporating such an integrated circuit only in so far as\nit continues to contain an unlawfully reproduced layout-design.", "37": "Acts Not Requiring the Authorization of the Right Holder\n1. Notwithstanding Article 36, no Member shall consider unlawful the performance of any of the\nacts referred to in that Article in respect of an integrated circuit incorporating an unlawfully reproduced\nlayout-design or any article incorporating such an integrated circuit where the person performing or\nordering such acts did not know and had no reasonable ground to know, when acquiring the integrated\ncircuit or article incorporating such an integrated circuit, that it incorporated an unlawfully reproduced\nlayout-design. Members shall provide that, after the time that such person has received sufficient notice\nthat the layout-design was unlawfully reproduced, that person may perform any of the acts with respect\nto the stock on hand or ordered before such time, but shall be liable to pay to the right holder a sum\n9The term \"right holder\" in this Section shall be understood as having the same meaning as the term \"holder of the right\"\nin the IPIC Treaty.\nequivalent to a reasonable royalty such as would be payable under a freely negotiated licence in respect\nof such a layout-design.\n2. The conditions set out in subparagraphs (a) through (k) of Article 31 shall apply mutatis mutandis\nin the event of any non-voluntary licensing of a layout-design or of its use by or for the government\nwithout the authorization of the right holder.", "38": "Term of Protection\n1. In Members requiring registration as a condition of protection, the term of protection of layout-\ndesigns shall not end before the expiration of a period of 10 years counted from the date of filing an\napplication for registration or from the first commercial exploitation wherever in the world it occurs.\n2. In Members not requiring registration as a condition for protection, layout-designs shall be\nprotected for a term of no less than 10 years from the date of the first commercial exploitation wherever\nin the world it occurs.\n3. Notwithstanding paragraphs 1 and 2, a Member may provide that protection shall lapse 15 years\nafter the creation of the layout-design.", "39": "1. In the course of ensuring effective protection against unfair competition as provided in\nArticle 10bis of the Paris Convention (1967), Members shall protect undisclosed information in accordance\nwith paragraph 2 and data submitted to governments or governmental agencies in accordance with\nparagraph 3.\n2. Natural and legal persons shall have the possibility of preventing information lawfully within\ntheir control from being disclosed to, acquired by, or used by others without their consent in a manner\ncontrary to honest commercial practices10 so long as such information:\n(a) is secret in the sense that it is not, as a body or in the precise configuration and assembly\nof its components, generally known among or readily accessible to persons within the\ncircles that normally deal with the kind of information in question;\n(b) has commercial value because it is secret; and\n(c) has been subject to reasonable steps under the circumstances, by the person lawfully\nin control of the information, to keep it secret.\n3. Members, when requiring, as a condition of approving the marketing of pharmaceutical or of\nagricultural chemical products which utilize new chemical entities, the submission of undisclosed test\nor other data, the origination of which involves a considerable effort, shall protect such data against\n10For the purpose of this provision, \"a manner contrary to honest commercial practices\" shall mean at least practices such\nas breach of contract, breach of confidence and inducement to breach, and includes the acquisition of undisclosed information\nby third parties who knew, or were grossly negligent in failing to know, that such practices were involved in the acquisition.\nunfair commercial use. In addition, Members shall protect such data against disclosure, except where\nnecessary to protect the public, or unless steps are taken to ensure that the data are protected against\nunfair commercial use.\nIN CONTRACTUAL LICENCES", "40": "1. Members agree that some licensing practices or conditions pertaining to intellectual property\nrights which restrain competition may have adverse effects on trade and may impede the transfer and\ndissemination of technology.\n2. Nothing in this Agreement shall prevent Members from specifying in their legislation licensing\npractices or conditions that may in particular cases constitute an abuse of intellectual property rights\nhaving an adverse effect on competition in the relevant market. As provided above, a Member may\nadopt, consistently with the other provisions of this Agreement, appropriate measures to prevent or\ncontrol such practices, which may include for example exclusive grantback conditions, conditions\npreventing challenges to validity and coercive package licensing, in the light of the relevant laws and\nregulations of that Member.\n3. Each Member shall enter, upon request, into consultations with any other Member which has\ncause to believe that an intellectual property right owner that is a national or domiciliary of the Member\nto which the request for consultations has been addressed is undertaking practices in violation of the\nrequesting Member's laws and regulations on the subject matter of this Section, and which wishes to\nsecure compliance with such legislation, without prejudice to any action under the law and to the full\nfreedom of an ultimate decision of either Member. The Member addressed shall accord full and\nsympathetic consideration to, and shall afford adequate opportunity for, consultations with the requesting\nMember, and shall cooperate through supply of publicly available non-confidential information of\nrelevance to the matter in question and of other information available to the Member, subject to domestic\nlaw and to the conclusion of mutually satisfactory agreements concerning the safeguarding of its\nconfidentiality by the requesting Member.\n4. A Member whose nationals or domiciliaries are subject to proceedings in another Member\nconcerning alleged violation of that other Member's laws and regulations on the subject matter of this\nSection shall, upon request, be granted an opportunity for consultations by the other Member under\nthe same conditions as those foreseen in paragraph 3.\nENFORCEMENT OF INTELLECTUAL PROPERTY RIGHTS", "41": "1. Members shall ensure that enforcement procedures as specified in this Part are available under\ntheir law so as to permit effective action against any act of infringement of intellectual property rights\ncovered by this Agreement, including expeditious remedies to prevent infringements and remedies which\nconstitute a deterrent to further infringements. These procedures shall be applied in such a manner\nas to avoid the creation of barriers to legitimate trade and to provide for safeguards against their abuse.\n2. Procedures concerning the enforcement of intellectual property rights shall be fair and equitable.\nThey shall not be unnecessarily complicated or costly, or entail unreasonable time-limits or unwarranted\ndelays.\n3. Decisions on the merits of a case shall preferably be in writing and reasoned. They shall be\nmade available at least to the parties to the proceeding without undue delay. Decisions on the merits\nof a case shall be based only on evidence in respect of which parties were offered the opportunity to\nbe heard.\n4. Parties to a proceeding shall have an opportunity for review by a judicial authority of final\nadministrative decisions and, subject to jurisdictional provisions in a Member's law concerning the\nimportance of a case, of at least the legal aspects of initial judicial decisions on the merits of a case.\nHowever, there shall be no obligation to provide an opportunity for review of acquittals in criminal\ncases.\n5. It is understood that this Part does not create any obligation to put in place a judicial system\nfor the enforcement of intellectual property rights distinct from that for the enforcement of law in general,\nnor does it affect the capacity of Members to enforce their law in general. Nothing in this Part creates\nany obligation with respect to the distribution of resources as between enforcement of intellectual property\nrights and the enforcement of law in general.", "42": "Fair and Equitable Procedures\nMembers shall make available to right holders11 civil judicial procedures concerning the\nenforcement of any intellectual property right covered by this Agreement. Defendants shall have the\nright to written notice which is timely and contains sufficient detail, including the basis of the claims.\nParties shall be allowed to be represented by independent legal counsel, and procedures shall not impose\noverly burdensome requirements concerning mandatory personal appearances. All parties to such\nprocedures shall be duly entitled to substantiate their claims and to present all relevant evidence. The\nprocedure shall provide a means to identify and protect confidential information, unless this would be\ncontrary to existing constitutional requirements.", "43": "Evidence\n1. The judicial authorities shall have the authority, where a party has presented reasonably available\nevidence sufficient to support its claims and has specified evidence relevant to substantiation of its\nclaims which lies in the control of the opposing party, to order that this evidence be produced by the\nopposing party, subject in appropriate cases to conditions which ensure the protection of confidential\ninformation.\n2. In cases in which a party to a proceeding voluntarily and without good reason refuses access\nto, or otherwise does not provide necessary information within a reasonable period, or significantly\nimpedes a procedure relating to an enforcement action, a Member may accord judicial authorities the\nauthority to make preliminary and final determinations, affirmative or negative, on the basis of the\ninformation presented to them, including the complaint or the allegation presented by the party adversely\naffected by the denial of access to information, subject to providing the parties an opportunity to be\nheard on the allegations or evidence.", "44": "Injunctions\n1. The judicial authorities shall have the authority to order a party to desist from an infringement,\ninter alia to prevent the entry into the channels of commerce in their jurisdiction of imported goods\nthat involve the infringement of an intellectual property right, immediately after customs clearance of\nsuch goods. Members are not obliged to accord such authority in respect of protected subject matter\nacquired or ordered by a person prior to knowing or having reasonable grounds to know that dealing\nin such subject matter would entail the infringement of an intellectual property right.\n2. Notwithstanding the other provisions of this Part and provided that the provisions of Part II\nspecifically addressing use by governments, or by third parties authorized by a government, without\nthe authorization of the right holder are complied with, Members may limit the remedies available against\n11For the purpose of this Part, the term \"right holder\" includes federations and associations having legal standing to assert\nsuch rights.\nsuch use to payment of remuneration in accordance with subparagraph (h) of Article 31. In other cases,\nthe remedies under this Part shall apply or, where these remedies are inconsistent with a Member's\nlaw, declaratory judgments and adequate compensation shall be available.", "45": "Damages\n1. The judicial authorities shall have the authority to order the infringer to pay the right holder\ndamages adequate to compensate for the injury the right holder has suffered because of an infringement\nof that person’s intellectual property right by an infringer who knowingly, or with reasonable grounds\nto know, engaged in infringing activity.\n2. The judicial authorities shall also have the authority to order the infringer to pay the right holder\nexpenses, which may include appropriate attorney's fees. In appropriate cases, Members may authorize\nthe judicial authorities to order recovery of profits and/or payment of pre-established damages even\nwhere the infringer did not knowingly, or with reasonable grounds to know, engage in infringing activity.", "46": "Other Remedies\nIn order to create an effective deterrent to infringement, the judicial authorities shall have the\nauthority to order that goods that they have found to be infringing be, without compensation of any\nsort, disposed of outside the channels of commerce in such a manner as to avoid any harm caused to\nthe right holder, or, unless this would be contrary to existing constitutional requirements, destroyed.\nThe judicial authorities shall also have the authority to order that materials and implements the\npredominant use of which has been in the creation of the infringing goods be, without compensation\nof any sort, disposed of outside the channels of commerce in such a manner as to minimize the risks\nof further infringements. In considering such requests, the need for proportionality between the\nseriousness of the infringement and the remedies ordered as well as the interests of third parties shall\nbe taken into account. In regard to counterfeit trademark goods, the simple removal of the trademark\nunlawfully affixed shall not be sufficient, other than in exceptional cases, to permit release of the goods\ninto the channels of commerce.", "47": "Right of Information\nMembers may provide that the judicial authorities shall have the authority, unless this would\nbe out of proportion to the seriousness of the infringement, to order the infringer to inform the right\nholder of the identity of third persons involved in the production and distribution of the infringing goods\nor services and of their channels of distribution.", "48": "Indemnification of the Defendant\n1. The judicial authorities shall have the authority to order a party at whose request measures were\ntaken and who has abused enforcement procedures to provide to a party wrongfully enjoined or restrained\nadequate compensation for the injury suffered because of such abuse. The judicial authorities shall\nalso have the authority to order the applicant to pay the defendant expenses, which may include\nappropriate attorney's fees.\n2. In respect of the administration of any law pertaining to the protection or enforcement of\nintellectual property rights, Members shall only exempt both public authorities and officials from liability\nto appropriate remedial measures where actions are taken or intended in good faith in the course of\nthe administration of that law.", "49": "Administrative Procedures\nTo the extent that any civil remedy can be ordered as a result of administrative procedures\non the merits of a case, such procedures shall conform to principles equivalent in substance to those\nset forth in this Section.", "50": "1. The judicial authorities shall have the authority to order prompt and effective provisional\nmeasures:\n(a) to prevent an infringement of any intellectual property right from occurring, and in\nparticular to prevent the entry into the channels of commerce in their jurisdiction of\ngoods, including imported goods immediately after customs clearance;\n(b) to preserve relevant evidence in regard to the alleged infringement.\n2. The judicial authorities shall have the authority to adopt provisional measures inaudita altera\nparte where appropriate, in particular where any delay is likely to cause irreparable harm to the right\nholder, or where there is a demonstrable risk of evidence being destroyed.\n3. The judicial authorities shall have the authority to require the applicant to provide any reasonably\navailable evidence in order to satisfy themselves with a sufficient degree of certainty that the applicant\nis the right holder and that the applicant’s right is being infringed or that such infringement is imminent,\nand to order the applicant to provide a security or equivalent assurance sufficient to protect the defendant\nand to prevent abuse.\n4. Where provisional measures have been adopted inaudita altera parte, the parties affected shall\nbe given notice, without delay after the execution of the measures at the latest. A review, including\na right to be heard, shall take place upon request of the defendant with a view to deciding, within a\nreasonable period after the notification of the measures, whether these measures shall be modified, revoked\nor confirmed.\n5. The applicant may be required to supply other information necessary for the identification of\nthe goods concerned by the authority that will execute the provisional measures.\n6. Without prejudice to paragraph 4, provisional measures taken on the basis of paragraphs 1 and\n2 shall, upon request by the defendant, be revoked or otherwise cease to have effect, if proceedings\nleading to a decision on the merits of the case are not initiated within a reasonable period, to be\ndetermined by the judicial authority ordering the measures where a Member's law so permits or, in\nthe absence of such a determination, not to exceed 20 working days or 31 calendar days, whichever\nis the longer.\n7. Where the provisional measures are revoked or where they lapse due to any act or omission\nby the applicant, or where it is subsequently found that there has been no infringement or threat of\ninfringement of an intellectual property right, the judicial authorities shall have the authority to order\nthe applicant

const ZH_RULES = {"1": "本細則依專利法（以下簡稱本法）第一百五十八條規定訂定之。", "2": "依本法及本細則所為之申請，除依本法第十九條規定以電子方式為之者外，應以書面提出，並由申請人簽名或蓋章；委任有代理人者，得僅由代理人簽名或蓋章。專利專責機關認有必要時，得通知申請人檢附身分證明或法人證明文件。\n依本法及本細則所為之申請，以書面提出者，應使用專利專責機關指定之書表；其格式及份數，由專利專責機關定之。", "3": "技術用語之譯名經國家教育研究院編譯者，應以該譯名為原則；未經該院編譯或專利專責機關認有必要時，得通知申請人附註外文原名。\n申請專利及辦理有關專利事項之文件，應用中文；證明文件為外文者，專利專責機關認有必要時，得通知申請人檢附中文譯本或節譯本。", "4": "依本法及本細則所定應檢附之證明文件，以原本或正本為之。\n原本或正本，除優先權證明文件外，經當事人釋明與原本或正本相同者，得以影本代之。但舉發證據為書證影本者，應證明與原本或正本相同。\n原本或正本，經專利專責機關驗證無訛後，得予發還。", "5": "專利之申請及其他程序，以書面提出者，應以書件到達專利專責機關之日為準；如係郵寄者，以郵寄地郵戳所載日期為準。\n郵戳所載日期不清晰者，除由當事人舉證外，以到達專利專責機關之日為準。", "6": "依本法及本細則指定之期間，申請人得於指定期間屆滿前，敘明理由向專利專責機關申請延展。", "7": "申請人之姓名或名稱、印章、住居所或營業所變更時，應檢附證明文件向專利專責機關申請變更。但其變更無須以文件證明者，免予檢附。", "8": "因繼受專利申請權申請變更名義者，應備具申請書，並檢附下列文件：\n一、因受讓而變更名義者，其受讓專利申請權之契約或讓與證明文件。但公司因併購而承受者，為併購之證明文件。\n二、因繼承而變更名義者，其死亡及繼承證明文件。", "9": "申請人委任代理人者，應檢附委任書，載明代理之權限及送達處所。\n有關專利之申請及其他程序委任代理人辦理者，其代理人不得逾三人。\n代理人有二人以上者，均得單獨代理申請人。\n違反前項規定而為委任者，其代理人仍得單獨代理。\n申請人變更代理人之權限或更換代理人時，非以書面通知專利專責機關，對專利專責機關不生效力。\n代理人之送達處所變更時，應向專利專責機關申請變更。", "10": "代理人就受委任之權限內有為一切行為之權。但選任或解任代理人、撤回專利申請案、撤回分割案、撤回改請案、撤回再審查申請、撤回更正申請、撤回舉發案或拋棄專利權，非受特別委任，不得為之。", "11": "申請文件不符合法定程式而得補正者，專利專責機關應通知申請人限期補正；屆期未補正或補正仍不齊備者，依本法第十七條第一項規定辦理。", "12": "依本法第十七條第二項規定，申請回復原狀者，應敘明遲誤期間之原因及其消滅日期，並檢附證明文件向專利專責機關為之。", "13": "本法第二十二條所稱申請前及第二十三條所稱申請在先，如依本法第二十八條第一項或第三十條第一項規定主張優先權者，指該優先權日前。\n本法第二十二條所稱刊物，指向公眾公開之文書或載有資訊之其他儲存媒體。\n本法第二十二條第三項所定之十二個月，自同條項所定事實發生之次日起算至本法第二十五條第二項規定之申請日止。有多次本法第二十二條第三項所定事實者，前述期間之計算，應自第一次事實發生之次日起算。", "14": "本法第二十二條、第二十六條及第二十七所稱所屬技術領域中具有通常知識者，指具有申請時該發明所屬技術領域之一般知識及普通技能之人。\n前項所稱申請時，如依本法第二十八條第一項或第三十條第一項規定主張優先權者，指該優先權日。", "15": "因繼承、受讓、僱傭或出資關係取得專利申請權之人，就其被繼承人、讓與人、受雇人或受聘人在申請前之公開行為，適用本法第二十二條第三項及第四項規定。", "16": "申請發明專利者，其申請書應載明下列事項：\n一、發明名稱。\n二、發明人姓名、國籍。\n三、申請人姓名或名稱、國籍、住居所或營業所；有代表人者，並應載明代表人姓名。\n四、委任代理人者，其姓名、事務所。\n有下列情事之一，並應於申請時敘明之：\n一、主張本法第二十八條第一項規定之優先權者。\n二、主張本法第三十條第一項規定之優先權者。\n三、聲明本法第三十二條第一項規定之同一人於同日分別申請發明專利及新型專利者。", "17": "申請發明專利者，其說明書應載明下列事項：\n一、發明名稱。\n二、技術領域。\n三、先前技術：申請人所知之先前技術，並得檢送該先前技術之相關資料。\n四、發明內容：發明所欲解決之問題、解決問題之技術手段及對照先前技術之功效。\n五、圖式簡單說明：有圖式者，應以簡明之文字依圖式之圖號順序說明圖式。\n六、實施方式：記載一個以上之實施方式，必要時得以實施例說明；有圖式者，應參照圖式加以說明。\n七、符號說明：有圖式者，應依圖號或符號順序列出圖式之主要符號並加以說明。\n說明書應依前項各款所定順序及方式撰寫，並附加標題。但發明之性質以其他方式表達較為清楚者，不在此限。\n說明書得於各段落前，以置於中括號內之連續四位數之阿拉伯數字編號依序排列，以明確識別每一段落。\n發明名稱，應簡明表示所申請發明之內容，不得冠以無關之文字。\n申請生物材料或利用生物材料之發明專利，其生物材料已寄存者，應於說明書載明寄存機構、寄存日期及寄存號碼。申請前已於國外寄存機構寄存者，並應載明國外寄存機構、寄存日期及寄存號碼。\n生物材料寄存於本法第二十七條第五項規定之寄存機構者，該寄存機構出具之證明文件，應具有該生物材料之存活證明。\n發明專利包含一個或多個核酸或胺基酸序列者，說明書應包含依專利專責機關訂定之格式單獨記載之序列表。其序列表得以專利專責機關規定之電子檔為之。", "18": "發明之申請專利範圍，得以一項以上之獨立項表示；其項數應配合發明之內容；必要時，得有一項以上之附屬項。獨立項、附屬項，應以其依附關係，依序以阿拉伯數字編號排列。\n獨立項應敘明申請專利之標的名稱及申請人所認定之發明之必要技術特徵。\n附屬項應敘明所依附之項號，並敘明標的名稱及所依附請求項外之技術特徵，其依附之項號並應以阿拉伯數字為之；於解釋附屬項時，應包含所依附請求項之所有技術特徵。\n依附於二項以上之附屬項為多項附屬項，應以選擇式為之。\n附屬項僅得依附在前之獨立項或附屬項。但多項附屬項間不得直接或間接依附。\n獨立項或附屬項之文字敘述，應以單句為之。", "19": "請求項之技術特徵，除絕對必要外，不得以說明書之頁數、行數或圖式、圖式中之符號予以界定。\n請求項之技術特徵得引用圖式中對應之符號，該符號應附加於對應之技術特徵後，並置於括號內；該符號不得作為解釋請求項之限制。\n請求項得記載化學式或數學式，不得附有插圖。 \n複數技術特徵組合之發明，其請求項之技術特徵，得以手段功能用語或步驟功能用語表示。於解釋請求項時，應包含說明書中所敘述對應於該功能之結構、材料或動作及其均等範圍。", "20": "獨立項之撰寫，以二段式為之者，前言部分應包含申請專利之標的名稱及與先前技術共有之必要技術特徵；特徵部分應以「其特徵在於」、「其改良在於」或其他類似用語，敘明有別於先前技術之必要技術特徵。\n解釋獨立項時，特徵部分應與前言部分所述之技術特徵結合。", "21": "摘要，應簡要敘明發明所揭露之內容，並以所欲解決之問題、解決問題之技術手段及主要用途為限；其字數，以不超過二百五十字為原則；有化學式者，應揭示最能顯示發明特徵之化學式。\n摘要，不得記載商業性宣傳用語。\n摘要不符合前二項規定者，專利專責機關得通知申請人限期修正，或依職權修正後通知申請人。\n申請人應指定最能代表該發明技術特徵之圖為代表圖，並列出其主要符號，簡要加以說明。\n未依前項規定指定或指定之代表圖不適當者，專利專責機關得通知申請人限期補正，或依職權指定或刪除後通知申請人。", "22": "說明書、申請專利範圍及摘要中之技術用語及符號應一致。\n前項之說明書、申請專利範圍及摘要，應以打字或印刷為之。\n說明書、申請專利範圍及摘要以外文本提出者，其補正之中文本，應提供正確完整之翻譯。", "23": "發明之圖式，應參照工程製圖方法以墨線繪製清晰，於各圖縮小至三分之二時，仍得清晰分辨圖式中各項細節。\n圖式應註明圖號及符號，並依圖號順序排列，除必要註記外，不得記載其他說明文字。", "24": "發明專利申請案之說明書有部分缺漏或圖式有缺漏之情事，而經申請人補正者，以補正之日為申請日。但有下列情事之一者，仍以原提出申請之日為申請日：\n一、補正之說明書或圖式已見於主張優先權之先申請案。\n二、補正之說明書或圖式，申請人於專利專責機關確認申請日之處分書送達後三十日內撤回。\n前項之說明書或圖式以外文本提出者，亦同。", "25": "本法第二十八條第一項所定之十二個月，自在與中華民國相互承認優先權之國家或世界貿易組織會員第一次申請日之次日起算至本法第二十五條第二項規定之申請日止。\n本法第三十條第一項第一款所定之十二個月，自先申請案申請日之次日起算至本法第二十五條第二項規定之申請日止。", "26": "依本法第二十九條第二項規定檢送之優先權證明文件應為正本。\n申請人於本法第二十九條第二項規定期間內檢送之優先權證明文件為影本者，專利專責機關應通知申請人限期補正與該影本為同一文件之正本；屆期未補正或補正仍不齊備者，依本法第二十九條第三項規定，視為未主張優先權。但其正本已向專利專責機關提出者，得以載明正本所依附案號之影本代之。\n第一項優先權證明文件，經專利專責機關與該國家或世界貿易組織會員之專利受理機關已為電子交換者，視為申請人已提出。\n第一項規定之正本，得以專利專責機關規定之電子檔代之，並應釋明其與正本相符。", "26-1": "依本法第三十條第一項規定主張優先權者，如同時或先後亦就其先申請案依本法規定繳納證書費及第一年專利年費，專利專責機關應通知申請人限期撤回其後申請案之優先權主張或先申請案之領證申請；屆期未擇一撤回者，其先申請案不予公告，並通知申請人得申請退還證書費及第一年專利年費。", "26-2": "本法第三十二條第一項所稱同日，指發明專利及新型專利分別依本法第二十五條第二項及第一百零六條第二項規定之申請日相同；若主張優先權，其優先權日亦須相同。\n本法第三十二條第一項所定申請人未分別聲明，包括於發明專利申請案及新型專利申請案中皆未聲明，或其中一申請案未聲明之情形。\n本法第三十二條之新型專利權，如於發明專利核准審定後公告前，發生已當然消滅或撤銷確定之情形者，發明專利不予公告。", "27": "本法第三十三條第二項所稱屬於一個廣義發明概念者，指二個以上之發明，於技術上相互關聯。\n前項技術上相互關聯之發明，應包含一個或多個相同或對應之特別技術特徵。\n前項所稱特別技術特徵，指申請專利之發明整體對於先前技術有所貢獻之技術特徵。\n二個以上之發明於技術上有無相互關聯之判斷，不因其於不同之請求項記載或於單一請求項中以擇一形式記載而有差異。", "28": "發明專利申請案申請分割者，應就每一分割案，備具申請書，並檢附下列文件：\n一、說明書、申請專利範圍、摘要及圖式。\n二、申請生物材料或利用生物材料之發明專利者，其寄存證明文件。\n有下列情事之一，並應於每一分割申請案申請時敘明之：\n一、主張本法第二十八條第一項規定之優先權者。\n二、主張本法第三十條第一項規定之優先權者。\n第一項第一款規定之說明書，未完全援用原申請案申請時之說明書內容者，應檢附差異部分之劃線頁；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增之文字下方；並得於第一項規定之申請書就差異部分為說明。\n分割申請，不得變更原申請案之專利種類。", "29": "（刪除）", "30": "依本法第三十五條規定申請專利者，應備具申請書，並檢附舉發撤銷確定證明文件。", "31": "專利專責機關公開發明專利申請案時，應將下列事項公開之：\n一、申請案號。\n二、公開編號。\n三、公開日。\n四、國際專利分類。\n五、申請日。\n六、發明名稱。\n七、發明人姓名。\n八、申請人姓名或名稱、住居所或營業所。\n九、委任代理人者，其姓名。\n十、摘要。\n十一、最能代表該發明技術特徵之圖式及其符號說明。\n十二、主張本法第二十八條第一項優先權之各第一次申請專利之國家或世界貿易組織會員、申請案號及申請日。\n十三、主張本法第三十條第一項優先權之各申請案號及申請日。\n十四、有無申請實體審查。", "32": "發明專利申請案申請實體審查者，應備具申請書，載明下列事項：\n一、申請案號。\n二、發明名稱。\n三、申請實體審查者之姓名或名稱、國籍、住居所或營業所；有代表人者，並應載明代表人姓名。\n四、委任代理人者，其姓名、事務所。\n五、是否為專利申請人。", "33": "發明專利申請案申請優先審查者，應備具申請書，載明下列事項：\n一、申請案號及公開編號。\n二、發明名稱。\n三、申請優先審查者之姓名或名稱、國籍、住居所或營業所；有代表人者，並應載明代表人姓名。\n四、委任代理人者，其姓名、事務所。\n五、是否為專利申請人。\n六、發明專利申請案之商業上實施狀況；有協議者，其協議經過。\n申請優先審查之發明專利申請案尚未申請實體審查者，並應依前條規定申請實體審查。\n依本法第四十條第二項規定應檢附之有關證明文件，為廣告目錄、其他商業上實施事實之書面資料或本法第四十一條第一項規定之書面通知。", "34": "專利專責機關通知面詢、實驗、補送模型或樣品、修正說明書、申請專利範圍或圖式，屆期未辦理或未依通知內容辦理者，專利專責機關得依現有資料續行審查。", "35": "說明書、申請專利範圍或圖式之文字或符號有明顯錯誤者，專利專責機關得依職權訂正，並通知申請人。", "36": "發明專利申請案申請修正說明書、申請專利範圍或圖式者，應備具申請書，並檢附下列文件：\n一、修正部分劃線之說明書或申請專利範圍修正頁；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增之文字下方。但刪除請求項者，得以文字加註為之。\n二、修正後無劃線之說明書、申請專利範圍或圖式替換頁；如修正後致說明書、申請專利範圍或圖式之頁數、項號或圖號不連續者，應檢附修正後之全份說明書、申請專利範圍或圖式。\n前項申請書，應載明下列事項：\n一、修正說明書者，其修正之頁數、段落編號與行數及修正理由。\n二、修正申請專利範圍者，其修正之請求項及修正理由。\n三、修正圖式者，其修正之圖號及修正理由。\n修正申請專利範圍者，如刪除部分請求項，其他請求項之項號，應依序以阿拉伯數字編號重行排列；修正圖式者，如刪除部分圖式，其他圖之圖號，應依圖號順序重行排列。\n發明專利申請案經專利專責機關為最後通知者，第二項第二款之修正理由應敘明本法第四十三條第四項各款規定之事項。", "37": "因誤譯申請訂正說明書、申請專利範圍或圖式者，應備具申請書，並檢附下列文件：\n一、訂正部分劃線之說明書或申請專利範圍訂正頁；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增加之文字下方。\n二、訂正後無劃線之說明書、申請專利範圍或圖式替換頁。\n前項申請書，應載明下列事項：\n一、訂正說明書者，其訂正之頁數、段落編號與行數、訂正理由及對應外文本之頁數、段落編號與行數。\n二、訂正申請專利範圍者，其訂正之請求項、訂正理由及對應外文本之請求項之項號。\n三、訂正圖式者，其訂正之圖號、訂正理由及對應外文本之圖號。", "38": "發明專利申請案同時申請誤譯訂正及修正說明書、申請專利範圍或圖式者，得分別提出訂正及修正申請，或以訂正申請書分別載明其訂正及修正事項為之。\n發明專利同時申請誤譯訂正及更正說明書、申請專利範圍或圖式者，亦同。", "39": "發明專利申請案審定前，任何人認該發明應不予專利時，得向專利專責機關陳述意見，並得附具理由及相關證明文件。", "40": "新型專利申請案之說明書有部分缺漏或圖式有缺漏之情事，而經申請人補正者，以補正之日為申請日。但有下列情事之一者，仍以原提出申請之日為申請日：\n一、補正之說明書或圖式已見於主張優先權之先申請案。\n二、補正之說明書或部分圖式，申請人於專利專責機關確認申請日之處分書送達後三十日內撤回。\n前項之說明書或圖式以外文本提出者，亦同。", "41": "本法第一百二十條準用第二十八條第一項所定之十二個月，自在與中華民國相互承認優先權之國家或世界貿易組織會員第一次申請日之次日起算至本法第一百零六條第二項規定之申請日止。\n本法第一百二十條準用第三十條第一項第一款所定之十二個月，自先申請案申請日之次日起算至本法第一百零六條第二項規定之申請日止。", "42": "依本法第一百十五條第一項規定申請新型專利技術報告者，應備具申請書，載明下列事項：\n一、申請案號。\n二、新型名稱。\n三、申請新型專利技術報告者之姓名或名稱、國籍、住居所或營業所；有代表人者，並應載明代表人姓名。\n四、委任代理人者，其姓名、事務所。\n五、是否為專利權人。", "43": "依本法第一百十五條第五項規定檢附之有關證明文件，為專利權人對為商業上實施之非專利權人之書面通知、廣告目錄或其他商業上實施事實之書面資料。", "44": "新型專利技術報告應載明下列事項：\n一、新型專利證書號數。\n二、申請案號。\n三、申請日。\n四、優先權日。\n五、技術報告申請日。\n六、新型名稱\n七、專利權人姓名或名稱、住居所或營業所。\n八、申請新型專利技術報告者之姓名或名稱。\n九、委任代理人者，其姓名。\n十、專利審查人員姓名。\n十一、國際專利分類。\n十二、先前技術資料範圍。\n十三、比對結果。", "45": "第十三條至第二十三條、第二十六條至第二十八條、第三十條、第三十四條至第三十八條規定，於新型專利準用之。", "46": "本法第一百二十二條所稱申請前及第一百二十三條所稱申請在先，如依本法第一百四十二條第一項準用第二十八條第一項規定主張優先權者，指該優先權日前。\n本法第一百二十二條所稱刊物，指向公眾公開之文書或載有資訊之其他儲存媒體。\n本法第一百二十二條第三項所定之六個月，自同條項所定事實發生之次日起算至本法第一百二十五條第二項規定之申請日止。有多次本法第一百二十二條第三項所定事實者，前述期間之計算，應自第一次事實發生之次日起算。", "47": "本法第一百二十二條及第一百二十六條所稱所屬技藝領域中具有通常知識者，指具有申請時該設計所屬技藝領域之一般知識及普通技能之人。\n前項所稱申請時，如依本法第一百四十二條第一項準用第二十八條第一項規定主張優先權者，指該優先權日。", "48": "因繼承、受讓、僱傭或出資關係取得專利申請權之人，就其被繼承人、讓與人、受雇人或受聘人在申請前之公開行為，適用本法第一百二十二條第三項及第四項規定。", "49": "申請設計專利者，其申請書應載明下列事項：\n一、設計名稱。\n二、設計人姓名、國籍。\n三、申請人姓名或名稱、國籍、住居所或營業所；有代表人者，並應載明代表人姓名。\n四、委任代理人者，其姓名、事務所。\n有主張本法第一百四十二條第一項準用第二十八條第一項規定之優先權者，應於申請時敘明之。\n申請衍生設計專利者，除前二項規定事項外，並應於申請書載明原設計申請案號。", "50": "申請設計專利者，其說明書應載明下列事項：\n一、設計名稱。\n二、物品用途。\n三、設計說明。\n說明書應依前項各款所定順序及方式撰寫，並附加標題。但前項第二款或第三款已於設計名稱或圖式表達清楚者，得不記載。", "51": "設計名稱，應明確指定所施予之物品，不得冠以無關之文字。\n物品用途，指用以輔助說明設計所施予物品之使用、功能等敘述。\n設計說明，指用以輔助說明設計之形狀、花紋、色彩或其結合等敘述。其有下列情事之一，應敘明之：\n一、圖式揭露內容包含不主張設計之部分。\n二、應用於物品之電腦圖像及圖形化使用者介面設計具變化外觀者，應敘明變化順序。\n三、各圖間因相同、對稱或其他事由而省略者。\n有下列情事之一，必要時得於設計說明簡要敘明之：\n一、有因材料特性、機能調整或使用狀態之變化，而使設計之外觀產生變化者。\n二、有輔助圖或參考圖者。\n三、以成組物品設計申請專利者，其各構成物品之名稱。", "52": "說明書所載之設計名稱、物品用途、設計說明之用語應一致。\n前項之說明書，應以打字或印刷為之。\n依本法第一百二十五條第三項規定提出之外文本，其說明書應提供正確完整之翻譯。", "53": "設計之圖式，應備具足夠之視圖，以充分揭露所主張設計之外觀；設計為立體者，應包含立體圖；設計為連續平面者，應包含單元圖。\n前項所稱之視圖，得為立體圖、前視圖、後視圖、左側視圖、右側視圖、俯視圖、仰視圖、平面圖、單元圖或其他輔助圖。\n圖式應參照工程製圖方法，以墨線圖、電腦繪圖或以照片呈現，於各圖縮小至三分之二時，仍得清晰分辨圖式中各項細節。\n主張色彩者，前項圖式應呈現其色彩。\n圖式中主張設計之部分與不主張設計之部分，應以可明確區隔之表示方式呈現。\n標示為參考圖者，不得作為設計專利權範圍，但得用於說明應用之物品或使用環境。", "54": "設計之圖式，應標示各圖名稱，並指定立體圖或最能代表該設計之圖為代表圖。\n未依前項規定指定或指定之代表圖不適當者，專利專責機關得通知申請人限期補正，或依職權指定後通知申請人。", "55": "設計專利申請案之說明書或圖式有部分缺漏之情事，而經申請人補正者，以補正之日為申請日。但有下列情事之一者，仍以原提出申請之日為申請日：\n一、補正之說明書或圖式已見於主張優先權之先申請案。\n二、補正之說明書或圖式，申請人於專利專責機關確認申請日之處分書送達後三十日內撤回。\n前項之說明書或圖 式以外文本提出者，亦同。", "56": "本法第一百四十二條第二項所定之六個月，自在與中華民國相互承認優先權之國家或世界貿易組織會員第一次申請日之次日起算至本法第一百二十五條第二項規定之申請日止。", "57": "本法第一百二十九條第二項所稱同一類別，指國際工業設計分類表同一大類之物品。", "58": "設計專利申請案申請分割者，應就每一分割案，備具申請書，並檢附說明書及圖式。\n有主張本法第一百四十二條第一項準用第二十八條第一項規定之優先權者，應於每一分割申請案申請時敘明之。\n分割申請，不得變更原申請案之專利種類。", "59": "設計專利申請案申請修正說明書或圖式者，應備具申請書，並檢附下列文件：\n一、修正部分劃線之說明書修正頁；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增之文字下方。\n二、修正後無劃線之全份說明書或圖式。\n前項申請書，應載明下列事項：\n一、修正說明書者，其修正之頁數與行數及修正理由。\n二、修正圖式者，其修正之圖式名稱及修正理由。", "60": "因誤譯申請訂正說明書或圖式者，應備具申請書，並檢附下列文件：\n一、訂正部分劃線之說明書訂正頁；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增加之文字下方。\n二、訂正後無劃線之全份說明書或圖式。\n前項申請書，應載明下列事項：\n一、訂正說明書者，其訂正之頁數與行數、訂正理由及對應外文本之頁數與行數。\n二、訂正圖式者，其訂正之圖式名稱、訂正理由及對應外文本之圖式名稱。", "61": "第二十六條、第三十條、第三十四條、第三十五條及第三十八條規定，於設計專利準用之。\n本章之規定，適用於衍生設計專利。", "62": "本法第五十九條第一項第三款、第九十九條第一項所定申請前，於依本法第二十八條第一項或第三十條第一項規定主張優先權者，指該優先權日前。", "63": "申請專利權讓與登記者，應由原專利權人或受讓人備具申請書，並檢附讓與契約或讓與證明文件。\n公司因併購申請承受專利權登記者，前項應檢附文件，為併購之證明文件。", "64": "申請專利權信託登記者，應由原專利權人或受託人備具申請書，並檢附下列文件：\n一、申請信託登記者，其信託契約或證明文件。\n二、信託關係消滅，專利權由委託人取得時，申請信託塗銷登記者，其信託契約或信託關係消滅證明文件。\n三、信託關係消滅，專利權歸屬於第三人時，申請信託歸屬登記者，其信託契約或信託歸屬證明文件。\n四、申請信託登記其他變更事項者，其變更證明文件。", "65": "申請專利權授權登記者，應由專利權人或被授權人備具申請書，並檢附下列文件：\n一、申請授權登記者，其授權契約或證明文件。\n二、申請授權變更登記者，其變更證明文件。\n三、申請授權塗銷登記者，被授權人出具之塗銷登記同意書、法院判決書及判決確定證明書或依法與法院確定判決有同一效力之證明文件。但因授權期間屆滿而消滅者，免予檢附。\n前項第一款之授權契約或證明文件，應載明下列事項：\n一、發明、新型或設計名稱或其專利證書號數。\n二、授權種類、內容、地域及期間。\n專利權人就部分請求項授權他人實施者，前項第二款之授權內容應載明其請求項次。\n第二項第二款之授權期間，以專利權期間為限。", "66": "申請專利權再授權登記者，應由原被授權人或再被授權人備具申請書，並檢附下列文件：\n一、申請再授權登記者，其再授權契約或證明文件。\n二、申請再授權變更登記者，其變更證明文件。\n三、申請再授權塗銷登記者，再被授權人出具之塗銷登記同意書、法院判決書及判決確定證明書或依法與法院確定判決有同一效力之證明文件。但因原授權或再授權期間屆滿而消滅者，免予檢附。\n前項第一款之再授權契約或證明文件應載明事項，準用前條第二項之規定。\n再授權範圍，以原授權之範圍為限。", "67": "申請專利權質權登記者，應由專利權人或質權人備具申請書，並檢附下列文件：\n一、申請質權設定登記者，其質權設定契約或證明文件。\n二、申請質權變更登記者，其變更證明文件。\n三、申請質權塗銷登記者，其債權清償證明文件、質權人同意塗銷質權設定之證明文件、法院判決書及判決確定證明書或依法與法院確定判決有同一效力之證明文件。\n前項第一款之質權設定契約或證明文件，應載明下列事項：\n一、發明、新型或設計名稱或其專利證書號數。\n二、債權金額及質權設定期間。\n前項第二款之質權設定期間，以專利權期間為限。", "68": "申請前五條之登記，依法須經第三人同意者，並應檢附第三人同意之證明文件。", "69": "申請專利權繼承登記者，應備具申請書，並檢附死亡與繼承證明文件。", "70": "依本法第六十七條規定申請更正說明書、申請專利範圍或圖式者，應備具申請書，並檢附下列文件：\n一、更正後無劃線之說明書、圖式替換頁。\n二、更正申請專利範圍者，其全份申請專利範圍。\n三、依本法第六十九條規定應經被授權人、質權人或全體共有人同意者，其同意之證明文件。\n前項申請書，應載明下列事項：\n一、更正說明書者，其更正之頁數、段落編號與行數、更正內容及理由。\n二、更正申請專利範圍者，其更正之請求項、更正內容及理由。\n三、更正圖式者，其更正之圖號及更正理由。\n更正內容，應載明更正前及更正後之內容；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增之文字下方。\n第二項之更正理由並應載明適用本法第六十七條第一項之款次。\n更正申請專利範圍者，如刪除部分請求項，不得變更其他請求項之項號；更正圖式者，如刪除部分圖式，不得變更其他圖之圖號。\n專利權人於舉發案審查期間申請更正者，並應於更正申請書載明舉發案號。", "71": "依本法第七十二條規定，於專利權當然消滅後提起舉發者，應檢附對該專利權之撤銷具有可回復之法律上利益之證明文件。", "72": "本法第七十三條第一項規定之舉發聲明，於發明、新型應敘明請求撤銷全部或部分請求項之意旨；其就部分請求項提起舉發者，並應具體指明請求撤銷之請求項；於設計應敘明請求撤銷設計專利權。\n本法第七十三條第一項規定之舉發理由，應敘明舉發所主張之法條及具體事實，並敘明各具體事實與證據間之關係。", "73": "舉發案之審查及審定，應於舉發聲明範圍內為之。\n舉發審定書主文，應載明審定結果；於發明、新型應就各請求項分別載明。", "74": "依本法第七十七條第一項規定合併審查之更正案與舉發案，應先就更正案進行審查，經審查認應不准更正者，應通知專利權人限期申復；屆期未申復或申復結果仍應不准更正者，專利專責機關得逕予審查。\n依本法第七十七條第一項規定合併審定之更正案與舉發案，舉發審定書主文應分別載明更正案及舉發案之審定結果。但經審查認應不准更正者，僅於審定理由中敘明之。", "75": "專利專責機關依本法第七十八條第一項規定合併審查多件舉發案時，應將各舉發案提出之理由及證據通知各舉發人及專利權人。\n各舉發人及專利權人得於專利專責機關指定之期間內就各舉發案提出之理由及證據陳述意見或答辯。", "76": "舉發案審查期間，專利專責機關認有必要時，得協商舉發人與專利權人，訂定審查計畫。", "77": "申請專利權之強制授權者，應備具申請書，載明申請理由，並檢附詳細之實施計畫書及相關證明文件。\n申請廢止專利權之強制授權者，應備具申請書，載明申請廢止之事由，並檢附證明文件。", "78": "依本法第八十八條第二項規定，強制授權之實施應以供應國內市場需要為主者，專利專責機關應於核准強制授權之審定書內載明被授權人應以適當方式揭露下列事項：\n一、強制授權之實施情況。\n二、製造產品數量及產品流向。", "79": "本法第九十八條所定專利證書號數標示之附加，在專利權消滅或撤銷確定後，不得為之。但於專利權消滅或撤銷確定前已標示並流通進入市場者，不在此限。", "80": "有下列情形之一者，專利權人得備具申請書並敘明理由，申請補發或換發專利證書：\n一、專利證書滅失或遺失。\n二、專利證書陳舊或毀損。\n三、專利證書記載事項異動。\n依前項規定補發或換發專利證書時，原專利證書應公告作廢。", "81": "依本法第一百三十九條規定申請更正說明書或圖式者，應備具申請書，並檢附更正後無劃線之全份說明書或圖式。\n前項申請書，應載明下列事項：\n一、更正說明書者，其更正之頁數與行數、更正內容及理由。\n二、更正圖式者，其更正之圖式名稱及更正理由。\n更正內容，應載明更正前及更正後之內容；其為刪除原內容者，應劃線於刪除之文字上；其為新增內容者，應劃線於新增之文字下方。\n第二項之更正理由並應載明適用本法第一百三十九條第一項之款次。\n專利權人於舉發案審查期間申請更正者，並應於更正申請書載明舉發案號。", "82": "專利權簿應載明下列事項：\n一、發明、新型或設計名稱。\n二、專利權期限。\n三、專利權人姓名或名稱、國籍、住居所或營業所。\n四、委任代理人者，其姓名及事務所。\n五、申請日及申請案號。\n六、主張本法第二十八條第一項優先權之各第一次申請專利之國家或世界貿易組織會員、申請案號及申請日。\n七、主張本法第三十條第一項優先權之各申請案號及申請日。\n八、公告日及專利證書號數。\n九、受讓人、繼承人之姓名或名稱及專利權讓與或繼承登記之年、月、日。\n十、委託人、受託人之姓名或名稱及信託、塗銷或歸屬登記之年、月、日。\n十一、被授權人之姓名或名稱及授權登記之年、月、日。\n十二、質權人姓名或名稱及質權設定、變更或塗銷登記之年、月、日。\n十三、強制授權之被授權人姓名或名稱、國籍、住居所或營業所及核准或廢止之年、月、日。\n十四、補發證書之事由及年、月、日。\n十五、延長或延展專利權期限及核准之年、月、日。\n十六、專利權消滅或撤銷之事由及其年、月、日；如發明或新型專利權之部分請求項經刪除或撤銷者，並應載明該部分請求項項號。\n十七、寄存機構名稱、寄存日期及號碼。\n十八、其他有關專利之權利及法令所定之一切事項。", "83": "專利專責機關公告專利時，應將下列事項刊載專利公報：\n一、專利證書號數。\n二、公告日。\n三、發明專利之公開編號及公開日。\n四、國際專利分類或國際工業設計分類。\n五、申請日。\n六、申請案號。\n七、發明、新型或設計名稱。\n八、發明人、新型創作人或設計人姓名。\n九、申請人姓名或名稱、住居所或營業所。\n十、委任代理人者，其姓名。\n十一、發明專利或新型專利之申請專利範圍及圖式；設計專利之圖式。\n十二、圖式簡單說明或設計說明。\n十三、主張本法第二十八條第一項優先權之各第一次申請專利之國家或世界貿易組織會員、申請案號及申請日。\n十四、主張本法第三十條第一項優先權之各申請案號及申請日。\n十五、生物材料或利用生物材料之發明，其寄存機構名稱、寄存日期及寄存號碼。\n十六、同一人就相同創作，於同日另申請發明專利之聲明。", "84": "專利專責機關於核准更正後，應將下列事項刊載專利公報：\n一、專利證書號數。\n二、原專利公告日。\n三、申請案號。\n四、發明、新型或設計名稱。\n五、專利權人姓名或名稱。\n六、更正事項。", "85": "專利專責機關於舉發審定後，應將下列事項刊載專利公報：\n一、被舉發案號數。\n二、發明、新型或設計名稱。\n三、專利權人姓名或名稱、住居所或營業所。\n四、舉發人姓名或名稱。\n五、委任代理人者，其姓名。\n六、舉發日期。\n七、審定主文。\n八、審定理由。", "86": "專利申請人有延緩公告專利之必要者，應於繳納證書費及第一年專利年費時，向專利專責機關申請延緩公告。所請延緩之期限，不得逾六個月。", "87": "依本法規定檢送之模型、樣品或書證，經專利專責機關通知限期領回者，申請人屆期未領回時，專利專責機關得逕行處理。", "88": "依本法及本細則所為之申請，其申請書、說明書、申請專利範圍、摘要及圖式，應使用本法修正施行後之書表格式。\n有下列情事之一者，除申請書外，其說明書、圖式或圖說，得使用本法修正施行前之書表格式：\n一、本法修正施行後三個月內提出之發明或新型專利申請案。\n二、本法修正施行前以外文本提出之申請案，於修正施行後六個月內補正說明書、申請專利範圍、圖式或圖說。\n三、本法修正施行前或依第一款規定提出之申請案，於本法修正施行後申請修正或更正，其修正或更正之說明書、申請專利範圍、圖式或圖說。", "89": "依本法第一百二十一條第二項、第一百二十九條第二項規定提出之設計專利申請案，其主張之優先權日早於本法修正施行日者，以本法修正施行日為其優先權日。", "89-1": "本法第一百四十三條第一項所定專利檔案中之申請書件、說明書、申請專利範圍、摘要、圖式及圖說，經專利專責機關認定具保存價值者，指下列之專利案：\n一、強制授權申請之發明專利案。\n二、獲得諾貝爾獎之我國國民所申請之專利案。\n三、獲得國家發明創作獎之專利案。\n四、經提起行政救濟之舉發案。\n五、經提起行政救濟之異議案。\n六、其他經專利專責機關認定具重要歷史意義之技術發展、經濟價值或重大訴訟之專利案。", "90": "本細則自中華民國一百零二年一月一日施行。\n本細則修正條文，除中華民國一百零六年四月十九日修正發布條文自一百零六年五月一日施行；一百零八年九月二十七日修正發布條文自一百零八年十一月一日施行；一百十二年三月二十四日修正發布條文自一百十二年五月一日施行者外，自發布日施行。"};
const EN_RULES = {"1": "These Enforcement Rules are formulated pursuant to Article 158 of the Patent Act (hereinafter referred to as the Act).", "2": "Any application to be filed pursuant to the Act and these Enforcement Rules shall, except that to be filed by electronic means pursuant to Article 19 of the Act, be in written form and shall be affixed with the signature or seal of the applicant, or the signature or seal of the patent agent appointed by the applicant. The Specific Patent Agency may, as it deems necessary, request the applicant to submit the document(s) proving the identity of the natural or juristic person.\nAny application to be filed in written form pursuant to the Act and these Enforcement Rules shall use the written forms designated by the Specific Patent Agency; the formats and number of copies thereof shall be prescribed by the Specific Patent Agency.", "3": "Where the Chinese translation of technical terminology has been made by the National Academy for Educational Research, such official translation shall prevail. However, in the absence of such official translation or as it deems necessary, the Specific Patent Agency may request the applicant to annotate the Chinese terminology with its original foreign version.\nThe document(s) for filing a patent application or other proceedings shall be in Chinese. In case any document(s) of proof is written in a foreign language, the Specific Patent Agency may, as it deems necessary, request the applicant to submit a full-text Chinese translation or a Chinese translation of an excerpt thereof.", "4": "Any document(s) of proof submitted pursuant to the Act and these Enforcement Rules shall be the original or the certified copy thereof.\nUpon making preliminary showing that the photocopy of the document(s) of proof is identical to the original or the certified copy, except for the certified priority document, the parties involved may submit the photocopy instead. However, where a photocopy of the documentary evidence is submitted as evidence of invalidation, it shall be proved to be identical to the original or the certified copy thereof.\nWhen the original or the certified copy of the document(s) of proof has been verified by the Specific Patent Agency, it may be returned to the applicant.", "5": "Where a person files a patent application or taking other proceedings in connection with patent matters in written form, the date of application and other proceedings shall be the date on which the Specific Patent Agency receives the written document; however, where the delivery thereof is made via post, the date of application and other proceedings shall be the postmark date.\nThe date of application and other proceedings whose postmark date appears to be ambiguous shall be the date of receipt by the Specific Patent Agency, unless otherwise proved by the parties involved.", "6": "With regard to the time period(s) specified by Specific Patent Agency pursuant to the Act and these Enforcement Rules, an applicant may, prior to the expiration thereof, make a request stating the reasons for the delay to the Specific Patent Agency for an extension.", "7": "Where a request is made for recordation of the change to the name, seal, domicile/residence, or business establishment of the applicant, the document(s) of proof shall accompany such request. This provision shall not apply where the change thereto needs not be proved by document(s).", "8": "Where a change of entitled applicant is requested due to a transfer of the right to apply for patent, the request shall be submitted and accompanied by the following documents:\n1. in the event that the change of entitled applicant is due to an assignment, the deed of assignment of the right to apply for patent or document(s) of proof of the assignment; where the assignment is made due to amalgamation or acquisition of companies, however, the document(s) of proof of the amalgamation or acquisition should be submitted;\n2. in the event that the change of entitled applicant is due to inheritance, the certificate of death and the instrument of succession.", "9": "Where the applicant designates an agent, the document specifying the extent of power conferred upon the agent and the address to receive service shall be submitted to the Specific Patent Agency.\nWhere agents for patent application and other proceedings are designated, the number of agents shall not exceed three (3).\nWhere two or more agents are designated, each of them may act on behalf of the applicant severally.\nIn the event that the designation violates the provision of the preceding paragraph, the agent still may act on behalf of the applicant severally.\nWhere the power or agent is changed, unless a written notice is submitted to the Specific Patent Agency, such change has no effect to the Specific Patent Agency.\nAny change to the agent’s address shall be reported to the Specific Patent Agency.", "10": "The agent may take any action within the extent of power conferred upon. However, actions of designating or discharging an agent, withdrawing a patent application, withdrawing a divisional patent application, withdrawing a converted patent application, withdrawing a request for reexamination, withdrawing a request for post-grant amendment, withdrawing an invalidation action, or abandoning a patent right shall not be taken without being specially empowered.", "11": "Where the application documents do not conform to statutory requirements but such nonconformance may be remedied, the Specific Patent Agency shall notify the applicant to complete the requirements within a specified time limit; where the requirements are not completed within the specified time limit or are still incomplete, the application shall be processed pursuant to Paragraph 1, Article 17 of the Act.", "12": "When requesting for reinstatement under Paragraph 2, Article 17 of the Act, a request form shall be submitted to the Specific Patent Agency stating the reasons for the delay and the date of extinguishment of such delay, and accompanied by the document(s) of proof.", "13": "Where the priority is claimed pursuant to Paragraph 1, Article 28 or Paragraph 1, Article 30 of the Act, the so-called “prior to the filing of the patent application” in Article 22 of the Act, and the so-called “earlier-filed” in Article 23 of the Act shall mean prior to the priority date.\nThe so-called “printed publication” in Article 22 of the Act shall mean documents or other storage media carrying information that is open to the public.\nThe period of twelve (12) months in Paragraph 3, Article 22 of the Act is calculated from the day following the occurrence of the facts prescribed under the same paragraph to the filing date prescribed under Paragraph 2, Article 25 of the Act. Where there are more than one of the facts prescribed under Paragraph 3, Article 22 of the Act, the above-mentioned period shall be calculated from the day following the occurrence of the first of these facts.", "14": "The so-called “a person ordinarily skilled in the art” in Article 22, Article 26, and Article 27 of the Act shall mean a person having general knowledge and ordinary skill in the art of the invention at the time of filing.\nIn the preceding paragraph, the time of filing shall mean the priority date where priority is claimed pursuant to Paragraph 1, Article 28 or Paragraph 1, Article 30 of the Act.", "15": "Where a person has obtained the right to apply for patent due to inheritance, assignment, employment or capital contribution, with respect to the disclosure of the invention made by the predecessor, assignor, employee or appointee prior to the filing, the provisions of Paragraphs 3 and 4, Article 22 of the Act shall apply.", "16": "When filing a patent application for invention, the application form shall specify the following items:\n1. title of invention;\n2. name and nationality of the inventor;\n3. name, nationality, and domicile/residence or business establishment of the applicant; name of the representative, if any ; and\n4. name and business establishment of the agent, if an agent is designated.\nUnder any of the following circumstances, a statement shall be made at the time of filing:\n1. where the priority prescribed under Paragraph 1, Article 28 of the Act is claimed;\n2. where the priority prescribed under Paragraph 1, Article 30 of the Act is claimed; and\n3. where the declaration is made in respect of a patent application for invention and a patent application for utility model filed for the same creation on the same date as prescribed under Paragraph 1, Article 32 of the Act.", "17": "When filing a patent application for invention, the description shall contain the following items:\n1. title of invention;\n2. technical field;\n3. prior art: indicate the prior art known to the applicant, where relevant materials reflect such art may be submitted;\n4. summary of invention: disclose the problem(s) that the invention aims to solve and its technical solution adopted to solve the problem(s); and state any advantageous effects of the invention with reference to the prior art;\n5. brief description of drawing(s): where the description is accompanied by drawing(s), description of the drawing(s) shall be made concisely according to the drawing sequence;\n6. description of embodiments: describe at least one way of carrying out the invention, use examples where appropriate, and refer to the drawing(s), if any; and\n7. reference signs list: where the description is accompanied by drawing(s), major reference signs of the drawing(s) shall be listed and illustrated according to the drawing sequence or reference signs sequence.\nThe description shall be presented in the manner and order specified in each subparagraph of the preceding paragraph, and each of the parts shall be preceded by a heading; unless, owing to the nature of the invention, a different presentation would result in a better understanding.\nThe paragraphs of the description may be arranged with four consecutive Arabic numbers in separate square brackets so that each of the paragraphs can be clearly identified.\nThe title of invention should concisely state the contents of the claimed inventions; irrelevant wording is not allowed.\nWhen a patent application for invention involves a biological material or utilization of a biological material, where the biological material concerned has been deposited, the description shall specify the depository, date of deposit and deposit number. In the event that, prior to filing the patent application, the biological material concerned has been deposited in a foreign depository recognized by the Specific Patent Agency, the description shall also specify the foreign depository, date of deposit, and deposit number.\nWhere a biological material is deposited in a depository as specified in Paragraph 5 Article 27 of the Act, the certificate issued by the aforementioned depository shall include a viability test report of the deposited biological material.\nWhere a patent application for invention contains disclosure of one or more nucleotides and/or amino acids sequence, a sequence listing produced in compliance with the standard provided by the Specific Patent Agency shall be submitted as a separate part of the description. In addition, the said sequence listing may be submitted in the electronic version thereof in compliance with the requirement of the Specific Patent Agency.", "18": "The claim(s) of an invention may be presented in more than one independent claim; the number of claim(s) shall be consistent with the disclosure of the invention; when necessary, the claim(s) may contain more than one dependent claim. The independent claim(s) and the dependent claim(s) shall be consecutively arranged in Arabic numerical sequence according to their dependent relations.\nAn independent claim shall state the designation of the subject matter as claimed and the essential technical features of the invention that the applicant regards as his/her invention.\nA dependent claim shall state the Arabic number(s) of the claim(s) on which it depends, the designation of the subject matter and the technical features other than those in the claim(s) on which it depends; whenever an interpretation of a dependent claim is made, it shall contain all the technical features of the claim(s) on which the dependent claim depends.\nA dependent claim depending on two or more claims shall be referred to as a multiple dependent claim and shall be presented in alternative.\nA dependent claim may only depend on the preceding dependent or independent claim(s). However, direct or indirect dependence is not allowed among multiple dependent claims.\nAn independent or a dependent claim shall be written in a single sentence.", "19": "Unless absolutely necessary, the technical features of all the claim(s) may not be defined by referring to the page number(s) or line number(s) of the description, drawing(s) or reference sign (s) in the drawing(s).\nThe technical features of the claim(s) may refer to the corresponding reference sign(s) in the drawing(s), and the reference sign(s) shall follow the corresponding technical features and be placed in parentheses; the reference sign(s) may not serve to limit the interpretation of the claim(s).\nThe claim(s) may contain the chemical or mathematical formulae but not drawing(s).\nA technical feature in a claim for an invention which consists of a combination of multiple technical features may be expressed in means-plus-function or step-plus-function language. Such claim shall be interpreted to cover the corresponding structure, material, or acts described in the description and equivalents thereof.", "20": "Where an independent claim of an invention is presented in two-part form, the preamble portion shall contain the designation of the subject matter as claimed and those essential technical features that the subject matter as claimed and the prior art are in common; the characterizing portion shall state the essential technical features of the invention which distinguish the subject matter as claimed from the prior art in such phase as “characterized in that,” “wherein the improvement comprises,” or in similar expressions.\nThe technical features of the characterizing portion shall be in combination with those of the preamble portion in interpreting such independent claim.", "21": "An abstract shall concisely state the disclosure of the invention, and be limited to the technical problem(s) it intends to solve, the technical solution adopted to solve the problem(s), and the principal use of the invention; in principle, the text of abstract is not to exceed 250 words; for an invention involving chemical formula, its abstract shall disclose the formula that can best characterize the inventive feature(s).\nAn abstract may not contain any commercial advertisement wording.\nFor an abstract failing to comply with the preceding two paragraphs, the Specific Patent Agency may notify the applicant to make an amendment within a specified time limit, or notify the applicant of the amendment being made ex officio.\nThe applicant shall designate a representative drawing that can best characterize the technical feature(s) of the invention and list the primary reference sign(s) in the representative drawing accompanied by brief description(s).\nIn case of failure to designate a representative drawing or inappropriate designation of a representative drawing, the Specific Patent Agency may notify the applicant to complete the requirements within a specified time limit, or notify the applicant of the designation or deletion being made ex officio.", "22": "In a patent application for invention, the technical terminology and the reference sign(s) used in the description, claim(s), and abstract shall be consistent.\nThe description, claim(s), and abstract referred to in the preceding paragraph should be typed or printed.\nWhere the description, claim(s), and abstract are filed in a foreign language, the submitted Chinese translation thereof shall be precise and complete.", "23": "In a patent application for invention, the drawing(s) shall be made clearly with ink lines based on the engineering drawing method; when scaled down to two-thirds, all the details disclosed in each drawing shall still be clearly distinguished.\nThe drawing(s) shall be annotated with drawing designation(s) and reference sign(s), arranged according to the drawing sequence, and shall not specify descriptive words, unless otherwise indispensable.", "24": "In the event that parts of the description or the drawing(s) are missing from the patent application for invention, the filing date shall be the date on which the missing parts of the description or the drawing(s) are filed. However, the filing date shall be the date on which the application was first filed under any of the following conditions:\n1. where the application claims priority of an earlier application, and the missing parts of the description or the drawing(s) are completely contained in the earlier application; or\n2. where the applicant withdraws the earlier filed missing parts of the description or the drawing(s) within thirty days after being served with a notification confirming the filing date by the Specific Patent Agency.\nWhere the description or drawing(s) referred to in the preceding paragraph is submitted in a foreign language, the above provisions shall apply.", "25": "The period of twelve (12) months prescribed under Paragraph 1, Article 28 of the Act is calculated from the day following the filing date of first patent application in a country which reciprocally recognizes ROC-based priority claims or a member of the World Trade Organization (WTO) to the filing date prescribed under Paragraph 2, Article 25 of the Act.\nThe period of twelve (12) months prescribed under Subparagraph 1, Paragraph 1, Article 30 of the Act is calculated from the day following the filing date of the earlier patent application to the filing date prescribed under Paragraph 2, Article 25 of the Act.", "26": "The priority document to be submitted pursuant to Paragraph 2, Article 29 of the Act shall be the certified copy.\nIn the event that the priority document submitted by the applicant within the time limit prescribed under Paragraph 2, Article 29 of the Act is a photocopy, the Specific Patent Agency shall notify the applicant to submit the certified copy thereof within specified time limit; where such submission is not made within the specified time limit or the submission is still incomplete, the priority claim is deemed not to have been claimed pursuant to Paragraph 3, Article 29 of the Act. However, in the event that the certified priority document has already been submitted to the Specific Patent Agency, a photocopy specifying the number of the patent application to which the certified priority document appends may be submitted as a substitute.\nIn the event that the priority document referred to in Paragraph 1 has been exchanged between the Specific Patent Agency and the receiving patent authority of the country or the WTO member by means of electronic communication, the priority document is deemed to have been submitted by the applicant.\nThe certified copy referred to in Paragraph 1 may be replaced with the electronic version thereof in compliance with the requirement of the Specific Patent Agency; an explanation that this electronic version is identical to the certified copy shall be made.", "26-1": "Where the priority is claimed pursuant to Paragraph 1, Article 30 of the Act, in the event the certificate fee and the first-year annuity with respect to the earlier patent application is paid pursuant to the Act, either at the same time, prior to or after the claiming of priority, the Specific Patent Agency shall notify the applicant to withdraw within the specified time period either the priority claim of the subsequent patent application or the request for patent certificate of the earlier patent application. If a withdrawal has not been made within the specified time period, the earlier patent application shall not be published and the Specific Patent Agency shall notify the applicant that the certificate fee and the first-year annuity may be refunded by request.", "26-2": "The so-called “on the same date” prescribed under Paragraph 1, Article 32 of the Act shall mean a patent application for invention and a patent application for utility model having been filed in accordance with, respectively, Paragraph 2, Article 25 and Paragraph 2, Article 106 of the Act, and having the same filing date. In the event that the priority claims are made, the priority dates shall also be the same.\nThe situation where the applicant has not made respective declarations as prescribed under Paragraph 1, Article 32 of the Act includes the applicant not having made any declaration for both the patent application for invention and the patent application for utility model, or the applicant not having made any declaration for either of the two applications.\nIn the event that the utility model patent becomes extinguished or is revoked finally and bindingly after the approval of the patent application for invention but prior to the publication of that invention patent, the invention patent shall not be published.", "27": "The so-called “linked as to form a single general inventive concept” in Paragraph 2, Article 33 of the Act shall mean that two or more inventions are technically related to one another.\nThe inventions that are technically related to one another referred to in the preceding paragraph shall contain one or more same or corresponding special technical features.\nThe so-called “special technical features” referred to in the preceding paragraph shall mean the technical features which define a contribution which each of the claimed inventions, considered as a whole, makes over the prior art.\nThe determination of whether two or more inventions are technically related to one another shall be made without regard to whether the inventions are claimed in separate claims or as alternatives within a single claim.", "28": "When requesting for division of a patent application for invention, a request form shall be submitted for each divisional patent application, accompanied by the following documents:\n1.description, claim(s), abstract, and drawing(s); and\n2.where the patent application for invention involves a biological material or utilization of a biological material, the certificate of deposit thereof.\nUnder any of the following circumstances, a statement shall be made at the time of filing the request form for each divisional patent application:\n1. where the priority prescribed under Paragraph 1, Article 28 of the Act is claimed; or\n2. where the priority prescribed under Paragraph 1, Article 30 of the Act is claimed.\nWhere the description prescribed in Subparagraph 1 of Paragraph 1 is not completely quoted from the description of the original patent application, the discrepancies between the two descriptions shall be marked; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s); the discrepancies may be illustrated in the request form prescribed in Paragraph 1.\nThe divisional patent application shall not differ from the original patent application in its type.", "29": "(delete)", "30": "Where a patent application is filed pursuant to Article 35 of the Act, an application form shall be submitted and accompanied by the document(s) of proof showing that the invalidation decision revoking the patent has become final and binding.", "31": "Whenever a patent application for invention is laid open by the Specific Patent Agency, the following items shall be laid open to the public:\n1. application number;\n2. laying open number;\n3. laying open date;\n4. international patent classification;\n5. filing date;\n6. title of invention;\n7. name(s) of the inventor(s);\n8. name and domicile/residence or business establishment of the applicant;\n9. name of the agent, if an agent is designated;\n10. abstract;\n11. the drawing that can best characterize the technical features of the invention, and description(s) of the reference sign(s) in the drawing accompanied;\n12. where the priority prescribed under Paragraph 1, Article 28 of the Act is claimed, the reciprocal country or the WTO member receiving the respective first patent application(s), application number(s) and filing date(s) thereof;\n13. where the priority prescribed under Paragraph 1, Article 30 of the Act is claimed, the respective application number(s) and filing date(s) thereof; and\n14. status for whether a request for substantive examination has been applied.", "32": "When requesting for a substantive examination of a patent application for invention, a request form shall be submitted, specifying the following items:\n1. application number;\n2. title of invention;\n3. name, nationality, and domicile/residence or business establishment of the applicant for substantive examination; the name of the representative, if any;\n4. name and business establishment of the agent, if an agent is designated; and\n5. identification of whether the requester for the substantial examination is the patent applicant.", "33": "When requesting for prioritized examination of a patent application for invention, a request form shall be submitted, specifying the following items:\n1. application number and laying open number;\n2. title of invention;\n3. name, nationality, and domicile/residence or business establishment of the applicant for prioritized examination; the name of the representative, if any;\n4. name and business establishment of the agent, if an agent is designated;\n5. identification of whether the requester for prioritized examination is the patent applicant; and\n6. a statement with respect to the status of commercial exploitation of the patent application for invention; where there is an agreement, the history of reaching the agreement.\nWhere a request for prioritized examination of the patent application for invention has been made but a request for substantive examination thereof has yet to be filed, a request for substantive examination as prescribed in the preceding article shall also be made.\nThe relevant document(s) of proof to be submitted pursuant to Paragraph 2, Article 40 of the Act shall include: advertising catalogues, other written materials reflecting the facts of commercial exploitation, or the written notice prescribed under Paragraph 1, Article 41 of the Act.", "34": "Where the Specific Patent Agency notifies the applicant to appear for an interview, to perform experiment, to supplement model(s) or sample(s), or to amend the description, claim(s), or drawing(s), in case of failure to act within the specified time limit, or to conduct any act pursuant to the contents of the notification, the Specific Patent Agency may continue the examination based on the materials available.", "35": "In case of obvious error(s) found in the description, claim(s), or text(s) or reference sign(s) in the drawing(s), the Specific Patent Agency may correct the error(s) ex officio and notify the applicant of the correction(s) being made.", "36": "When requesting to amend the description, claim(s), or drawing(s) of a patent application for invention, a request form shall be submitted and accompanied by the following documents:\n1. the amended sheet(s) of the description or claim(s) on which the portions of the amendment are marked; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s);\n2.the replacement sheet(s) of description, claim(s), or drawing(s) after the amendment without marks; in case the page sequence, claim sequence, or drawing sequence of the description, claim(s), or drawing(s) are not continuous due to the amendment, a complete set of description, claim(s), or drawing(s) after the amendment shall be submitted.\nThe request form referred to in the preceding paragraph shall specify the following items:\n1.where an amendment is made to the description, the page number(s), paragraph number(s), and line number(s) thereof and reasons for the amendment;\n2.where an amendment is made to the claim(s), the number(s) thereof and reasons for the amendment;\n3.where an amendment is made to the drawing(s), the designation(s) thereof and reasons for the amendment.\nWhere an amendment is made to the claim(s), if parts of the claims are deleted, number(s) of the remaining claim(s) should be rearranged with Arabic numeral(s) according to the claim sequence; where an amendment is made to the drawing(s), if parts of the drawings are deleted, the drawing designation(s) of the remaining drawing(s) should be rearranged according to the drawing sequence.\nIn the event that the Specific Patent Agency has issued a final notice to the patent application for invention, the amendment reasons set forth in Subparagraph 2, Paragraph 2 of this Rule shall state the respective grounds prescribed under Paragraph 4, Article 43 of the Act.", "37": "When requesting to correct the description, claim(s), or drawing(s) due to translation errors, a request form shall be submitted and accompanied by the following documents:\n1. the corrected sheet(s) of the description or claim(s) on which the portions of the correction are marked; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s); and\n2.the replacement sheet(s) of description, claim(s), or drawing(s) after correction without marks.\nThe request form referred to in the preceding paragraph shall specify the following items:\n1.where a correction is made to the description, the page number(s), paragraph number(s), and line number(s) thereof, reasons for correction, and the page number(s), paragraph number(s), and line number(s) of the corresponding description in the application in foreign language;\n2.where a correction is made to the claim(s), the number(s) thereof, reasons for the correction, and the claim number(s) of the corresponding claim(s) in the application in foreign language;\n3.where a correction is made to the drawing(s), the designation(s) thereof, reasons for the amendment, and the designation(s) of the corresponding drawing(s) in the application in foreign language.", "38": "In case a correction of translation error(s) and an amendment are simultaneously made to the description, claim(s), or drawing(s) of the patent application for invention, the request for correction and the request for amendment may be submitted separately, or a request for correction specifying both the correction and amendment may be submitted.\nIn case a correction of translation error(s) and a post-grant amendment are simultaneously made to the description, claim(s), or drawing(s) of the invention patent, the above provision shall apply.", "39": "Prior to examination decision being rendered , any person considering that the claimed inventions shall not be granted may submit observations to the Specific Patent Agency, along with reasons and document(s) of proof.", "40": "In the event that parts of the description or drawing(s) are missing from the patent application for utility model, the filing date shall be the date on which the missing parts of the description or the drawing(s) are filed. However, the filing date shall be the date on which the application was first filed under any of the following conditions:\n1.where the applicant claims priority of an earlier application, and the missing parts of the description or the drawing(s) are completely contained in the earlier application; or\n2.where the applicant withdraws the earlier filed missing parts of the description or parts of the drawing(s) within thirty (30) days after being served with a notification confirming the filing date by the Specific Patent Agency.\nWhere the description or drawing(s) referred to in the preceding paragraph are submitted in a foreign language, the above provisions shall apply.", "41": "The period of twelve (12) months prescribed under Paragraph 1 of Article 28 applicable mutatis mutandis under Article 120 of the Act is calculated from the day following the filing date of the first patent application in a country which reciprocally recognizes ROC-based priority claims or a member of the WTO to the filing date prescribed under Paragraph 2, Article 106 of the Act.\nThe period of twelve (12) months prescribed under Subparagraph 1, Paragraph 1 of Article 30 applicable mutatis mutandis under Article 120 of the Act is calculated from the day following the filing date of the earlier patent application to the filing date prescribed under Paragraph 2, Article 106 of the Act.", "42": "When requesting for a technical evaluation report of utility model patent pursuant to Paragraph 1, Article 115 of the Act, a request form shall be submitted specifying the following items:\n1. application number;\n2. title of utility model;\n3. name, nationality, and domicile/residence or business establishment of the applicant for the technical evaluation report of utility model patent; the name of the representative, if any;\n4. name and business establishment of the agent, if an agent is designated; and\n5. identification of whether the requester is the patentee.", "43": "The relevant document(s) of proof to be submitted pursuant to Paragraph 5, Article 115 of the Act shall include: a written notice issued by the patentee to a party not entitled to exploit the patent for commercial purpose, advertising catalogues, or other written materials reflecting the facts of commercial exploitation.", "44": "The technical evaluation report of utility model patent shall specify the following items:\n1. certificate number of the utility model patent;\n2. application number;\n3. filing date;\n4. priority date;\n5. the date that a request for rendering a technical evaluation report is made;\n6. title of utility model;\n7. name and domicile/residence or business establishment of the patentee;\n8. name of the requester for the technical evaluation report of utility model patent;\n9. name of the agent, if an agent is designated;\n10. name of the patent examiner;\n11. international patent classification;\n12. range of prior art documents; and\n13. comparative conclusions", "45": "Rules 13 to 23, Rules 26 to 28, Rule 30, and Rules 34 to 38 shall apply mutatis mutandis to utility model patent.", "46": "Where the priority is claimed pursuant to Paragraph 1, Article 28 of the Act applicable mutatis mutandis under Paragraph 1, Article 142 of the Act, the so-called “prior to the filing of the patent application” in Article 122 of the Act and the so-called “earlier-filed” in Article 123 of the Act shall mean prior to the priority date.\nThe so-called “printed publication” in Article 122 of the Act shall mean documents or other storage media carrying information that is open to the public.\nThe period of six (6) months in Paragraph 3, Article 122 of the Act is calculated from the day following the occurrence of the facts prescribed under the same paragraph to the filing date prescribed under Paragraph 2, Article 125 of the Act. Where there are more than one of the facts prescribed under Paragraph 3, Article 122 of the Act, the above-mentioned period shall be calculated from the day following the occurrence of the first of these facts.", "47": "The so-called “a person ordinarily skilled in the art” in Article 122 and Article 126 of the Act shall mean a person having general knowledge and ordinary skills in the art of the design at the time of filing.\nIn the preceding paragraph, the time of filing shall mean the priority date where priority is claimed pursuant to Paragraph 1, Article 28 of the Act applicable mutatis mutandis under Paragraph 1, Article 142 of the Act.", "48": "Where a person has obtained the right to apply for patent due to inheritance, assignment, employment or capital contribution, with respect to the disclosure of the design made by the predecessor, assignor, employee or appointee prior to the filing, the provisions of Paragraphs 3 and 4, Article 122 of the Act shall apply.", "49": "When filing a patent application for design, the application form shall specify the following items:\n1. title of design;\n2. name and nationality of the designer; and\n3. name, nationality, and domicile/residence or business establishment of the applicant; the name of the representative, if any; and\n4. name and business establishment of the agent, if an agent is designated;\nWhere the priority prescribed under Paragraph 1, Article 28 applicable mutatis mutandis under Paragraph 1, Article 142 of the Act is claimed, a statement thereof shall be made at the time of filing.\nWhen filing a patent application for derivative design, the application number of the original patent application for design shall be specified in the request form, in addition to the items stated in the preceding two paragraphs.", "50": "When filing a patent application for design, the description shall contain the following items:\n1. title of design;\n2. purpose of article; and\n3. description of design.\nThe description shall be presented in the manner and order specified in each subparagraph of the preceding paragraph, and each of the parts shall be preceded by a heading. However, the items stated in Subparagraph 2 or 3 of the preceding paragraph may be omitted where such items are clearly reflected by the title of design or the drawing(s).", "51": "The title of design shall clearly designate the article to which the design applied; irrelevant wording is not allowed.\nThe purpose of article serves to facilitate description of usage, function, and the like of the article to which the design applied.\nThe description of design serves to facilitate description of shape, patterns, colors, or any combination thereof. The following circumstances shall be stated, if any:\n1.the disclosed content of the drawing(s) contains parts which do not form part of the claimed design;\n2.for computer icons and graphic user interfaces applied to an article and whose appearance(s) may change, the change sequence; or\n3.the omission of the drawing(s) due to identicalness of drawing(s), symmetry of drawing(s), or any other causes.\nA concise statement may be made in the description of design when necessary under any of the following circumstances:\n1.where the appearance of design changes because of the characteristics of different materials used, adjustment of function, or change in state of use;\n2. where there is auxiliary drawing(s) or reference drawing(s); or\n3. in a patent application for design claiming a set of articles, the title of each article constituting the set.", "52": "The terminology used in the title of design, purpose of article, and description of design in the description shall be consistent.\nThe description referred to in the preceding paragraph should be typed or printed.\nWhere foreign language document(s) is submitted pursuant to the Paragraph 3, Article 125 of the Act, the description shall contain the precise and complete translation.", "53": "In a patent application for design, the drawing(s) shall contain sufficient views so as to fully disclose the appearance of the claimed design; where the design is three-dimensional, the drawing(s) shall contain a perspective view; where the design is applied to a boundless plane in form, the drawing(s) shall contain an element view.\nThe views stated in the preceding paragraph may include a perspective view, a front view, a rear view, a left side view, a right side view, a top view, a bottom view, a plan view, an element view, or other auxiliary views.\nThe drawing(s) shall be made clear with ink lines, computer drafting, or photographs based on engineering drawing method; when scaled down to two-thirds, all the details disclosed in each drawing shall still be clearly distinguished.\nWhere colors are claimed, the drawing(s) stated in the preceding paragraph shall present the colors.\nThe parts in the drawing(s) which the design intends to claim and not to claim shall be presented in a manner by which the different parts can be clearly distinguished.\nA drawing annotated as reference shall not be the scope of a design patent, but shall be used to describe an article to be applied or an environment of use.", "54": "In a patent application for design, each drawing shall be annotated with a title, and a perspective view or a drawing that can best characterize the design shall be designated as the representative drawing.\nIn case of failure to designate a representative drawing or inappropriate designation of a representative drawing, the Specific Patent Agency may notify the applicant to complete the requirements within a specified time limit, or notify the applicant of designation being made ex officio.", "55": "In the event that parts of the description or parts of the drawing(s) are missing from the patent application for design, the filing date shall be the date on which the missing parts of the description or the drawing(s) are filed. However, the filing date shall be the date on which the application was first filed under any of the following conditions:\n1.where the applicant claims priority of an earlier application, and the missing parts of description or parts of the drawing(s) are completely contained in the earlier application; or\n2.where the applicant withdraws the earlier filed missing parts of the description or parts of the drawing(s) within thirty (30) days after being served with a notification confirming the filing date by the Specific Patent Agency.\nWhere the description or drawing(s) referred to in the preceding paragraph are submitted in a foreign language, the above provisions shall apply.", "56": "The period of six (6) months prescribed under Paragraph 2, Article 142 of the Act is calculated from the day following the filing date of the first patent application in a country which reciprocally recognizes ROC-based priority claims or a member of the WTO to the filing date prescribed under Paragraph 2, Article 125 of the Act.", "57": "The so-called “same class” prescribed under Paragraph 2, Article 129 of the Act shall mean articles categorized under the same Class in the International Classification for Industrial Designs.", "58": "When requesting division of a patent application for design, a request form for each divisional patent application shall be submitted and accompanied by description and drawing(s).\nWhere the priority prescribed under Paragraph 1, Article 28 applicable mutatis mutandis under Paragraph 1, Article 142 of the Act is claimed, a statement thereof shall be made at the time of filing the request form for each divisional patent application.\nThe divisional patent application shall not differ from the original patent application in its type.", "59": "When requesting to amend the description or drawing(s) of a patent application for design, a request form shall be submitted and accompanied by the following documents:\n1. the amended sheet(s) of the description on which the portions of the amendment are marked; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s); and\n2.the complete set of replacement description or drawing(s) after the amendment without marks.\nThe request form referred to in the preceding paragraph shall specify the following items:\n1.where an amendment is made to the description, the page number(s) and line number(s) thereof and reasons for the amendment;\n2.where an amendment is made to the drawing(s), the title(s) thereof and reasons for the amendment.", "60": "When requesting to correct the description or drawing(s) due to translation errors, a request form shall be submitted and accompanied by the following documents\n1. the corrected sheet(s) of the description on which the portions of the correction are marked; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s); and\n2.the complete set of replacement description or drawing(s) after correction without marks.\nThe request form referred to in the preceding paragraph shall specify the following items:\n1.where a correction is made to the description, the page number(s) and line number(s) thereof, reasons for correction, and the page number(s) and line number(s) of the corresponding description in foreign language;\n2.where a correction is made to the drawing(s), the title(s) thereof, reasons for the correction, and the title(s) of the corresponding drawing(s) in the application in foreign language.", "61": "Rules 26, 30, 34, 35 and 38 shall apply mutatis mutandis to design patent.\nThe provisions in this Chapter are applicable to derivative design patent.", "62": "Where priority is claimed pursuant to Paragraph 1, Article 28 or Paragraph 1, Article 30 of the Act, the so-called “prior to the filing of application” in Subparagraph 3, Paragraph 1, Article 59 and Paragraph 1, Article 99 of the Act shall mean prior to the priority date.", "63": "When requesting for recordation of patent right assignment, a request form shall be submitted by the assignor or the assignee and accompanied by deed of assignment or document(s) of proof with respect to the assignment.\nWhen requesting for recordation of patent right succession due to amalgamation or acquisition of companies, the documents to be submitted in the preceding paragraph are document(s) of proof with respect to the amalgamation or acquisition.", "64": "In requesting for recordation of patent right entrustment, a request form shall be submitted by the patentee or the trustee and accompanied by the following documents:\n1.for recordation of trust, the deed of trust or document(s) of proof with respect to such entrustment agreement;\n2.for deletion of trust recordation upon termination of the trust relation and the acquisition of the patent right by the settlor, the deed of trust or document(s) of proof with respect to such termination of the trust relation;\n3.for recordation of attribution of trusted patent right upon termination of the trust relation and the acquisition of patent right by a third party, the deed of trust or document(s) of proof with respect to such trust attribution;\n4.for alteration of other matters in the recordation of trust, document(s) of proof with respect to such alteration.", "65": "In requesting for recordation of licensing of patent right, a request form shall be submitted by the patentee or the licensee and accompanied by the following documents:\n1.for recordation of licensing, the license agreement or document(s) of proof with respect to such licensing;\n2.for alteration of the recordation of licensing, document(s) of proof with respect to such alteration;\n3.for deletion of licensing recordation, a letter consenting deletion of the licensing recordation issued by the licensee, a judgment of the court along with a certificate stating the judgment is final and binding, or documents which legally have the equivalent effect as a final and binding judgment of the court. However, where the license is terminated due to expiration of the licensed term, the above documents need not be submitted.\nThe license agreement or document(s) of proof referred to in Subparagraph 1 of the preceding paragraph shall specify the following items:\n1. title or certificate number of the invention, utility model, or design patent; and\n2. type, scope, locality and term of license.\nWhere the patentee licenses others to exploit part of the claims, the scope referred to in Subparagraph 2 of the preceding paragraph shall specify the number(s) of the licensed claim(s).\nThe expiration date of the licensed term referred to in Subparagraph 2 of Paragraph 2 shall not be later than the expiration date of the patent term.", "66": "In requesting for recordation of sub-licensing of patent right, a request shall be submitted by the licensee or the sub-licensee and accompanied by the following documents:\n1.for recordation of sub-licensing, the sub-license contract or document(s) of proof with respect to such sub-licensing;\n2.for alteration of the recordation of sub-licensing, document(s) of proof with respect to such alteration;\n3.for deletion of sub-licensing recordation, a letter consenting deletion of the sub-licensing recordation issued by the sub-licensee, a judgment of the court along with a certificate stating the judgment is final and binding, or documents which legally have the equivalent effect as a final and binding judgment of the court. However, where the sub-license is terminated due to expiration of the licensed term or sub-licensed term, the above documents need not be submitted.\nParagraph 2 of the preceding Rule shall apply mutatis mutandis to the items to be specified in the sub-license contract or the document(s) of proof thereof referred to in Subparagraph 1 of the preceding paragraph.\nThe sub-licensed scope is limited to the original licensed scope.", "67": "In requesting for recordation of pledge establishment of a patent right, a request form shall be submitted by the patentee or the pledgee and accompanied by the following documents:\n1.for recordation of pledge establishment, the pledge agreement or document(s) of proof with respect to such establishment;\n2.for alteration of the recordation of pledge establishment, document(s) of proof with respect to such alteration;\n3.for cancelation of pledge establishment recordation, document(s) of proof with respect to the full discharge of pledged liabilities, document(s) to prove that the pledgee consented to cancel the recordation of the establishment of a pledge, a judgment of the court along with a certificate stating the judgment is final and binding, or documents which legally have the equivalent effect as a final and binding judgment of the court.\nThe agreement or document(s) of proof referred to in Subparagraph 1 of the preceding paragraph shall specify the following items:\n1.title or certificate number of the invention, utility model, or design patent; and\n2.amount of claim and the term of the pledge establishment.\nThe expiration date of the term of the pledge establishment referred to in Subparagraph 2 of the preceding paragraph shall not be later than the expiration date of the patent term.", "68": "Where, pursuant to the laws, consent from a third party is required for recordation referred to in the preceding five (5) rules, document(s) of proof with respect to such consent from the third party shall also be submitted.", "69": "In requesting for recordation of succession of patent right, a request form shall be submitted and accompanied by the certificate of death and the instrument of succession.", "70": "When requesting for amending the post-grant description, claim(s), or drawing(s) of a patent pursuant to Article 67 of the Act, a request form shall be submitted and accompanied by the following documents:\n1.the replacement sheet(s) of the description and drawing(s) after the post-grant amendment without marks;\n2.where a post-grant amendment is made to the claim(s), a complete set of the claims;\n3.where consent from the licensee, pledgee, or all joint owners is required pursuant to Article 69 of the Act, document(s) of proof with respect to such consent.\nThe request form referred to in the preceding paragraph shall specify the following items:\n1.where a post-grant amendment is made to the description, the page number(s), paragraph number(s), line number(s) thereof, the contents amended, and reasons for the post-grant amendment;\n2.where a post-grant amendment is made to the claim(s), the claim(s) thereof, the contents amended, and reasons for the post-grant amendment;\n3.where a post-grant amendment is made to the drawing(s), the designation(s) thereof and reasons for the post-grant amendment.\nThe contents amended before and after the post-grant amendment shall be specified; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s).\nThe reasons for post-grant amendment referred to in Paragraph 2 shall specify the applied provision(s) of Paragraph 1, Article 67 of the Act.\nWhere a post-grant amendment is made to the claim(s), if parts of the claims are deleted, the claim sequence of the remaining claim(s) shall not be changed; where a post-grant amendment is made to the drawing(s), if parts of the drawing(s) are deleted, the drawing designation(s) of remaining drawing(s) shall not be changed.\nWhen requesting for a post-grant amendment during invalidation proceedings, the patentee shall specify the number of invalidation action in the request form.", "71": "Where an invalidation action is initiated after the patent has become extinguished ipso facto pursuant to Article 72 of the Act, the document(s) evidencing recoverable legal interests as a result of revocation of the patent right shall be submitted.", "72": "Where an invalidation action is initiated, for an invention or a utility model, the invalidation statement prescribed under Paragraph 1, Article 73 of the Act shall state the objective to revoke all or parts of the claims; where an invalidation action is initiated against parts of the claims, the claim(s) against which the invalidation action is initiated shall be specifically identified; for a design, the invalidation statement shall state the objective to revoke the patent right of the design.\nThe reasons of invalidation prescribed under Paragraph 1, Article 73 of the Act shall state the ground(s) asserted by the invalidation action and specific facts, as well as explain the relationship between the respective specific facts and the evidence.", "73": "The invalidation proceedings and decisions concerned shall be conducted within the scope of the invalidation statement.\nThe syllabus of the invalidation decision shall specify the examination results; for an invention or a utility model, such results shall be rendered on a claim-by-claim basis.", "74": "When an invalidation action and a request for post-grant amendment are to be consolidated for examination pursuant to Paragraph 1, Article 77 of the Act, the post-grant amendment shall be first examined; if the post-grant amendment is rejected after examination, the Specific Patent Agency shall notify the patentee to make a response within a specified time limit; in case of failure to respond within the specified time limit or the post-grant amendment shall still be rejected despite the response, the Specific Patent Agency may proceed with the examination based on the materials available.\nWhen an invalidation action and a request for post-grant amendment are to be consolidated for examination pursuant to Paragraph 1, Article 77 of the Act, the syllabus of the invalidation decision shall specify the examination results for the post-grant amendment and the invalidation action separately. However, where the post-grant amendment is rejected after examination, such rejection shall only be stated in the reasons of invalidation decision.", "75": "When more than one invalidation actions are to be consolidated for examination pursuant to Paragraph 1, Article 78 of the Act, the Specific Patent Agency shall notify the respective invalidation requesters and the patentee of the reasons and evidence on which the respective invalidation actions rely.\nThe invalidation requesters and the patentee may each submit their comments or a response with respect to the reasons and evidence on which the respective invalidation actions rely within a time limit specified by the Specific Patent Agency.", "76": "During the examination of an invalidation action, the Specific Patent Agency may, when necessary, consult with the invalidation requester and the patentee to formulate an examination plan.", "77": "When requesting for a compulsory license, a request form specifying the reasons for the request thereof shall be submitted and accompanied by a detailed project for exploitation and relevant document(s) of proof.\nWhen requesting for repeal of a compulsory license, a request form specifying the ground(s) for the repeal thereof shall be submitted and accompanied by the document(s) of proof.", "78": "Where, pursuant to Paragraph 2, Article 88 of the Act, the exploitation under compulsory licensing shall be authorized predominantly for the supply of the domestic market, the Specific Patent Agency shall, in the decision approving compulsory licensing, specify that the following items be disclosed by the licensee in an appropriate manner:\n1. information on the exploitation of the compulsory license; and\n2. the quantity and flow of products manufactured.", "79": "Marking of a patent certificate number prescribed under Article 98 of the Act shall not be made after the patent is extinguished or its revocation becomes final and binding, unless a patent certificate number has been marked on the patented article and the patented article has been circulated into the market before the patent is extinguished or its revocation becomes final and binding.", "80": "The patentee may file an application form for the replacement or re-issuance of a patent certificate containing a written statement clarifying the reason(s) that exists under any of the following circumstances:\n1.the patent certificate is destroyed or lost;\n2.the patent certificate is outmoded or damaged;\n3.changes to the particulars entered therein are to be updated.\nWhere a patent certificate is replaced or re-issued pursuant to the preceding paragraph, the nullification of the original patent certificate shall be published in the Patent Gazette.", "81": "When requesting for a post-grant amendment to the description or drawing(s) pursuant to Article 139 of the Act, a request form shall be submitted and accompanied by a complete set of description or drawing(s) after the post-grant amendment without marks.\nThe request form referred to in the preceding paragraph shall specify the following items:\n1.where a post-grant amendment is made to the description, the page number(s), line number(s) thereof, the contents amended and reasons for the post-grant amendment;\n2.where a post-grant amendment is made to the drawing(s), the title(s) thereof and reasons for the post-grant amendment.\nThe contents amended before and after the post-grant amendment shall be specified; the deleted original disclosure shall be indicated by a strikethrough of the deleted text(s); the added disclosure shall be indicated by underlining the added text(s).\nThe reasons for post-grant amendment referred to in Paragraph 2 shall specify the applied provision(s) of Paragraph 1, Article 139 of the Act.\nWhen requesting for a post-grant amendment during invalidation proceedings, the patentee shall specify the number of invalidation action in the request form.", "82": "The Patent Registry shall specify the following information:\n1. title of invention, utility model or design;\n2. patent term;\n3. name, nationality, and domicile/residence or business establishment of the patentee;\n4. name and business establishment of the agent, if an agent is designated;\n5. filing date and application number;\n6. where the priority prescribed under Paragraph 1, Article 28 of the Act is claimed, the reciprocal country or the WTO member receiving the respective first patent application(s), application number(s) and filing date(s) thereof;\n7. where the priority prescribed under Paragraph 1, Article 30 of the Act is claimed, the respective application number(s) and filing date(s) thereof;\n8. publication date and patent certificate number;\n9. name of the assignee or successor, and the date of recordation of patent assignment or inheritance;\n10. name of the settlor or trustee, and the date of recordation of entrustment, deletion, or attribution of trust;\n11. name of the licensee and date of recordation of license;\n12. name of the pledgee and date of recordation of pledge establishment, alteration, or deletion of pledge;\n13. name, nationality, and domicile/residence or business establishment of the compulsory licensee, and the date of approval or repeal of a compulsory license;\n14. cause(s) and date of issuance of replacement of patent certificate;\n15. extension or prolongation of patent term and the date of approval;\n16. cause(s) and date of the extinguishment or revocation of a patent; for an invention or a utility model patent, where parts of the claims are deleted or revoked, the number(s) of such parts of claims shall be specified;\n17. name of the depository, date of deposit, and depository number; and\n18. any other matters with respect to the patent or prescribed by laws.", "83": "Whenever a patent is published by the Specific Patent Agency, the following items shall be listed in the Patent Gazette:\n1. patent certificate number;\n2. publication date;\n3. laying open number and laying open date for an invention patent;\n4. international patent classification or the international classification for industrial designs;\n5. filing date;\n6. application number;\n7. title of invention, utility model or design;\n8. name(s) of the inventor(s) of the invention, the creator(s) of the utility model or the designer(s) of the design;\n9. name and domicile/residence or business establishment of the applicant;\n10. name of the agent, if an agent is designated;\n11. claim(s) and drawing(s) of the invention patent or the utility model patent; drawing(s) of the design patent;\n12. brief description of drawing(s) or description of design;\n13. where the priority prescribed under Paragraph 1, Article 28 of the Act is claimed, the reciprocal country or the WTO member receiving the respective first patent application(s), application number(s) and filing date(s) thereof;\n14. where the priority prescribed under Paragraph 1, Article 30 of the Act is claimed, the respective application number(s) and filing date(s) thereof; and\n15. for an invention involving a biological material or utilization of a biological material, name of the depository, the deposit date and the deposit number; and\n16. the declaration that a patent application for invention in respect of the same creation is filed by the same person on the same date.", "84": "Whenever a request for a post-grant amendment is approved by the Specific Patent Agency, the following items shall be published in the Patent Gazette:\n1. patent certificate number;\n2. publication date of the patent;\n3. application number;\n4. title of invention, utility model or design;\n5. name of the patentee; and\n6. amended contents.", "85": "Whenever an invalidation decision is rendered by the Specific Patent Agency, the following items shall be published in the Patent Gazette:\n1. number of invalidation action;\n2. title of invention, utility model or design;\n3. name and domicile/residence or business establishment of the patentee;\n4. name of the invalidation requester;\n5. name of the agent, if an agent is designated;\n6. date of filing of the invalidation action;\n7. syllabus of the decision; and\n8. reasons of the decision.", "86": "Where the applicant has a need to postpone the publication of a patent, he or she may apply to the Specific Patent Agency for the postponement thereof at the time of paying the patent certificate fee and the first year patent annuity fee. The requested term of postponement shall n
